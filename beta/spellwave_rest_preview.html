<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#130f1d">
  <title>Spellwave Rest Preview | PanPhy Labs</title>
  <link rel="icon" type="image/png" href="../assets/favicon.png">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=IBM+Plex+Mono:wght@600;700&family=Manrope:wght@600;800&family=Press+Start+2P&display=swap');

    :root {
      --ink: #f2f0df;
      --muted: #c8b98b;
      --gold: #efc35c;
      --aqua: #58dfcf;
      --ember: #f26a3d;
      --panel: rgba(10, 18, 18, 0.74);
      --border: rgba(239, 195, 92, 0.42);
      --font-body: 'Manrope', system-ui, sans-serif;
      --font-display: 'DM Serif Display', serif;
      --font-mono: 'IBM Plex Mono', monospace;
      --font-pixel: 'Press Start 2P', monospace;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      width: 100%;
      min-width: 320px;
      height: 100%;
      margin: 0;
    }

    body {
      overflow: hidden;
      background: #130f1d;
      color: var(--ink);
      font-family: var(--font-body);
      touch-action: none;
      user-select: none;
    }

    canvas {
      position: fixed;
      inset: 0;
      display: block;
      width: 100%;
      height: 100%;
      background: #130f1d;
    }

    .pixel-grain {
      position: fixed;
      inset: 0;
      z-index: 2;
      pointer-events: none;
      opacity: 0.13;
      background-image:
        linear-gradient(rgba(255, 255, 255, 0.08) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255, 255, 255, 0.08) 1px, transparent 1px);
      background-size: 4px 4px;
      mask-image: radial-gradient(circle, black 46%, transparent 88%);
    }

    .top-bar,
    .preview-panel {
      position: fixed;
      z-index: 4;
      border: 1px solid var(--border);
      border-radius: 10px;
      background:
        linear-gradient(135deg, rgba(11, 24, 24, 0.86), rgba(15, 11, 24, 0.74)),
        repeating-linear-gradient(90deg, transparent 0 18px, rgba(239, 195, 92, 0.07) 18px 19px);
      box-shadow: 0 18px 54px rgba(0, 0, 0, 0.44), inset 0 0 24px rgba(88, 223, 207, 0.07);
      backdrop-filter: blur(14px);
    }

    .top-bar {
      top: max(14px, env(safe-area-inset-top));
      left: 14px;
      right: 14px;
      display: grid;
      grid-template-columns: auto minmax(0, 1fr) auto;
      align-items: center;
      gap: 14px;
      min-height: 64px;
      padding: 10px 12px;
    }

    .brand-mark {
      display: grid;
      place-items: center;
      width: 44px;
      height: 44px;
      border: 1px solid rgba(239, 195, 92, 0.36);
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.05);
    }

    .brand-mark img {
      width: 32px;
      height: 32px;
      image-rendering: pixelated;
    }

    .title span,
    .state-chip {
      color: var(--gold);
      font-family: var(--font-pixel);
      font-size: 0.58rem;
      line-height: 1.5;
      text-transform: uppercase;
    }

    .title h1 {
      margin: 2px 0 0;
      color: var(--ink);
      font-family: var(--font-display);
      font-size: clamp(1.5rem, 4vw, 2.4rem);
      font-weight: 400;
      letter-spacing: 0;
      line-height: 0.95;
    }

    .state-chip {
      justify-self: end;
      padding: 10px 12px;
      border: 1px solid rgba(88, 223, 207, 0.34);
      border-radius: 8px;
      color: var(--aqua);
      background: rgba(8, 18, 16, 0.66);
      white-space: nowrap;
    }

    .preview-panel {
      right: max(22px, env(safe-area-inset-right));
      bottom: max(22px, env(safe-area-inset-bottom));
      width: min(440px, calc(100vw - 36px));
      padding: 18px 20px;
    }

    .preview-panel p {
      margin: 0;
    }

    .kicker {
      color: var(--gold);
      font-family: var(--font-pixel);
      font-size: 0.62rem;
      line-height: 1.7;
      text-transform: uppercase;
    }

    .preview-panel h2 {
      margin: 10px 0 14px;
      color: var(--gold);
      font-family: var(--font-pixel);
      font-size: clamp(1.15rem, 4.8vw, 2rem);
      font-weight: 400;
      letter-spacing: 0.04em;
      line-height: 1.45;
      text-transform: uppercase;
      text-shadow:
        2px 0 0 #000,
        -2px 0 0 #000,
        0 2px 0 #000,
        0 -2px 0 #000,
        2px 2px 0 rgba(0, 0, 0, 0.84);
    }

    .copy {
      color: var(--muted);
      font-size: 0.98rem;
      font-weight: 800;
      line-height: 1.45;
    }

    .heart-row {
      display: flex;
      gap: 8px;
      margin: 14px 0 16px;
      color: #ff7894;
      font-family: var(--font-pixel);
      font-size: 1rem;
      text-shadow: 2px 2px 0 rgba(0, 0, 0, 0.7);
    }

    button {
      width: 100%;
      min-height: 48px;
      border: 0;
      border-radius: 8px;
      background: linear-gradient(135deg, rgba(242, 106, 61, 0.96), rgba(239, 195, 92, 0.96));
      color: #1a120b;
      cursor: pointer;
      font: 800 1rem/1 var(--font-body);
      transition: filter 160ms ease, transform 160ms ease;
    }

    button:hover {
      filter: brightness(1.08);
      transform: translateY(-1px);
    }

    @media (max-width: 760px) {
      .top-bar {
        grid-template-columns: auto minmax(0, 1fr);
      }

      .state-chip {
        display: none;
      }

      .preview-panel {
        left: 50%;
        right: auto;
        bottom: max(18px, env(safe-area-inset-bottom));
        transform: translateX(-50%);
      }
    }
  </style>
</head>

<body>
  <canvas id="restCanvas" aria-label="Spellwave rest visual preview"></canvas>
  <div class="pixel-grain" aria-hidden="true"></div>

  <header class="top-bar">
    <a class="brand-mark" href="./" aria-label="Back to beta index">
      <img src="../assets/panphy.png" alt="PanPhy Labs">
    </a>
    <div class="title">
      <span>Rest visual lab</span>
      <h1>Spellwave Rest</h1>
    </div>
    <div class="state-chip" id="stateChip">Cozy Hearth</div>
  </header>

  <section class="preview-panel" aria-live="polite">
    <p class="kicker" id="kicker">Winter cleared</p>
    <h2 id="sceneTitle">Cozy Hearth</h2>
    <p class="copy" id="sceneCopy">The wizard warms up by the fireplace while the spell hearts refill.</p>
    <div class="heart-row" aria-label="Life restored">♥ ♥ ♥ ♥ ♥</div>
    <button id="continueButton" type="button">Continue</button>
  </section>

  <script type="module">
    import * as THREE from 'https://cdn.jsdelivr.net/npm/three@0.164.1/build/three.module.js';

    const canvas = document.getElementById('restCanvas');
    const continueButton = document.getElementById('continueButton');
    const stateChip = document.getElementById('stateChip');
    const kicker = document.getElementById('kicker');
    const sceneTitle = document.getElementById('sceneTitle');
    const sceneCopy = document.getElementById('sceneCopy');

    const renderer = new THREE.WebGLRenderer({
      canvas,
      antialias: true,
      alpha: false,
      powerPreference: 'high-performance',
    });
    renderer.setPixelRatio(Math.min(window.devicePixelRatio || 1, 2));
    renderer.outputColorSpace = THREE.SRGBColorSpace;
    renderer.shadowMap.enabled = true;
    renderer.shadowMap.type = THREE.PCFSoftShadowMap;

    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x130f1d);
    scene.fog = new THREE.Fog(0x130f1d, 20, 64);

    const camera = new THREE.PerspectiveCamera(58, 1, 0.1, 120);
    const cameraTarget = new THREE.Vector3(0, 2.1, -8.5);

    const hemiLight = new THREE.HemisphereLight(0xffd6a8, 0x1b1110, 0.85);
    scene.add(hemiLight);

    const keyLight = new THREE.DirectionalLight(0xf8e7b8, 1.4);
    keyLight.position.set(-5, 9, 8);
    keyLight.castShadow = true;
    keyLight.shadow.mapSize.set(1024, 1024);
    keyLight.shadow.camera.left = -16;
    keyLight.shadow.camera.right = 16;
    keyLight.shadow.camera.top = 16;
    keyLight.shadow.camera.bottom = -16;
    scene.add(keyLight);

    const clock = new THREE.Clock();
    const groups = [];
    const animators = [];
    let activeIndex = 0;

    function mat(color, options = {}) {
      return new THREE.MeshStandardMaterial({
        color,
        roughness: options.roughness ?? 0.86,
        metalness: options.metalness ?? 0,
        emissive: options.emissive ?? 0x000000,
        emissiveIntensity: options.emissiveIntensity ?? 0,
        transparent: options.transparent ?? false,
        opacity: options.opacity ?? 1,
      });
    }

    function basic(color, opacity = 1) {
      return new THREE.MeshBasicMaterial({
        color,
        transparent: opacity < 1,
        opacity,
        blending: opacity < 1 ? THREE.AdditiveBlending : THREE.NormalBlending,
        depthWrite: opacity >= 1,
      });
    }

    function block(width, height, depth, material, x, y, z) {
      const mesh = new THREE.Mesh(new THREE.BoxGeometry(width, height, depth), material);
      mesh.position.set(x, y, z);
      mesh.castShadow = true;
      mesh.receiveShadow = true;
      return mesh;
    }

    function ellipsoid(width, height, depth, material, x, y, z, segments = 18) {
      const mesh = new THREE.Mesh(new THREE.SphereGeometry(0.5, segments, Math.max(10, Math.floor(segments * 0.58))), material);
      mesh.scale.set(width, height, depth);
      mesh.position.set(x, y, z);
      mesh.castShadow = true;
      mesh.receiveShadow = true;
      return mesh;
    }

    function cylinder(radiusTop, radiusBottom, height, material, x, y, z, segments = 18) {
      const mesh = new THREE.Mesh(new THREE.CylinderGeometry(radiusTop, radiusBottom, height, segments), material);
      mesh.position.set(x, y, z);
      mesh.castShadow = true;
      mesh.receiveShadow = true;
      return mesh;
    }

    function cone(radius, height, material, x, y, z, segments = 18) {
      const mesh = new THREE.Mesh(new THREE.ConeGeometry(radius, height, segments), material);
      mesh.position.set(x, y, z);
      mesh.castShadow = true;
      mesh.receiveShadow = true;
      return mesh;
    }

    function heart(material) {
      const group = new THREE.Group();
      group.add(block(0.16, 0.16, 0.08, material, -0.08, 0.08, 0));
      group.add(block(0.16, 0.16, 0.08, material, 0.08, 0.08, 0));
      group.add(block(0.24, 0.24, 0.08, material, 0, -0.08, 0));
      return group;
    }

    function createWizard({ x, y, z, sitting = true, wet = false }) {
      const group = new THREE.Group();
      group.position.set(x, y, z);
      const robeMat = mat(wet ? 0x1b5471 : 0x334a8a);
      const robeTrimMat = mat(0x58dfcf, { emissive: 0x0e6861, emissiveIntensity: 0.24 });
      const beltMat = mat(wet ? 0x0d3060 : 0x1e2c70);
      const faceMat = mat(0xd9aa74);
      const beardMat = mat(0xf2f0df);
      const hatMat = mat(wet ? 0x12445a : 0x24305f);
      const eyeMat = mat(0x12121a);
      const eyeGlintMat = basic(0xffffff, 0.72);
      const browMat = mat(0xd0ccba);
      const goldMat = mat(0xefc35c, { emissive: 0x6f4c12, emissiveIntensity: 0.14 });
      const cheekMat = basic(0xff9fa8, 0.62);
      const mouthMat = mat(0x8a4a3a);

      const S = sitting;
      const fy = S ? 1.55 : 0.92;

      if (S) {
        group.add(block(0.88, 1.0, 0.6, robeMat, 0, 0.82, 0));
        group.add(block(0.95, 0.15, 0.66, robeTrimMat, 0, 0.34, 0.02));
        group.add(block(0.9, 0.1, 0.62, beltMat, 0, 0.82, 0.01));
        group.add(block(0.08, 0.13, 0.07, goldMat, 0, 0.82, 0.36));
        group.add(block(0.052, 0.6, 0.055, robeTrimMat, 0, 0.72, 0.32));
        group.add(block(0.12, 0.12, 0.08, goldMat, -0.22, 0.76, 0.33));
        group.add(block(0.12, 0.12, 0.08, goldMat, 0.22, 0.64, 0.33));
        group.add(block(0.22, 0.18, 0.7, robeMat, -0.54, 0.96, 0.1));
        group.add(block(0.22, 0.18, 0.6, robeMat, 0.54, 0.96, 0.14));
        group.add(block(0.25, 0.09, 0.11, robeTrimMat, -0.54, 0.96, 0.48));
        group.add(block(0.25, 0.09, 0.11, robeTrimMat, 0.54, 0.96, 0.45));
        group.add(ellipsoid(0.13, 0.1, 0.12, faceMat, -0.54, 0.88, 0.55, 10));
        group.add(ellipsoid(0.13, 0.1, 0.12, faceMat, 0.54, 0.88, 0.52, 10));
        group.add(block(0.5, 0.26, 0.54, mat(wet ? 0x18395e : 0x2a3f7a), -0.34, 0.18, 0.1));
        group.add(block(0.5, 0.26, 0.54, mat(wet ? 0x18395e : 0x2a3f7a), 0.34, 0.18, 0.1));
      } else {
        group.add(block(0.86, 0.52, 0.56, robeMat, 0, 0.35, 0));
        group.add(block(0.9, 0.08, 0.58, beltMat, 0, 0.62, 0.01));
        group.add(block(0.08, 0.12, 0.07, goldMat, 0, 0.62, 0.3));
        group.add(ellipsoid(0.2, 0.16, 0.16, faceMat, -0.48, 0.72, 0.3, 14));
        group.add(ellipsoid(0.2, 0.16, 0.16, faceMat, 0.48, 0.72, 0.3, 14));
      }

      group.add(ellipsoid(0.58, 0.54, 0.52, faceMat, 0, fy, 0.03, 20));

      group.add(ellipsoid(0.64, 0.22, 0.2, beardMat, 0, fy - 0.2, 0.3, 18));
      group.add(ellipsoid(0.48, 0.25, 0.17, beardMat, 0, fy - 0.44, 0.25, 16));
      group.add(ellipsoid(0.24, 0.26, 0.14, beardMat, 0, fy - 0.66, 0.19, 12));
      group.add(block(0.24, 0.055, 0.07, beardMat, -0.09, fy - 0.1, 0.37));
      group.add(block(0.24, 0.055, 0.07, beardMat, 0.09, fy - 0.1, 0.37));

      group.add(cylinder(0.43, 0.45, 0.18, hatMat, 0, fy + 0.33, 0.02, 20));
      group.add(cone(0.34, 0.84, hatMat, 0, fy + 0.77, 0.02, 20));
      group.add(cylinder(0.445, 0.445, 0.056, robeTrimMat, 0, fy + 0.4, 0.02, 20));
      group.add(block(0.1, 0.1, 0.08, goldMat, -0.15, fy + 0.7, 0.27));
      group.add(block(0.08, 0.08, 0.08, goldMat, 0.17, fy + 0.9, 0.2));

      group.add(block(0.13, 0.13, 0.08, eyeMat, -0.16, fy + 0.07, 0.28));
      group.add(block(0.13, 0.13, 0.08, eyeMat, 0.16, fy + 0.07, 0.28));
      group.add(ellipsoid(0.04, 0.04, 0.03, eyeGlintMat, -0.13, fy + 0.1, 0.33, 6));
      group.add(ellipsoid(0.04, 0.04, 0.03, eyeGlintMat, 0.19, fy + 0.1, 0.33, 6));

      group.add(block(0.09, 0.055, 0.07, browMat, -0.11, fy + 0.19, 0.3));
      group.add(block(0.09, 0.055, 0.07, browMat, -0.21, fy + 0.185, 0.3));
      group.add(block(0.09, 0.055, 0.07, browMat, 0.11, fy + 0.19, 0.3));
      group.add(block(0.09, 0.055, 0.07, browMat, 0.21, fy + 0.185, 0.3));

      group.add(ellipsoid(0.1, 0.12, 0.11, faceMat, 0, fy - 0.03, 0.37, 12));

      group.add(ellipsoid(0.095, 0.055, 0.04, cheekMat, -0.27, fy - 0.07, 0.36, 10));
      group.add(ellipsoid(0.095, 0.055, 0.04, cheekMat, 0.27, fy - 0.07, 0.36, 10));

      group.add(block(0.08, 0.04, 0.06, mouthMat, -0.07, fy - 0.14, 0.38));
      group.add(block(0.08, 0.04, 0.06, mouthMat, 0.07, fy - 0.14, 0.38));

      return group;
    }

    function createCozyHearth() {
      const group = new THREE.Group();
      scene.add(group);

      const floorMat = mat(0x3b261b);
      const plankMat = mat(0x5a3822);
      const wallMat = mat(0x2b1d22);
      const beamMat = mat(0x1b1110);
      const stoneMat = mat(0x4c4c52);
      const stoneDarkMat = mat(0x25262c);
      const rugMat = mat(0x7f2440);
      const rugTrimMat = mat(0xefc35c);
      const chairMat = mat(0x7c3b24);
      const cushionMat = mat(0x124f5a);
      const snowMat = mat(0xddeeff, { emissive: 0x8fc5ff, emissiveIntensity: 0.08 });
      const windowMat = basic(0x172c4d, 0.92);
      const heartMat = basic(0xff7894, 0.9);
      const fireMats = [basic(0xfff1a3, 0.95), basic(0xff9c35, 0.82), basic(0xe74727, 0.72)];
      const bookMats = [mat(0xb44742), mat(0x2d7f5e), mat(0xd6a53f), mat(0x4d5da8)];
      const teaSteamMat = basic(0xe9fbff, 0.34);

      group.add(block(16, 0.34, 12, floorMat, 0, -0.28, -9.3));
      for (let x = -7.2; x <= 7.2; x += 1.2) group.add(block(0.06, 0.04, 11.6, plankMat, x, -0.08, -9.3));
      group.add(block(16.4, 6.2, 0.42, wallMat, 0, 2.8, -15.25));
      group.add(block(0.42, 5.5, 11.4, wallMat, -8.1, 2.45, -9.8));
      group.add(block(0.42, 5.5, 11.4, wallMat, 8.1, 2.45, -9.8));
      for (const x of [-6.6, -3.3, 0, 3.3, 6.6]) group.add(block(0.32, 5.9, 0.52, beamMat, x, 2.7, -15.0));
      group.add(block(16.2, 0.32, 0.54, beamMat, 0, 5.32, -15.0));

      group.add(block(3.4, 2.35, 0.18, windowMat, 3.8, 3.25, -15.0));
      group.add(block(3.7, 0.18, 0.3, beamMat, 3.8, 4.48, -14.82));
      group.add(block(3.7, 0.18, 0.3, beamMat, 3.8, 2.02, -14.82));
      group.add(block(0.18, 2.6, 0.3, beamMat, 1.95, 3.25, -14.82));
      group.add(block(0.18, 2.6, 0.3, beamMat, 5.65, 3.25, -14.82));
      group.add(block(0.14, 2.3, 0.28, beamMat, 3.8, 3.25, -14.8));
      group.add(block(3.25, 0.14, 0.28, beamMat, 3.8, 3.25, -14.78));
      group.add(block(1.3, 0.2, 0.12, snowMat, 2.9, 2.23, -14.62));
      group.add(block(1.4, 0.22, 0.12, snowMat, 4.75, 4.18, -14.62));

      group.add(block(4.8, 0.08, 3.0, rugMat, 0.8, -0.04, -8.3));
      group.add(block(5.15, 0.09, 0.18, rugTrimMat, 0.8, 0.01, -6.78));
      group.add(block(5.15, 0.09, 0.18, rugTrimMat, 0.8, 0.01, -9.82));
      group.add(block(0.18, 0.09, 3.1, rugTrimMat, -1.82, 0.01, -8.3));
      group.add(block(0.18, 0.09, 3.1, rugTrimMat, 3.42, 0.01, -8.3));

      group.add(block(2.9, 0.62, 1.0, stoneMat, -3.85, 0.28, -14.1));
      group.add(block(3.35, 2.5, 0.54, stoneMat, -3.85, 1.62, -14.42));
      group.add(block(2.0, 1.55, 0.62, stoneDarkMat, -3.85, 1.08, -14.08));
      group.add(block(3.75, 0.34, 0.8, stoneDarkMat, -3.85, 2.85, -14.22));
      group.add(block(1.2, 3.0, 0.72, stoneMat, -3.85, 4.28, -14.35));
      group.add(block(1.35, 0.18, 0.34, mat(0x6b341a), -4.18, 0.6, -13.72));
      group.add(block(1.25, 0.18, 0.34, mat(0x7f3f1f), -3.42, 0.72, -13.68));

      const flames = [
        block(0.34, 0.72, 0.24, fireMats[2], -4.18, 1.0, -13.64),
        block(0.3, 0.96, 0.22, fireMats[1], -3.84, 1.16, -13.58),
        block(0.24, 0.62, 0.2, fireMats[0], -3.52, 1.04, -13.62),
      ];
      for (const flame of flames) group.add(flame);

      const chair = new THREE.Group();
      chair.position.set(1.95, 0, -8.7);
      chair.rotation.y = -0.16;
      chair.add(block(1.8, 0.46, 1.42, cushionMat, 0, 0.46, 0));
      chair.add(block(1.95, 2.05, 0.42, chairMat, 0, 1.42, -0.52));
      chair.add(block(0.34, 1.15, 1.36, chairMat, -1.1, 0.92, 0.08));
      chair.add(block(0.34, 1.15, 1.36, chairMat, 1.1, 0.92, 0.08));
      group.add(chair);

      const wizard = createWizard({ x: 1.9, y: 0.62, z: -8.35, sitting: true });
      wizard.rotation.y = -0.15;
      group.add(wizard);

      group.add(block(1.22, 0.22, 0.72, mat(0x5e1f45), 1.9, 1.18, -8.0));
      group.add(block(1.1, 0.09, 0.68, mat(0xefc35c), 1.9, 1.33, -7.96));
      group.add(block(0.42, 0.18, 0.58, mat(0x2a1410), 1.18, 0.13, -6.05));
      group.add(block(0.42, 0.18, 0.58, mat(0x2a1410), 1.82, 0.13, -5.94));
      group.add(block(2.1, 0.2, 0.82, mat(0x5b351e), -0.42, 0.48, -5.78));
      group.add(block(0.18, 0.52, 0.18, mat(0x3b2418), -1.32, 0.22, -5.44));
      group.add(block(0.18, 0.52, 0.18, mat(0x3b2418), 0.48, 0.22, -5.44));
      group.add(block(0.72, 0.08, 0.48, mat(0xf2f0df), -0.78, 0.64, -5.58));
      group.add(block(0.72, 0.08, 0.48, mat(0xf2f0df), -0.08, 0.64, -5.58));
      group.add(block(0.08, 0.1, 0.54, mat(0xefc35c), -0.44, 0.68, -5.55));
      group.add(cylinder(0.09, 0.11, 0.32, basic(0xffd36e, 0.86), 0.46, 0.82, -5.82, 16));
      group.add(cylinder(0.14, 0.14, 0.08, mat(0xf2f0df), 0.46, 0.62, -5.82, 16));
      group.add(block(0.82, 0.07, 0.66, mat(0x5e3a22), 2.75, 0.895, -7.83));
      group.add(cylinder(0.055, 0.055, 0.86, mat(0x3b2418), 2.75, 0.43, -7.83, 8));
      group.add(cylinder(0.22, 0.22, 0.02, mat(0xf2f0df), 2.75, 0.93, -7.85, 18));
      group.add(cylinder(0.18, 0.16, 0.34, mat(0xf2f0df), 2.75, 1.1, -7.85, 18));
      group.add(cylinder(0.14, 0.14, 0.04, basic(0xffb36a, 0.92), 2.75, 1.29, -7.85, 18));
      group.add(cylinder(0.1, 0.08, 0.24, basic(0xfff1a3, 0.9), -4.92, 2.15, -13.72, 16));
      group.add(cylinder(0.1, 0.08, 0.24, basic(0xffd36e, 0.82), -2.75, 2.2, -13.72, 16));
      group.add(block(0.12, 1.25, 0.12, mat(0x2a1a10), -2.62, 1.46, -13.58));
      group.add(block(0.42, 0.1, 0.12, mat(0x2a1a10), -2.78, 2.04, -13.58));
      group.add(block(1.9, 0.18, 0.5, beamMat, -6.0, 3.1, -14.8));
      for (let index = 0; index < 10; index += 1) {
        group.add(block(0.16, 0.58 + (index % 3) * 0.08, 0.42, bookMats[index % bookMats.length], -6.78 + index * 0.18, 3.5, -14.6));
      }

      const steam = [];
      const steamSeeds = [[2.73, 1.38, -7.82], [2.77, 1.46, -7.88]];
      for (let index = 0; index < steamSeeds.length; index += 1) {
        const material = teaSteamMat.clone();
        const [x, y, z] = steamSeeds[index];
        const puff = ellipsoid(0.055, 0.22, 0.055, material, x, y, z, 10);
        puff.castShadow = false;
        puff.receiveShadow = false;
        group.add(puff);
        steam.push({ mesh: puff, material, baseX: x, baseY: y, phase: index * 1.4 });
      }

      const fireLight = new THREE.PointLight(0xff9c35, 5.0, 17, 1.55);
      fireLight.position.set(-3.8, 1.7, -12.4);
      group.add(fireLight);
      const windowLight = new THREE.PointLight(0x7dd3fc, 1.25, 12, 2);
      windowLight.position.set(3.8, 3.2, -13.0);
      group.add(windowLight);

      return {
        group,
        camera: new THREE.Vector3(1.05, 3.0, -4.0),
        target: new THREE.Vector3(0.9, 1.55, -8.65),
        background: 0x17111f,
        fog: 0x17111f,
        label: 'Cozy Hearth',
        kicker: 'Winter cleared',
        copy: 'The wizard warms up by the fireplace while the spell hearts refill.',
        animate(seconds) {
          fireLight.intensity = 4.5 + Math.sin(seconds * 13.0) * 0.55 + Math.sin(seconds * 19.0) * 0.24;
          for (let index = 0; index < flames.length; index += 1) {
            const pulse = 1 + Math.sin(seconds * (8.2 + index * 1.3) + index) * 0.16;
            flames[index].scale.set(0.9 + pulse * 0.1, pulse, 0.92 + pulse * 0.08);
          }
          wizard.position.y = 0.62 + Math.sin(seconds * 1.8) * 0.025;
          for (const puff of steam) {
            const rise = (seconds * 0.2 + puff.phase) % 1;
            puff.mesh.position.y = puff.baseY + rise * 0.72;
            puff.mesh.position.x = puff.baseX + Math.sin(seconds * 1.3 + puff.phase) * 0.055;
            puff.mesh.scale.setScalar(0.7 + rise * 0.9);
            puff.material.opacity = (1 - rise) * 0.34;
          }
        },
      };
    }

    function createHotSpring() {
      const group = new THREE.Group();
      scene.add(group);

      const snowMat = mat(0xd9e9f4, { emissive: 0x8fc5ff, emissiveIntensity: 0.05 });
      const snowShadeMat = mat(0x9fb8c8);
      const rockMat = mat(0x5a5b63);
      const darkRockMat = mat(0x30323a);
      const waterMat = basic(0x58dfcf, 0.58);
      const deepWaterMat = mat(0x17495a, { emissive: 0x0e6861, emissiveIntensity: 0.18, transparent: true, opacity: 0.86 });
      const lanternWoodMat = mat(0x5b351e);
      const lanternGlowMat = basic(0xffc86b, 0.88);
      const pineTrunkMat = mat(0x3a2418);
      const pineMat = mat(0x174233);
      const heartMat = basic(0xff7894, 0.9);
      const moonMat = mat(0xfff1b8, { emissive: 0xfff1b8, emissiveIntensity: 0.75 });
      const steamMat = basic(0xe9fbff, 0.32);
      const towelMat = mat(0xf2f0df);
      const trayMat = mat(0x6b341a);

      group.add(block(17, 0.36, 13, snowMat, 0, -0.32, -9.4));
      for (let index = 0; index < 18; index += 1) {
        const x = -8 + index * 0.95;
        group.add(block(0.5, 0.08, 0.5, snowShadeMat, x, -0.08, -14 + (index % 5) * 1.8));
      }

      const pool = new THREE.Group();
      pool.position.set(0, 0, -8.4);
      const rockPositions = [
        [-3.3, 0.18, -1.45, 1.2, 0.44, 0.9], [-2.0, 0.12, -2.0, 1.4, 0.38, 0.7],
        [-0.5, 0.1, -2.22, 1.3, 0.34, 0.65], [1.0, 0.12, -2.04, 1.45, 0.38, 0.74],
        [2.55, 0.16, -1.6, 1.28, 0.46, 0.88], [3.32, 0.18, -0.4, 0.86, 0.46, 1.2],
        [3.0, 0.18, 0.9, 1.2, 0.44, 0.92], [1.7, 0.12, 1.65, 1.42, 0.36, 0.7],
        [0.2, 0.1, 1.92, 1.5, 0.34, 0.64], [-1.25, 0.12, 1.7, 1.34, 0.38, 0.72],
        [-2.62, 0.17, 1.05, 1.0, 0.44, 1.0], [-3.3, 0.18, -0.2, 0.85, 0.46, 1.2],
      ];
      for (const [x, y, z, w, h, d] of rockPositions) pool.add(block(w, h, d, Math.abs(x) > 3 ? darkRockMat : rockMat, x, y, z));
      const water = ellipsoid(5.7, 0.16, 3.25, waterMat, 0, 0.22, -0.08, 28);
      const deepWater = ellipsoid(5.1, 0.34, 2.72, deepWaterMat, 0, 0.0, -0.08, 28);
      pool.add(deepWater, water);
      group.add(pool);

      const wizard = createWizard({ x: 0.2, y: 0.32, z: -8.35, sitting: false, wet: true });
      wizard.rotation.y = 0.08;
      group.add(wizard);
      group.add(block(1.0, 0.08, 0.36, basic(0xe9fbff, 0.35), 0.2, 0.68, -8.0));
      group.add(block(1.15, 0.16, 0.72, towelMat, 2.86, 0.48, -7.0));
      group.add(block(0.94, 0.14, 0.56, mat(0x58dfcf), 2.86, 0.68, -7.0));
      group.add(block(0.78, 0.12, 0.44, towelMat, 2.86, 0.86, -7.0));
      group.add(block(1.3, 0.14, 0.58, trayMat, -2.05, 0.58, -6.25));
      group.add(cylinder(0.16, 0.14, 0.22, mat(0xf2f0df), -2.45, 0.76, -6.2, 18));
      group.add(cylinder(0.16, 0.16, 0.04, basic(0xffb36a, 0.9), -2.45, 0.91, -6.2, 18));
      group.add(block(0.42, 0.1, 0.62, mat(0xb44742), -1.78, 0.72, -6.22));
      group.add(block(0.1, 0.1, 0.66, mat(0xefc35c), -1.78, 0.8, -6.22));
      group.add(block(0.18, 0.94, 0.18, mat(0x6b341a), 3.7, 0.7, -8.0));
      group.add(block(0.78, 0.16, 0.16, mat(0x6b341a), 3.4, 1.16, -8.0));
      group.add(block(0.34, 0.18, 0.34, mat(0xd9e9f4), 3.05, 1.06, -8.0));
      group.add(block(0.18, 0.1, 0.18, basic(0x58dfcf, 0.8), 3.05, 1.14, -8.0));

      function createPine(x, z, scale) {
        const tree = new THREE.Group();
        tree.position.set(x, 0, z);
        tree.scale.setScalar(scale);
        tree.add(block(0.36, 1.55, 0.36, pineTrunkMat, 0, 0.48, 0));
        tree.add(block(1.65, 0.84, 1.65, pineMat, 0, 1.35, 0));
        tree.add(block(1.25, 0.76, 1.25, pineMat, 0, 1.95, 0));
        tree.add(block(0.82, 0.62, 0.82, pineMat, 0, 2.48, 0));
        tree.add(block(1.25, 0.12, 1.25, snowMat, 0, 1.8, 0));
        return tree;
      }
      for (const cfg of [[-6.3, -14.1, 1.0], [-5.5, -6.1, 0.84], [5.9, -13.2, 1.05], [6.6, -7.1, 0.78], [-2.3, -15.6, 0.75]]) {
        group.add(createPine(cfg[0], cfg[1], cfg[2]));
      }

      function lantern(x, z) {
        const item = new THREE.Group();
        item.position.set(x, 0, z);
        item.add(block(0.18, 1.3, 0.18, lanternWoodMat, 0, 0.65, 0));
        item.add(block(0.72, 0.18, 0.18, lanternWoodMat, 0.27, 1.25, 0));
        item.add(cylinder(0.2, 0.18, 0.48, lanternGlowMat, 0.68, 1.02, 0, 18));
        item.add(block(0.44, 0.12, 0.44, lanternWoodMat, 0.68, 1.32, 0));
        item.add(block(0.44, 0.12, 0.44, lanternWoodMat, 0.68, 0.72, 0));
        return item;
      }
      group.add(lantern(-4.7, -6.1));
      group.add(lantern(4.6, -6.6));

      group.add(block(4.2, 0.26, 0.3, mat(0x7c2d20), -4.8, 2.5, -14.4));
      group.add(block(0.3, 3.2, 0.3, mat(0x7c2d20), -6.75, 1.2, -14.4));
      group.add(block(0.3, 3.2, 0.3, mat(0x7c2d20), -2.85, 1.2, -14.4));

      const moon = ellipsoid(1.2, 1.2, 0.15, moonMat, 5.2, 5.1, -15.8, 28);
      moon.castShadow = false;
      group.add(moon);

      const rippleMat = [
        new THREE.MeshBasicMaterial({ color: 0x58dfcf, transparent: true, opacity: 0.22, side: THREE.DoubleSide, blending: THREE.AdditiveBlending, depthWrite: false }),
        new THREE.MeshBasicMaterial({ color: 0x58dfcf, transparent: true, opacity: 0.16, side: THREE.DoubleSide, blending: THREE.AdditiveBlending, depthWrite: false }),
        new THREE.MeshBasicMaterial({ color: 0x7eeee6, transparent: true, opacity: 0.12, side: THREE.DoubleSide, blending: THREE.AdditiveBlending, depthWrite: false }),
      ];
      const ripples = rippleMat.map((m, i) => {
        const geo = new THREE.RingGeometry(1.0 + i * 0.9, 1.22 + i * 0.9, 40);
        const mesh = new THREE.Mesh(geo, m);
        mesh.rotation.x = -Math.PI / 2;
        mesh.position.set(0, 0.26, -8.48);
        mesh.castShadow = false;
        mesh.receiveShadow = false;
        group.add(mesh);
        return { mesh, mat: m, phase: i * 1.1 };
      });

      const steam = [];
      const steamSeeds = [[-1.1, 0.98, -8.55], [0.4, 1.08, -7.7], [1.75, 0.98, -8.35]];
      for (let index = 0; index < steamSeeds.length; index += 1) {
        const material = steamMat.clone();
        const [x, y, z] = steamSeeds[index];
        const puff = cylinder(0.035, 0.065, 0.62, material, x, y, z, 12);
        puff.castShadow = false;
        puff.receiveShadow = false;
        group.add(puff);
        steam.push({ mesh: puff, material, baseY: y, baseX: x, phase: index * 1.5 });
      }

      const springLight = new THREE.PointLight(0x58dfcf, 3.4, 14, 1.7);
      springLight.position.set(0, 1.2, -8.2);
      group.add(springLight);
      const lanternLight = new THREE.PointLight(0xffc86b, 2.5, 10, 1.8);
      lanternLight.position.set(-4.05, 1.4, -6.1);
      group.add(lanternLight);

      return {
        group,
        camera: new THREE.Vector3(0.35, 2.65, -4.5),
        target: new THREE.Vector3(0.2, 1.1, -8.5),
        background: 0x0f1a2a,
        fog: 0x0f1a2a,
        label: 'Moonlit Spring',
        kicker: 'Spring restored',
        copy: 'The wizard soaks in a hot spring while steam and moonlight refill every heart.',
        animate(seconds) {
          water.scale.set(1 + Math.sin(seconds * 2.0) * 0.015, 1, 1 + Math.cos(seconds * 2.4) * 0.02);
          water.position.y = 0.22 + Math.sin(seconds * 2.6) * 0.025;
          springLight.intensity = 3.0 + Math.sin(seconds * 2.8) * 0.35;
          lanternLight.intensity = 2.25 + Math.sin(seconds * 11.0) * 0.24;
          wizard.position.y = 0.32 + Math.sin(seconds * 1.65) * 0.018;
          for (const puff of steam) {
            const rise = (seconds * 0.18 + puff.phase) % 1;
            puff.mesh.position.y = puff.baseY + rise * 1.25;
            puff.mesh.position.x = puff.baseX + Math.sin(seconds * 1.25 + puff.phase) * 0.08;
            puff.mesh.scale.set(1 + rise * 0.45, 1 + rise * 0.85, 1 + rise * 0.45);
            puff.material.opacity = (1 - rise) * 0.14;
          }
          for (const r of ripples) {
            const t = (seconds * 0.28 + r.phase) % 1;
            const s = 0.5 + t * 0.9;
            r.mesh.scale.set(s, s, 1);
            r.mat.opacity = (1 - t) * (r === ripples[0] ? 0.22 : r === ripples[1] ? 0.16 : 0.12);
          }
        },
      };
    }

    groups.push(createCozyHearth(), createHotSpring());
    animators.push(...groups);

    function setActive(index) {
      activeIndex = index % groups.length;
      const active = groups[activeIndex];
      for (let i = 0; i < groups.length; i += 1) groups[i].group.visible = i === activeIndex;
      scene.background.setHex(active.background);
      scene.fog.color.setHex(active.fog);
      stateChip.textContent = active.label;
      kicker.textContent = active.kicker;
      sceneTitle.textContent = active.label;
      sceneCopy.textContent = active.copy;
    }

    continueButton.addEventListener('click', () => setActive(activeIndex + 1));

    function resize() {
      const width = window.innerWidth;
      const height = window.innerHeight;
      renderer.setSize(width, height, false);
      camera.aspect = width / height;
      camera.updateProjectionMatrix();
    }

    window.addEventListener('resize', resize);
    resize();
    setActive(0);

    function animate() {
      requestAnimationFrame(animate);
      const seconds = clock.getElapsedTime();
      const active = groups[activeIndex];
      camera.position.copy(active.camera);
      camera.position.x += Math.sin(seconds * 0.34) * 0.06;
      camera.position.y += Math.sin(seconds * 0.48) * 0.035;
      camera.lookAt(active.target);
      active.animate(seconds);
      renderer.render(scene, camera);
    }

    animate();
  </script>
</body>

</html>
