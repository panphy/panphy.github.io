<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="theme-color" content="#090909">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>Reflex Core | PanPhy Labs Beta</title>
  <link rel="icon" type="image/png" href="../assets/favicon.png">
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --bg: #120b10;
      --panel: rgba(31, 22, 28, 0.78);
      --panel-strong: rgba(24, 15, 21, 0.92);
      --line: rgba(255, 226, 198, 0.17);
      --text: #fff7ee;
      --muted: rgba(255, 247, 238, 0.68);
      --warm: #ffb44d;
      --danger: #ff4d5d;
      --target: #45f59d;
      --cyan: #57c7ff;
      --violet: #d26bff;
      --shadow: rgba(21, 8, 14, 0.48);
    }

    html,
    body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: var(--bg);
      color: var(--text);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      user-select: none;
      -webkit-user-select: none;
    }

    body {
      position: fixed;
      inset: 0;
      touch-action: manipulation;
    }

    #app {
      position: fixed;
      inset: 0;
      display: flex;
      overflow: hidden;
      background:
        linear-gradient(135deg, rgba(255, 180, 77, 0.14), transparent 24%),
        linear-gradient(225deg, rgba(69, 245, 157, 0.1), transparent 28%),
        radial-gradient(circle at 50% 45%, rgba(255, 180, 77, 0.1), transparent 34%),
        repeating-linear-gradient(90deg, rgba(255, 255, 255, 0.028) 0 1px, transparent 1px 58px),
        repeating-linear-gradient(0deg, rgba(255, 180, 77, 0.02) 0 1px, transparent 1px 58px),
        linear-gradient(160deg, #211018 0%, #120b10 46%, #09201c 100%);
    }

    #scene {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      display: block;
    }

    .vignette {
      position: absolute;
      inset: 0;
      pointer-events: none;
      background:
        linear-gradient(180deg, rgba(18, 8, 14, 0.35), transparent 22%, transparent 68%, rgba(8, 5, 6, 0.62)),
        radial-gradient(ellipse at center, transparent 38%, rgba(11, 4, 9, 0.48));
      z-index: 2;
    }

    .hud {
      position: absolute;
      left: max(18px, env(safe-area-inset-left));
      right: max(18px, env(safe-area-inset-right));
      top: max(16px, env(safe-area-inset-top));
      z-index: 4;
      display: grid;
      grid-template-columns: minmax(120px, 1fr) auto minmax(120px, 1fr);
      align-items: center;
      gap: 14px;
      pointer-events: none;
    }

    .brand,
    .status-card,
    .hud-actions,
    .metrics,
    .briefing {
      border: 1px solid var(--line);
      background: var(--panel);
      box-shadow: 0 18px 42px var(--shadow);
      backdrop-filter: blur(18px);
      -webkit-backdrop-filter: blur(18px);
    }

    .brand {
      width: fit-content;
      min-height: 54px;
      padding: 10px 14px;
      border-radius: 18px;
      display: inline-flex;
      align-items: center;
      gap: 10px;
      pointer-events: auto;
      color: var(--text);
      text-decoration: none;
    }

    .brand img {
      width: 38px;
      height: 38px;
      object-fit: contain;
      filter: drop-shadow(0 6px 14px rgba(0, 0, 0, 0.55));
    }

    .brand strong {
      display: block;
      font-size: 0.78rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .brand span {
      display: block;
      margin-top: 1px;
      color: var(--muted);
      font-size: 0.72rem;
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }

    .status-card {
      justify-self: center;
      min-width: min(460px, 48vw);
      padding: 12px 18px;
      border-radius: 20px;
      text-align: center;
    }

    .status-card p {
      color: var(--muted);
      font-size: 0.74rem;
      font-weight: 800;
      letter-spacing: 0.13em;
      text-transform: uppercase;
    }

    .status-card h1 {
      margin-top: 3px;
      font-size: clamp(1.25rem, 2.5vw, 2rem);
      line-height: 1.05;
      letter-spacing: 0;
    }

    .hud-actions {
      justify-self: end;
      min-height: 54px;
      padding: 8px;
      border-radius: 18px;
      display: flex;
      align-items: center;
      gap: 8px;
      pointer-events: auto;
    }

    button {
      min-height: 44px;
      border: 1px solid rgba(255, 255, 255, 0.16);
      border-radius: 14px;
      background: rgba(255, 241, 221, 0.08);
      color: var(--text);
      font: inherit;
      font-weight: 800;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      cursor: pointer;
      transition: transform 0.16s ease, border-color 0.16s ease, background 0.16s ease;
      touch-action: manipulation;
    }

    button:hover {
      border-color: rgba(255, 255, 255, 0.34);
      background: rgba(255, 255, 255, 0.13);
    }

    button:active {
      transform: translateY(1px) scale(0.99);
    }

    button:focus-visible {
      outline: 3px solid rgba(69, 245, 157, 0.45);
      outline-offset: 3px;
    }

    .primary-button {
      min-width: 128px;
      padding: 0 18px;
      background: linear-gradient(135deg, rgba(69, 245, 157, 0.95), rgba(87, 199, 255, 0.9));
      color: #05100b;
      border-color: rgba(255, 255, 255, 0.32);
      box-shadow: 0 14px 32px rgba(69, 245, 157, 0.24);
    }

    .icon-button {
      width: 46px;
      padding: 0;
      display: inline-grid;
      place-items: center;
    }

    .icon-button svg {
      width: 22px;
      height: 22px;
    }

    .metrics {
      position: absolute;
      left: max(18px, env(safe-area-inset-left));
      right: max(18px, env(safe-area-inset-right));
      bottom: max(18px, env(safe-area-inset-bottom));
      z-index: 4;
      min-height: 84px;
      border-radius: 22px;
      padding: 12px;
      display: grid;
      grid-template-columns: repeat(5, minmax(0, 1fr));
      gap: 10px;
      pointer-events: none;
    }

    .metric {
      min-width: 0;
      border-radius: 15px;
      padding: 10px 12px;
      background: rgba(255, 241, 221, 0.07);
      border: 1px solid rgba(255, 226, 198, 0.09);
    }

    .metric span {
      display: block;
      color: var(--muted);
      font-size: 0.68rem;
      font-weight: 800;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      white-space: nowrap;
    }

    .metric strong {
      display: block;
      margin-top: 4px;
      font-variant-numeric: tabular-nums;
      font-size: clamp(1rem, 2vw, 1.5rem);
      line-height: 1.1;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .briefing {
      position: absolute;
      left: 50%;
      top: 50%;
      z-index: 5;
      width: min(440px, calc(100vw - 36px));
      transform: translate(-50%, -50%);
      border-radius: 24px;
      padding: 24px;
      text-align: center;
      pointer-events: auto;
    }

    .briefing[hidden] {
      display: none;
    }

    .briefing p {
      color: var(--muted);
      font-size: 0.8rem;
      font-weight: 800;
      letter-spacing: 0.14em;
      text-transform: uppercase;
    }

    .briefing h2 {
      margin-top: 8px;
      font-size: clamp(2rem, 9vw, 4rem);
      line-height: 0.92;
      letter-spacing: 0;
    }

    .briefing .summary {
      margin: 18px auto 22px;
      max-width: 34ch;
      color: rgba(247, 244, 234, 0.78);
      font-size: 1rem;
      font-weight: 650;
      letter-spacing: 0;
      line-height: 1.45;
      text-transform: none;
    }

    .briefing .primary-button {
      width: 100%;
    }

    .flash {
      position: absolute;
      inset: 0;
      z-index: 3;
      pointer-events: none;
      opacity: 0;
      background: radial-gradient(circle, rgba(69, 245, 157, 0.32), transparent 55%);
      transition: opacity 0.12s ease;
    }

    .flash.is-on {
      opacity: 1;
    }

    .trial-rail {
      position: absolute;
      left: 50%;
      bottom: calc(max(18px, env(safe-area-inset-bottom)) + 104px);
      z-index: 4;
      display: flex;
      gap: 8px;
      transform: translateX(-50%);
      pointer-events: none;
    }

    .pip {
      width: 12px;
      height: 12px;
      border-radius: 999px;
      border: 1px solid rgba(255, 255, 255, 0.18);
      background: rgba(255, 255, 255, 0.1);
    }

    .pip.is-hit {
      background: var(--target);
      box-shadow: 0 0 18px rgba(69, 245, 157, 0.78);
    }

    .pip.is-catch {
      background: var(--cyan);
      box-shadow: 0 0 18px rgba(87, 199, 255, 0.65);
    }

    .pip.is-false {
      background: var(--danger);
      box-shadow: 0 0 18px rgba(255, 77, 93, 0.68);
    }

    .pip.is-miss {
      background: transparent;
      border-color: var(--danger);
      box-shadow: 0 0 12px rgba(255, 77, 93, 0.45);
    }

    @media (max-width: 780px) {
      .hud {
        grid-template-columns: 1fr auto;
        align-items: start;
      }

      .brand {
        min-height: 48px;
        padding: 8px 10px;
      }

      .brand img {
        width: 32px;
        height: 32px;
      }

      .brand div {
        display: none;
      }

      .status-card {
        order: 3;
        grid-column: 1 / -1;
        width: 100%;
        min-width: 0;
      }

      .hud-actions {
        min-height: 48px;
      }

      .metrics {
        grid-template-columns: repeat(3, minmax(0, 1fr));
      }

      .metric {
        padding: 9px 10px;
      }

      .trial-rail {
        bottom: calc(max(18px, env(safe-area-inset-bottom)) + 154px);
      }
    }

    @media (max-width: 430px) {
      .hud {
        left: 12px;
        right: 12px;
        top: 12px;
        gap: 10px;
      }

      .hud-actions {
        gap: 6px;
      }

      .primary-button {
        min-width: 108px;
        padding: 0 12px;
      }

      .icon-button {
        width: 44px;
      }

      .metrics {
        left: 12px;
        right: 12px;
        bottom: 12px;
        gap: 7px;
        padding: 8px;
      }

      .metric span {
        font-size: 0.58rem;
      }

      .metric strong {
        font-size: 0.94rem;
      }
    }

    @media (prefers-reduced-motion: reduce) {
      *,
      *::before,
      *::after {
        animation-duration: 0.01ms !important;
        transition-duration: 0.01ms !important;
      }
    }
  </style>
</head>

<body>
  <div id="app">
    <canvas id="scene" aria-label="Reflex Core beta game scene"></canvas>
    <div class="vignette" aria-hidden="true"></div>
    <div class="flash" id="screenFlash" aria-hidden="true"></div>

    <header class="hud" aria-label="Game status">
      <a class="brand" href="../" aria-label="PanPhy Labs home">
        <img src="../assets/panphy.png" alt="PanPhy Labs">
        <div>
          <strong>PanPhy Labs</strong>
          <span>Beta chamber</span>
        </div>
      </a>

      <section class="status-card" aria-live="polite" aria-atomic="true">
        <p id="statusKicker">Rule</p>
        <h1 id="statusTitle">Center green only</h1>
      </section>

      <div class="hud-actions">
        <button class="primary-button" id="startButton" type="button">Start</button>
        <button class="icon-button" id="resetButton" type="button" aria-label="Reset stats" title="Reset stats">
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <path d="M5 6.5h9.2a5.8 5.8 0 1 1-4.1 9.9" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"></path>
            <path d="M5 6.5 8.4 3M5 6.5 8.4 10" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"></path>
          </svg>
        </button>
      </div>
    </header>

    <div class="trial-rail" id="trialRail" aria-hidden="true"></div>

    <section class="metrics" aria-label="Session metrics">
      <div class="metric">
        <span>Round</span>
        <strong id="roundValue">0/10</strong>
      </div>
      <div class="metric">
        <span>Best</span>
        <strong id="bestValue">--</strong>
      </div>
      <div class="metric">
        <span>Average</span>
        <strong id="averageValue">--</strong>
      </div>
      <div class="metric">
        <span>Hits</span>
        <strong id="hitsValue">0</strong>
      </div>
      <div class="metric">
        <span>False</span>
        <strong id="falseValue">0</strong>
      </div>
    </section>

    <section class="briefing" id="briefingPanel" aria-live="polite">
      <p id="briefingKicker">Reflex Core</p>
      <h2 id="briefingTitle">Center green only</h2>
      <div class="summary" id="briefingCopy">Tap only when the center core turns green. Ignore blue, amber, and red flashes around it.</div>
      <button class="primary-button" id="briefingButton" type="button">Start Run</button>
    </section>
  </div>

  <script type="module">
    import * as THREE from 'https://cdn.jsdelivr.net/npm/three@0.164.1/build/three.module.js';

    const canvas = document.getElementById('scene');
    const app = document.getElementById('app');
    const screenFlash = document.getElementById('screenFlash');
    const startButton = document.getElementById('startButton');
    const resetButton = document.getElementById('resetButton');
    const briefingPanel = document.getElementById('briefingPanel');
    const briefingKicker = document.getElementById('briefingKicker');
    const briefingTitle = document.getElementById('briefingTitle');
    const briefingCopy = document.getElementById('briefingCopy');
    const briefingButton = document.getElementById('briefingButton');
    const statusKicker = document.getElementById('statusKicker');
    const statusTitle = document.getElementById('statusTitle');
    const roundValue = document.getElementById('roundValue');
    const bestValue = document.getElementById('bestValue');
    const averageValue = document.getElementById('averageValue');
    const hitsValue = document.getElementById('hitsValue');
    const falseValue = document.getElementById('falseValue');
    const trialRail = document.getElementById('trialRail');

    const STORAGE_KEY = 'panphyBetaReflexCoreBestMsV1';
    const TOTAL_ROUNDS = 10;
    const CATCH_ROUNDS_PER_SESSION = 2;
    const MIN_DELAY = 1200;
    const MAX_DELAY = 6400;
    const SIGNAL_WINDOW = 1500;
    const MIN_VALID_REACTION = 100;
    const RESULT_PAUSE = 900;
    const CATCH_RESULT_PAUSE = 650;
    const COLORS = {
      idle: new THREE.Color(0x29313a),
      target: new THREE.Color(0x45f59d),
      amber: new THREE.Color(0xffb44d),
      red: new THREE.Color(0xff4d5d),
      cyan: new THREE.Color(0x57c7ff),
      violet: new THREE.Color(0xd26bff),
      white: new THREE.Color(0xfff4dc),
    };

    const state = {
      mode: 'idle',
      round: 0,
      hits: 0,
      falseStarts: 0,
      catches: 0,
      misses: 0,
      totalReaction: 0,
      bestMs: loadBest(),
      currentSignalAt: 0,
      targetActive: false,
      timers: [],
      pips: Array(TOTAL_ROUNDS).fill('empty'),
      lastOutcome: '',
      currentTrialCatch: false,
      nextTrialAt: 0,
      catchRounds: new Set(),
    };

    const visual = {
      time: 0,
      corePulse: 0,
      targetPulse: 0,
      distractPulse: 0,
      catchPulse: 0,
      missPulse: 0,
      shake: 0,
      sideColor: COLORS.idle.clone(),
      coreColor: COLORS.idle.clone(),
      ringColor: COLORS.cyan.clone(),
      messageIntensity: 0,
    };

    const renderer = new THREE.WebGLRenderer({
      canvas,
      antialias: true,
      alpha: false,
      powerPreference: 'high-performance',
    });
    renderer.setPixelRatio(Math.min(window.devicePixelRatio || 1, 2));
    renderer.setSize(window.innerWidth, window.innerHeight, false);
    renderer.outputColorSpace = THREE.SRGBColorSpace;
    renderer.toneMapping = THREE.ACESFilmicToneMapping;
    renderer.toneMappingExposure = 1.05;

    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x120b10);
    scene.fog = new THREE.FogExp2(0x120b10, 0.022);

    const camera = new THREE.PerspectiveCamera(58, window.innerWidth / window.innerHeight, 0.1, 160);
    camera.position.set(0, 2.4, 9.4);
    camera.lookAt(0, 0, 0);

    const clock = new THREE.Clock();

    const ambient = new THREE.HemisphereLight(0xffdfbd, 0x1b241b, 1.75);
    scene.add(ambient);

    const key = new THREE.DirectionalLight(0xffe4bd, 3.0);
    key.position.set(4, 8, 7);
    scene.add(key);

    const rim = new THREE.PointLight(0xffb44d, 2.1, 24);
    rim.position.set(-4.8, 2.3, 2.4);
    scene.add(rim);

    const chamber = new THREE.Group();
    scene.add(chamber);

    const backgroundAccents = createBackgroundAccents();
    chamber.add(backgroundAccents);

    const backplane = createLabBackplane();
    chamber.add(backplane);

    const gateGroup = new THREE.Group();
    gateGroup.position.set(0, 0.45, 0);
    chamber.add(gateGroup);

    const outerRing = createRing(3.8, 3.98, COLORS.cyan, 0.42);
    const midRing = createRing(2.45, 2.56, COLORS.amber, 0.38);
    const innerRing = createRing(1.42, 1.5, COLORS.violet, 0.34);
    gateGroup.add(outerRing, midRing, innerRing);

    const coreMaterial = new THREE.MeshPhysicalMaterial({
      color: COLORS.idle,
      emissive: COLORS.idle,
      emissiveIntensity: 0.8,
      roughness: 0.22,
      metalness: 0.12,
      clearcoat: 0.9,
      clearcoatRoughness: 0.18,
    });
    const core = new THREE.Mesh(new THREE.IcosahedronGeometry(0.86, 5), coreMaterial);
    gateGroup.add(core);

    const coreWire = new THREE.LineSegments(
      new THREE.WireframeGeometry(new THREE.IcosahedronGeometry(0.91, 3)),
      new THREE.LineBasicMaterial({ color: 0xffffff, transparent: true, opacity: 0.18 })
    );
    gateGroup.add(coreWire);

    const hitText = createPixelTextSprite('Hit Me!');
    hitText.position.set(0, 0.02, 1.08);
    hitText.scale.set(1.35, 0.48, 1);
    gateGroup.add(hitText);

    const haloMaterial = new THREE.MeshBasicMaterial({
      color: COLORS.target,
      transparent: true,
      opacity: 0,
      blending: THREE.AdditiveBlending,
      depthWrite: false,
    });
    const halo = new THREE.Mesh(new THREE.RingGeometry(1.05, 1.16, 96), haloMaterial);
    gateGroup.add(halo);

    const signalPads = [];
    for (let i = 0; i < 6; i++) {
      const angle = (i / 6) * Math.PI * 2;
      const pad = createSignalPad();
      pad.position.set(Math.cos(angle) * 4.55, Math.sin(angle) * 2.52 + 0.02, -0.26);
      pad.rotation.z = angle - Math.PI / 2;
      gateGroup.add(pad);
      signalPads.push(pad);
    }

    const calibrationDust = createCalibrationDust();
    scene.add(calibrationDust.points);

    buildPips();
    updateHud();
    showBriefing('Reflex Core', 'Center green only', 'Tap only when the center core turns green. Ignore blue, amber, and red flashes around it.', 'Start Run');

    startButton.addEventListener('click', () => {
      if (state.mode === 'running' || state.mode === 'waiting' || state.mode === 'signalPending' || state.mode === 'signal') {
        stopSession();
      } else {
        startSession();
      }
    });

    briefingButton.addEventListener('click', startSession);

    resetButton.addEventListener('click', () => {
      clearTimers();
      state.mode = 'idle';
      state.targetActive = false;
      state.currentSignalAt = 0;
      state.round = 0;
      state.hits = 0;
      state.falseStarts = 0;
      state.catches = 0;
      state.misses = 0;
      state.totalReaction = 0;
      state.pips = Array(TOTAL_ROUNDS).fill('empty');
      state.lastOutcome = '';
      state.bestMs = null;
      state.catchRounds = new Set();
      safeRemove(STORAGE_KEY);
      startButton.textContent = 'Start';
      buildPips();
      updateHud();
      resetVisuals();
      showBriefing('Reflex Core', 'Center green only', 'Tap only when the center core turns green. Ignore blue, amber, and red flashes around it.', 'Start Run');
      resetButton.blur();
    });

    app.addEventListener('pointerdown', (event) => {
      if (event.target.closest('button, a')) return;
      event.preventDefault();
      handleAction();
    }, { passive: false });

    document.addEventListener('keydown', (event) => {
      if (event.repeat) return;
      if (event.code !== 'Space' && event.code !== 'Enter') return;
      event.preventDefault();
      handleAction();
    });

    document.addEventListener('visibilitychange', () => {
      if (document.hidden && (state.mode === 'waiting' || state.mode === 'signalPending' || state.mode === 'signal')) {
        stopSession();
      }
    });

    window.addEventListener('resize', resize);

    animate();

    function startSession() {
      clearTimers();
      state.mode = 'running';
      state.round = 0;
      state.hits = 0;
      state.falseStarts = 0;
      state.catches = 0;
      state.misses = 0;
      state.totalReaction = 0;
      state.currentSignalAt = 0;
      state.targetActive = false;
      state.pips = Array(TOTAL_ROUNDS).fill('empty');
      state.lastOutcome = '';
      state.catchRounds = generateCatchRounds(TOTAL_ROUNDS, CATCH_ROUNDS_PER_SESSION);
      startButton.textContent = 'Stop';
      briefingPanel.hidden = true;
      buildPips();
      updateHud();
      scheduleNextTrial(500);
    }

    function stopSession() {
      clearTimers();
      state.mode = 'idle';
      state.targetActive = false;
      state.currentSignalAt = 0;
      startButton.textContent = 'Start';
      statusKicker.textContent = 'Rule';
      statusTitle.textContent = 'Center green only';
      showBriefing('Run stopped', 'Center green only', 'Tap only when the center core turns green. Ignore blue, amber, and red flashes around it.', 'Start Run');
      resetVisuals();
    }

    function scheduleNextTrial(delay) {
      const timer = window.setTimeout(beginTrial, delay);
      state.timers.push(timer);
      state.nextTrialAt = performance.now() + delay;
    }

    function beginTrial() {
      clearTimers();
      if (state.round >= TOTAL_ROUNDS) {
        finishSession();
        return;
      }

      state.round += 1;
      state.mode = 'waiting';
      state.targetActive = false;
      state.currentSignalAt = 0;
      state.currentTrialCatch = state.catchRounds.has(state.round);
      resetVisuals();
      updateHud();

      statusKicker.textContent = 'Wait';
      statusTitle.textContent = 'Center green only';

      const targetDelay = randomHazardDelay();
      const catchDuration = randomBetween(3600, 6800);
      const trialEnd = state.currentTrialCatch ? catchDuration : targetDelay;
      scheduleDistractors(trialEnd);

      if (state.currentTrialCatch) {
        const timer = window.setTimeout(completeCatchTrial, catchDuration);
        state.timers.push(timer);
      } else {
        const timer = window.setTimeout(startSignal, targetDelay);
        state.timers.push(timer);
      }
    }

    function scheduleDistractors(trialEnd) {
      const count = Math.min(5, Math.max(1, Math.floor(trialEnd / 1200)));
      const reservedTail = state.currentTrialCatch ? 450 : 650;
      const latest = Math.max(900, trialEnd - reservedTail);
      const slots = [];

      for (let i = 0; i < count; i++) {
        const at = randomBetween(450, latest);
        if (slots.every((slot) => Math.abs(slot - at) > 480)) {
          slots.push(at);
        }
      }

      slots.sort((a, b) => a - b).forEach((at, index) => {
        const timer = window.setTimeout(() => {
          const types = ['amber', 'red', 'cyan', 'violet', 'shake'];
          runDistractor(types[(index + Math.floor(Math.random() * types.length)) % types.length]);
        }, at);
        state.timers.push(timer);
      });
    }

    function startSignal() {
      if (state.mode !== 'waiting') return;
      state.mode = 'signalPending';
      state.targetActive = false;
      state.currentSignalAt = 0;
    }

    function revealSignalOnFrame(frameTime) {
      if (state.mode !== 'signalPending') return;
      state.mode = 'signal';
      state.targetActive = true;
      state.currentSignalAt = frameTime;
      visual.targetPulse = 1;
      visual.corePulse = 1;
      visual.messageIntensity = 1;
      statusKicker.textContent = 'Now';
      statusTitle.textContent = 'Tap';
      flashScreen('target');
      pulseCore(COLORS.target);

      const missTimer = window.setTimeout(() => {
        if (state.mode === 'signal') {
          completeMiss('Missed signal');
        }
      }, SIGNAL_WINDOW);
      state.timers.push(missTimer);
    }

    function completeCatchTrial() {
      if (state.mode !== 'waiting') return;
      state.mode = 'result';
      state.catches += 1;
      state.pips[state.round - 1] = 'catch';
      state.lastOutcome = 'Catch held';
      visual.catchPulse = 1;
      statusKicker.textContent = 'Good hold';
      statusTitle.textContent = 'No green signal';
      updateHud();
      buildPips();
      scheduleNextTrial(CATCH_RESULT_PAUSE);
    }

    function handleAction() {
      if (state.mode === 'idle') {
        startSession();
        return;
      }

      if (state.mode === 'waiting') {
        completeFalseStart('False start');
        return;
      }

      if (state.mode === 'signalPending') {
        completeFalseStart('Predicted');
        return;
      }

      if (state.mode === 'signal') {
        const reactionMs = performance.now() - state.currentSignalAt;
        if (reactionMs < MIN_VALID_REACTION) {
          completeFalseStart('Predicted');
          return;
        }
        completeHit(reactionMs);
        return;
      }

      if (state.mode === 'summary') {
        startSession();
      }
    }

    function completeHit(reactionMs) {
      clearTimers();
      state.mode = 'result';
      state.targetActive = false;
      state.hits += 1;
      state.totalReaction += reactionMs;
      state.pips[state.round - 1] = 'hit';
      state.lastOutcome = formatSeconds(reactionMs);
      visual.targetPulse = 1;
      visual.corePulse = 1;
      statusTitle.textContent = formatSeconds(reactionMs);

      if (state.bestMs === null || reactionMs < state.bestMs) {
        state.bestMs = reactionMs;
        safeSet(STORAGE_KEY, String(Math.round(reactionMs)));
        statusKicker.textContent = 'New Best!';
      } else {
        statusKicker.textContent = 'Hit';
      }

      updateHud();
      buildPips();
      scheduleNextTrial(RESULT_PAUSE);
    }

    function completeFalseStart(label) {
      clearTimers();
      state.mode = 'result';
      state.targetActive = false;
      state.falseStarts += 1;
      state.pips[state.round - 1] = 'false';
      state.lastOutcome = label;
      visual.missPulse = 1;
      visual.shake = 1;
      statusKicker.textContent = label;
      statusTitle.textContent = 'Only tap green';
      flashScreen('danger');
      pulseCore(COLORS.red);
      updateHud();
      buildPips();
      scheduleNextTrial(RESULT_PAUSE + 250);
    }

    function completeMiss(label) {
      clearTimers();
      state.mode = 'result';
      state.targetActive = false;
      state.misses += 1;
      state.pips[state.round - 1] = 'miss';
      state.lastOutcome = label;
      visual.missPulse = 1;
      statusKicker.textContent = 'Missed';
      statusTitle.textContent = 'Green passed';
      pulseCore(COLORS.red);
      updateHud();
      buildPips();
      scheduleNextTrial(RESULT_PAUSE);
    }

    function finishSession() {
      clearTimers();
      state.mode = 'summary';
      state.targetActive = false;
      startButton.textContent = 'Start';
      const accuracy = Math.round(((state.hits + state.catches) / TOTAL_ROUNDS) * 100);
      const average = state.hits ? `${formatSeconds(state.totalReaction / state.hits)} average` : 'No clean hits';
      statusKicker.textContent = 'Session';
      statusTitle.textContent = `${accuracy}% clean`;
      showBriefing('Session complete', state.hits ? formatSeconds(state.totalReaction / state.hits) : 'No hits', `${average}. ${state.falseStarts} false start${state.falseStarts !== 1 ? 's' : ''}, ${state.misses} missed, ${state.catches} good hold${state.catches !== 1 ? 's' : ''}.`, 'Run Again');
      updateHud();
    }

    function runDistractor(type) {
      if (state.mode !== 'waiting') return;
      visual.distractPulse = 1;

      if (type === 'amber') {
        pulseSides(COLORS.amber);
      } else if (type === 'red') {
        pulseSides(COLORS.red);
      } else if (type === 'cyan') {
        pulseSides(COLORS.cyan);
      } else if (type === 'violet') {
        pulseSides(COLORS.violet);
      } else {
        visual.shake = Math.max(visual.shake, 0.62);
        pulseSides(COLORS.violet);
      }
    }

    function pulseCore(color) {
      visual.coreColor.copy(color);
      visual.corePulse = Math.max(visual.corePulse, 0.78);
    }

    function pulseSides(color) {
      visual.sideColor.copy(color);
      visual.distractPulse = Math.max(visual.distractPulse, 0.82);
    }

    function flashScreen(type) {
      if (type === 'danger') {
        screenFlash.style.background = 'radial-gradient(circle, rgba(255, 77, 93, 0.35), transparent 58%)';
      } else {
        screenFlash.style.background = 'radial-gradient(circle, rgba(69, 245, 157, 0.32), transparent 55%)';
      }
      screenFlash.classList.add('is-on');
      window.setTimeout(() => screenFlash.classList.remove('is-on'), 120);
    }

    function updateHud() {
      roundValue.textContent = `${state.round}/${TOTAL_ROUNDS}`;
      bestValue.textContent = state.bestMs === null ? '--' : formatSeconds(state.bestMs);
      averageValue.textContent = state.hits ? formatSeconds(state.totalReaction / state.hits) : '--';
      hitsValue.textContent = String(state.hits);
      falseValue.textContent = String(state.falseStarts);
    }

    function formatSeconds(ms) {
      return `${(ms / 1000).toFixed(3)} s`;
    }

    function showBriefing(kicker, title, copy, buttonText) {
      briefingKicker.textContent = kicker;
      briefingTitle.textContent = title;
      briefingCopy.textContent = copy;
      briefingButton.textContent = buttonText;
      briefingPanel.hidden = false;
    }

    function buildPips() {
      trialRail.textContent = '';
      state.pips.forEach((pipState) => {
        const pip = document.createElement('span');
        pip.className = 'pip';
        if (pipState === 'hit') pip.classList.add('is-hit');
        if (pipState === 'catch') pip.classList.add('is-catch');
        if (pipState === 'false') pip.classList.add('is-false');
        if (pipState === 'miss') pip.classList.add('is-miss');
        trialRail.appendChild(pip);
      });
    }

    function resetVisuals() {
      visual.targetPulse = 0;
      visual.distractPulse = 0;
      visual.catchPulse = 0;
      visual.missPulse = 0;
      visual.messageIntensity = 0;
      visual.coreColor.copy(COLORS.idle);
      visual.sideColor.copy(COLORS.idle);
    }

    function clearTimers() {
      state.timers.forEach((timer) => window.clearTimeout(timer));
      state.timers = [];
    }

    function generateCatchRounds(total, count) {
      const rounds = new Set();
      while (rounds.size < count) {
        rounds.add(Math.floor(Math.random() * total) + 1);
      }
      return rounds;
    }

    function randomHazardDelay() {
      const raw = MIN_DELAY + (-Math.log(1 - Math.random()) * 1700);
      return Math.min(MAX_DELAY, Math.max(MIN_DELAY, raw + randomBetween(-260, 520)));
    }

    function randomBetween(min, max) {
      return min + Math.random() * (max - min);
    }

    function loadBest() {
      try {
        const value = Number(localStorage.getItem(STORAGE_KEY));
        return Number.isFinite(value) && value > 0 ? value : null;
      } catch (error) {
        return null;
      }
    }

    function safeSet(key, value) {
      try {
        localStorage.setItem(key, value);
      } catch (error) {
        // Ignore storage failures in beta.
      }
    }

    function safeRemove(key) {
      try {
        localStorage.removeItem(key);
      } catch (error) {
        // Ignore storage failures in beta.
      }
    }

    function createRing(innerRadius, outerRadius, color, opacity) {

      const material = new THREE.MeshBasicMaterial({

    function createPixelTextSprite(text) {
      const canvas = document.createElement('canvas');
      canvas.width = 192;
      canvas.height = 64;
      const context = canvas.getContext('2d');
      context.imageSmoothingEnabled = false;
      drawPixelText(context, text, 0, 19, 4, '#fff7c8', true);
      drawPixelText(context, text, 0, 17, 4, '#211033', true);

      const texture = new THREE.CanvasTexture(canvas);
      texture.colorSpace = THREE.SRGBColorSpace;
      texture.magFilter = THREE.NearestFilter;
      texture.minFilter = THREE.NearestFilter;
      texture.needsUpdate = true;

      const material = new THREE.SpriteMaterial({
        map: texture,
        transparent: true,
        opacity: 0,
        depthTest: false,
        depthWrite: false,
      });
      const sprite = new THREE.Sprite(material);
      sprite.renderOrder = 20;
      return sprite;
    }

    function drawPixelText(context, text, x, y, scale, color, centered = false) {
      const letters = {
        H: ['10001', '10001', '10001', '11111', '10001', '10001', '10001'],
        I: ['11111', '00100', '00100', '00100', '00100', '00100', '11111'],
        T: ['11111', '00100', '00100', '00100', '00100', '00100', '00100'],
        M: ['10001', '11011', '10101', '10101', '10001', '10001', '10001'],
        E: ['11111', '10000', '10000', '11110', '10000', '10000', '11111'],
        i: ['010', '000', '110', '010', '010', '010', '111'],
        t: ['010', '010', '111', '010', '010', '010', '001'],
        e: ['00000', '00000', '01110', '10001', '11111', '10000', '01110'],
        '!': ['00100', '00100', '00100', '00100', '00100', '00000', '00100'],
        ' ': ['000', '000', '000', '000', '000', '000', '000'],
      };
      let cursorX = x;
      if (centered) {
        cursorX = Math.round((context.canvas.width - measurePixelText(text, letters, scale)) / 2);
      }
      context.fillStyle = color;

      [...text].forEach((char, charIndex) => {
        const glyph = letters[char] || letters[' '];
        glyph.forEach((row, rowIndex) => {
          [...row].forEach((pixel, colIndex) => {
            if (pixel === '1') {
              context.fillRect(cursorX + colIndex * scale, y + rowIndex * scale, scale, scale);
            }
          });
        });
        cursorX += (glyph[0].length + (charIndex === text.length - 1 ? 0 : 1)) * scale;
      });
    }

    function measurePixelText(text, letters, scale) {
      return [...text].reduce((width, char, index) => {
        const glyph = letters[char] || letters[' '];
        const gap = index === text.length - 1 ? 0 : 1;
        return width + (glyph[0].length + gap) * scale;
      }, 0);
    }

    function createSignalPad() {
      const group = new THREE.Group();

      const pad = new THREE.Mesh(
        new THREE.CircleGeometry(0.23, 32),
        new THREE.MeshBasicMaterial({
          color: COLORS.idle,

        })
      );

      const rim = new THREE.Mesh(

      const dot = new THREE.Mesh(

    function createCalibrationDust() {
      const count = 180;
      const positions = new Float32Array(count * 3);
      const colors = new Float32Array(count * 3);
      const palette = [COLORS.amber, COLORS.cyan, COLORS.violet, COLORS.white];
      for (let i = 0; i < count; i++) {
        const angle = Math.random() * Math.PI * 2;
        const radius = randomBetween(3.8, 7.2);
        positions[i * 3] = Math.cos(angle) * radius;
        positions[i * 3 + 1] = Math.sin(angle) * radius * 0.72 + randomBetween(-0.5, 0.5);
        positions[i * 3 + 2] = randomBetween(-2.6, 0.5);
        const color = palette[Math.floor(Math.random() * palette.length)];
        colors[i * 3] = color.r;
        colors[i * 3 + 1] = color.g;
        colors[i * 3 + 2] = color.b;
      }
      const geometry = new THREE.BufferGeometry();
      geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
      geometry.setAttribute('color', new THREE.BufferAttribute(colors, 3));
      const material = new THREE.PointsMaterial({
        size: 0.035,
        vertexColors: true,
        transparent: true,
        opacity: 0.42,
        depthWrite: false,
      });
      return { points: new THREE.Points(geometry, material), positions };
    }

    function animate(frameTime = performance.now()) {
      const delta = Math.min(clock.getDelta(), 0.05);
      visual.time += delta;
      updateVisuals(delta, frameTime);
      renderer.render(scene, camera);
      requestAnimationFrame(animate);
    }

    function updateVisuals(delta, frameTime) {
      revealSignalOnFrame(frameTime);

      visual.targetPulse = Math.max(0, visual.targetPulse - delta * 1.55);
      visual.distractPulse = Math.max(0, visual.distractPulse - delta * 2.4);
      visual.catchPulse = Math.max(0, visual.catchPulse - delta * 1.8);
      visual.missPulse = Math.max(0, visual.missPulse - delta * 1.65);
      visual.corePulse = Math.max(0, visual.corePulse - delta * 1.75);
      visual.shake = Math.max(0, visual.shake - delta * 2.2);
      visual.messageIntensity = Math.max(0, visual.messageIntensity - delta * 1.1);

      const idleWave = (Math.sin(visual.time * 1.6) + 1) * 0.5;
      const targetPower = state.mode === 'signal' ? 1 : visual.targetPulse;
      const missPower = visual.missPulse;
      const distractPower = visual.distractPulse;
      const catchPower = visual.catchPulse;

      const baseColor = COLORS.idle.clone().lerp(COLORS.cyan, idleWave * 0.22);
      const currentCore = baseColor
        .lerp(visual.coreColor, Math.min(1, visual.corePulse + targetPower + missPower * 0.7))
        .lerp(COLORS.target, targetPower)
        .lerp(COLORS.red, missPower * 0.86)
        .lerp(COLORS.cyan, catchPower * 0.7);

      coreMaterial.color.copy(currentCore);
      coreMaterial.emissive.copy(currentCore);
      coreMaterial.emissiveIntensity = 0.55 + idleWave * 0.35 + targetPower * 2.8 + distractPower * 1.4 + missPower * 2.2 + catchPower * 1.5;

      const coreScale = 1 + idleWave * 0.035 + targetPower * 0.24 + visual.corePulse * 0.08 - missPower * 0.08;
      core.scale.setScalar(coreScale);
      core.rotation.x += delta * (0.28 + targetPower * 1.2);
      core.rotation.y += delta * (0.45 + distractPower * 1.4);
      coreWire.rotation.copy(core.rotation);
      coreWire.material.opacity = 0.14 + targetPower * 0.44 + distractPower * 0.2;
      hitText.material.opacity = targetPower;
      hitText.scale.set(1.35 + Math.sin(visual.time * 12) * targetPower * 0.045, 0.48 + Math.sin(visual.time * 12) * targetPower * 0.018, 1);

      haloMaterial.opacity = targetPower * 0.72 + catchPower * 0.22;
      halo.scale.setScalar(1 + (1 - visual.targetPulse) * targetPower * 1.9 + catchPower * 0.45);
      halo.rotation.z -= delta * (0.8 + targetPower * 2.2);

      const ringSpin = state.mode === 'waiting' || state.mode === 'signal' ? 1 : 0.38;
      outerRing.rotation.z += delta * (0.17 + ringSpin * 0.18);
      midRing.rotation.z -= delta * (0.22 + ringSpin * 0.22);
      innerRing.rotation.z += delta * (0.31 + ringSpin * 0.28);

      outerRing.material.opacity = outerRing.userData.baseOpacity + targetPower * 0.24 + catchPower * 0.18;
      midRing.material.opacity = midRing.userData.baseOpacity + distractPower * 0.3 + missPower * 0.22;
      innerRing.material.opacity = innerRing.userData.baseOpacity + targetPower * 0.38 + visual.messageIntensity * 0.2;
      outerRing.material.color.copy(COLORS.cyan).lerp(COLORS.target, targetPower * 0.95).lerp(COLORS.red, missPower * 0.55);
      midRing.material.color.copy(COLORS.amber).lerp(visual.sideColor, distractPower * 0.75).lerp(COLORS.red, missPower * 0.6);
      innerRing.material.color.copy(COLORS.violet).lerp(COLORS.target, targetPower).lerp(COLORS.cyan, catchPower);

      signalPads.forEach((pad, index) => {
        const lens = pad.userData.lens;
        const padRim = pad.userData.rim;
        const dot = pad.userData.dot;
        const phase = Math.sin(visual.time * 2.8 + index * 0.9) * 0.5 + 0.5;
        const beaconPower = distractPower * (0.75 + phase * 0.25) + targetPower * 0.28 + missPower * 0.4;
        const color = COLORS.idle.clone().lerp(visual.sideColor, beaconPower).lerp(COLORS.target, targetPower * 0.25).lerp(COLORS.red, missPower * 0.7);
        lens.material.color.copy(color);
        lens.material.opacity = 0.24 + phase * 0.12 + beaconPower * 0.54;
        padRim.material.color.copy(color).lerp(COLORS.amber, 0.22);
        padRim.material.opacity = 0.12 + beaconPower * 0.38;
        dot.material.color.copy(color).lerp(COLORS.white, 0.2);
        dot.material.opacity = 0.16 + beaconPower * 0.62;
        pad.scale.setScalar(1 + beaconPower * 0.12);
      });

      calibrationDust.points.rotation.z += delta * 0.018;
      calibrationDust.points.rotation.y = Math.sin(visual.time * 0.2) * 0.035;
      calibrationDust.points.material.opacity = 0.34 + targetPower * 0.12 + distractPower * 0.08;

      backplane.rotation.z = Math.sin(visual.time * 0.14) * 0.018;
      backplane.children.forEach((part, index) => {
        if (!part.material || typeof part.userData.baseOpacity !== 'number') return;
        const flicker = (Math.sin(visual.time * 1.4 + index * 0.37) + 1) * 0.5;
        part.material.opacity = part.userData.baseOpacity + flicker * 0.025 + targetPower * 0.06 + distractPower * 0.035;
      });
      backgroundAccents.rotation.z = Math.sin(visual.time * 0.09) * 0.012;
      backgroundAccents.children.forEach((part, index) => {
        if (!part.material || typeof part.userData.baseOpacity !== 'number') return;
        const flicker = (Math.sin(visual.time * 0.95 + index * 0.51) + 1) * 0.5;
        part.material.opacity = part.userData.baseOpacity + flicker * 0.018 + targetPower * 0.035;
      });

      gateGroup.rotation.z = Math.sin(visual.time * 0.45) * 0.025 + targetPower * Math.sin(visual.time * 9) * 0.03;
      gateGroup.rotation.x = Math.sin(visual.time * 0.37) * 0.025;

      const shakeX = visual.shake * Math.sin(visual.time * 80) * 0.11;
      const shakeY = visual.shake * Math.cos(visual.time * 92) * 0.08;
      camera.position.x = shakeX + Math.sin(visual.time * 0.3) * 0.07;
      camera.position.y = 2.4 + shakeY + Math.sin(visual.time * 0.43) * 0.05;
      camera.position.z = 9.4 - targetPower * 0.34 + missPower * 0.18;
      camera.lookAt(0, 0.2, 0);

      rim.color.copy(COLORS.target).lerp(COLORS.red, missPower * 0.8).lerp(COLORS.cyan, catchPower * 0.7);
      rim.intensity = 1.8 + targetPower * 4.2 + distractPower * 1.2 + missPower * 3.2 + catchPower * 2.1;
    }

    function resize() {
      const width = window.innerWidth;
      const height = window.innerHeight;
      camera.aspect = width / height;
      camera.updateProjectionMatrix();
      renderer.setSize(width, height, false);
    }
  </script>
</body>
