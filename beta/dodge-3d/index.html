<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#05070d">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>Asteroid Storm 3D | PanPhy Labs Beta</title>
  <link rel="icon" type="image/png" href="../../assets/favicon.png">
  <link rel="stylesheet" href="./src/styles.css">
  <script>
    let lastTouchEnd = 0;
    document.addEventListener('touchend', (event) => {
      const now = Date.now();
      if (now - lastTouchEnd <= 300) event.preventDefault();
      lastTouchEnd = now;
    }, { passive: false });
    document.addEventListener('gesturestart', (event) => event.preventDefault(), { passive: false });
    document.addEventListener('gesturechange', (event) => event.preventDefault(), { passive: false });
    document.addEventListener('gestureend', (event) => event.preventDefault(), { passive: false });
  </script>
</head>

<body>
  <div id="app">
    <canvas id="gameCanvas" aria-label="Asteroid Storm 3D game scene"></canvas>
    <div class="starscape-noise" aria-hidden="true"></div>
    <div class="scanlines" aria-hidden="true"></div>
    <div class="screen-flash" id="screenFlash" aria-hidden="true"></div>

    <header class="flight-bar" aria-label="Game status">
      <a class="brand-mark" href="../../" aria-label="PanPhy Labs home">
        <img src="../../assets/panphy.png" alt="PanPhy Labs">
      </a>
      <div class="flight-title">
        <span>BETA FLIGHT</span>
        <h1>Asteroid Storm 3D</h1>
      </div>
      <button class="hud-button" id="pauseButton" type="button" aria-label="Pause run" disabled>
        II
      </button>
    </header>

    <section class="readout-stack" aria-label="Run metrics">
      <div class="readout">
        <span>Survival</span>
        <strong id="scoreValue">0.00 s</strong>
      </div>
      <div class="readout">
        <span>Best</span>
        <strong id="bestValue">0.00 s</strong>
      </div>
      <div class="readout">
        <span>Velocity</span>
        <strong id="speedValue">0</strong>
      </div>
      <div class="readout">
        <span>Level</span>
        <strong id="levelValue">1</strong>
      </div>
    </section>

    <div class="reticle" aria-hidden="true">
      <span></span>
    </div>

    <div class="corner-panel corner-panel-left" aria-hidden="true"></div>
    <div class="corner-panel corner-panel-right" aria-hidden="true"></div>

    <section class="message-panel" id="messagePanel" aria-live="polite">
      <p id="messageKicker">LOW-POLY RUN</p>
      <h2 id="messageTitle">Asteroid Field</h2>
      <div class="message-score" id="messageScore">Best 0.00 s</div>
      <button id="startButton" type="button">Start Run</button>
    </section>
  </div>

  <script type="module" src="./src/main.js"></script>
</body>

</html>
