<!DOCTYPE html>
<html lang="en" data-theme="light">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#f8f9fa">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <script>
    (function () {
      if (localStorage.getItem('panphy-dark')) {
        document.documentElement.setAttribute('data-theme', 'dark');
        var tc = document.querySelector('meta[name="theme-color"]');
        var sb = document.querySelector('meta[name="apple-mobile-web-app-status-bar-style"]');
        if (tc) tc.setAttribute('content', '#0f1014');
        if (sb) sb.setAttribute('content', 'black-translucent');
      }
    })();
  </script>
  <title>States of Matter | PanPhy Labs</title>
  <link rel="icon" type="image/png" href="/assets/favicon.png">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;600&family=Poppins:wght@600;700;800&display=swap');

    :root {
      --font-sans: 'Inter', sans-serif;
      --font-display: 'Poppins', 'Inter', sans-serif;
      --font-mono: 'JetBrains Mono', monospace;

      --bg-color: #f8f9fa;
      --bg-pattern: #e9ecef;
      --text-main: #2d3436;
      --text-secondary: #636e72;

      --brand-primary: #6c5ce7;
      --brand-accent: #00cec9;

      --surface: #ffffff;
      --surface-alt: #f1f5f9;
      --border: #e2e8f0;
      --shadow: 0 16px 40px rgba(0, 0, 0, 0.08);

      --btn-primary: #6c5ce7;
      --btn-primary-hover: #5b4cdb;
      --btn-text: #ffffff;

      --nav-bg: rgba(255, 255, 255, 0.85);
      --nav-border: rgba(255, 255, 255, 0.5);

      --slider-track: #e2e8f0;
      --slider-thumb: #6c5ce7;
      --toggle-hover: rgba(108, 92, 231, 0.15);

      --scene-bg: #e8edf3;
    }

    [data-theme="dark"] {
      --bg-color: #0f1014;
      --bg-pattern: #181a20;
      --text-main: #dfe6e9;
      --text-secondary: #b2bec3;

      --brand-primary: #a29bfe;
      --brand-accent: #81ecec;

      --surface: #1e2129;
      --surface-alt: #17191f;
      --border: #2d3436;
      --shadow: 0 20px 45px rgba(0, 0, 0, 0.35);

      --btn-primary: #6c5ce7;
      --btn-primary-hover: #5849d6;
      --btn-text: #ffffff;

      --nav-bg: rgba(22, 24, 29, 0.85);
      --nav-border: rgba(255, 255, 255, 0.08);

      --slider-track: #4a5568;
      --slider-thumb: #a29bfe;
      --toggle-hover: rgba(162, 155, 254, 0.2);

      --scene-bg: #0a0c14;
    }

    * {
      box-sizing: border-box;
    }

    html, body {
      height: 100%;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: var(--font-sans);
      color: var(--text-main);
      background-color: var(--bg-color);
      background-image: radial-gradient(var(--bg-pattern) 1px, transparent 1px);
      background-size: 30px 30px;
      overflow: hidden;
    }

    a {
      color: var(--brand-primary);
      text-decoration: none;
    }

    a:hover {
      text-decoration: underline;
    }

    #app {
      height: 100%;
      display: flex;
      flex-direction: column;
      gap: 0.8rem;
      padding: 0;
    }

    /* Title Banner */
    #titleBanner {
      display: grid;
      grid-template-columns: auto 1fr auto;
      align-items: center;
      gap: 16px;
      width: calc(100% - 40px);
      max-width: 1360px;
      margin: 16px auto 0;
      background: var(--nav-bg);
      border: 1px solid var(--nav-border);
      border-radius: 20px;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      min-height: 58px;
      padding: 8px 20px;
      z-index: 10;
    }

    .banner-logo img {
      width: auto;
      height: 36px;
      display: block;
      filter: drop-shadow(0 4px 6px rgba(0, 0, 0, 0.1));
    }

    .banner-title {
      margin: 0;
      text-align: center;
      font-family: var(--font-display);
      font-size: 1.6rem;
      font-weight: 800;
      letter-spacing: -0.5px;
      color: var(--brand-primary);
    }

    .banner-title.gradient-text {
      background: linear-gradient(135deg, var(--brand-primary), var(--brand-accent));
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .banner-actions {
      display: flex;
      align-items: center;
      justify-content: flex-end;
      gap: 12px;
    }

    #theme-button {
      background: transparent;
      border: none;
      color: var(--text-main);
      border-radius: 50%;
      font-size: 1.25rem;
      line-height: 1;
      min-height: 42px;
      min-width: 42px;
      padding: 0.5rem;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      transition: transform 0.2s ease, background-color 0.2s ease;
    }

    #theme-button:hover {
      background-color: var(--toggle-hover);
      transform: rotate(15deg);
    }

    #theme-button:focus-visible {
      outline: 2px solid var(--brand-primary);
      outline-offset: 2px;
    }

    /* Workspace */
    #workspace {
      min-height: 0;
      flex: 1;
      display: grid;
      grid-template-columns: minmax(0, 2fr) minmax(300px, 1fr);
      gap: 0.9rem;
      width: calc(100% - 40px);
      max-width: 1360px;
      margin: 0 auto;
      padding-bottom: 0.75rem;
      z-index: 1;
    }

    .panel {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 18px;
      box-shadow: var(--shadow);
    }

    /* Sim Panel */
    #simPanel {
      display: flex;
      flex-direction: column;
      min-height: 0;
      overflow: hidden;
      position: relative;
    }

    #simCanvas {
      display: block;
      width: 100%;
      height: 0;
      flex: 1;
      min-height: 0;
      border-radius: 18px;
      cursor: grab;
    }

    #simCanvas:active {
      cursor: grabbing;
    }

    .sim-hint {
      position: absolute;
      bottom: 10px;
      left: 50%;
      transform: translateX(-50%);
      margin: 0;
      font-size: 0.72rem;
      color: var(--text-secondary);
      font-family: var(--font-mono);
      background: var(--nav-bg);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      padding: 4px 12px;
      border-radius: 999px;
      border: 1px solid var(--nav-border);
      pointer-events: none;
      opacity: 0.85;
      white-space: nowrap;
    }

    /* Controls Panel */
    #controlsPanel {
      display: flex;
      flex-direction: column;
      gap: 1rem;
      padding: 1.2rem;
      overflow-y: auto;
      min-height: 0;
    }

    .controls-header h2 {
      margin: 0;
      font-family: var(--font-display);
      font-size: 1.2rem;
      letter-spacing: -0.01em;
    }

    .controls-header p {
      margin: 0.2rem 0 0;
      color: var(--text-secondary);
      font-size: 0.85rem;
    }

    .status-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 0.5rem;
    }

    .status-chip {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 28px;
      padding: 0 0.8rem;
      border-radius: 999px;
      font-size: 0.75rem;
      font-weight: 700;
      letter-spacing: 0.05em;
      border: 1px solid transparent;
      user-select: none;
      transition: all 0.3s ease;
    }

    .status-solid { background: rgba(0, 206, 201, 0.15); color: #008f8c; border-color: rgba(0, 206, 201, 0.3); }
    [data-theme="dark"] .status-solid { color: #56d4d0; }

    .status-liquid { background: rgba(108, 92, 231, 0.15); color: #5849d6; border-color: rgba(108, 92, 231, 0.3); }
    [data-theme="dark"] .status-liquid { color: #b4acfe; }

    .status-gas { background: rgba(255, 118, 117, 0.15); color: #d63031; border-color: rgba(255, 118, 117, 0.3); }
    [data-theme="dark"] .status-gas { color: #ff8c8c; }

    /* Control Blocks */
    .control-card {
      background: var(--surface-alt);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 1rem;
      display: flex;
      flex-direction: column;
      gap: 1rem;
    }

    .control-block {
      display: flex;
      flex-direction: column;
      gap: 0.4rem;
    }

    .control-header {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      gap: 0.4rem;
    }

    .control-header label {
      font-size: 0.8rem;
      font-weight: 700;
      color: var(--text-secondary);
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .control-header span {
      font-family: var(--font-mono);
      font-size: 0.85rem;
      color: var(--text-main);
      font-weight: 600;
    }

    input[type="range"] {
      width: 100%;
      height: 28px;
      background: transparent;
      cursor: pointer;
      margin: 0;
      -webkit-appearance: none;
      appearance: none;
    }

    input[type="range"]:focus-visible {
      outline: none;
    }

    input[type="range"]::-webkit-slider-runnable-track {
      height: 6px;
      border-radius: 5px;
      background: var(--slider-track);
    }

    input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none;
      appearance: none;
      width: 20px;
      height: 20px;
      margin-top: -7px;
      border-radius: 50%;
      border: none;
      background: var(--slider-thumb);
      box-shadow: 0 2px 6px rgba(0, 0, 0, 0.2);
    }

    input[type="range"]::-moz-range-track {
      height: 6px;
      border-radius: 5px;
      background: var(--slider-track);
    }

    input[type="range"]::-moz-range-thumb {
      width: 20px;
      height: 20px;
      border-radius: 50%;
      border: none;
      background: var(--slider-thumb);
      box-shadow: 0 2px 6px rgba(0, 0, 0, 0.2);
    }

    /* Temp Slider Gradient overlay */
    #tempSlider::-webkit-slider-runnable-track {
      background: linear-gradient(to right, #00cec9, #6c5ce7, #ff7675);
    }
    #tempSlider::-moz-range-track {
      background: linear-gradient(to right, #00cec9, #6c5ce7, #ff7675);
    }

    /* Buttons */
    .btn {
      border: 1px solid transparent;
      border-radius: 12px;
      min-height: 44px;
      padding: 0.5rem 0.9rem;
      font-size: 0.9rem;
      font-weight: 700;
      font-family: var(--font-sans);
      letter-spacing: 0.02em;
      cursor: pointer;
      transition: transform 0.16s ease, filter 0.16s ease, border-color 0.16s ease;
      white-space: nowrap;
      text-align: center;
    }

    .btn:focus-visible {
      outline: 2px solid var(--brand-primary);
      outline-offset: 2px;
    }

    .btn:hover {
      transform: translateY(-1px);
      filter: brightness(1.02);
    }

    .btn-primary {
      background: var(--btn-primary);
      color: var(--btn-text);
    }

    .btn-primary:hover {
      background: var(--btn-primary-hover);
    }

    .btn-secondary {
      background: var(--surface-alt);
      color: var(--text-main);
      border-color: var(--border);
    }

    .sim-actions {
      display: flex;
      gap: 0.5rem;
    }

    .sim-actions .btn {
      flex: 1;
    }

    .keyboard-hint {
      margin: 0;
      font-size: 0.7rem;
      color: var(--text-secondary);
      font-family: var(--font-mono);
      line-height: 1.5;
    }

    kbd {
      display: inline-block;
      padding: 1px 5px;
      font-family: var(--font-mono);
      font-size: 0.68rem;
      font-weight: 600;
      background: var(--surface-alt);
      border: 1px solid var(--border);
      border-radius: 4px;
      box-shadow: 0 1px 0 var(--border);
    }

    /* Responsive */
    @media (max-width: 900px) {
      body {
        overflow: auto;
      }

      #app {
        height: auto;
        min-height: 100%;
      }

      #workspace {
        grid-template-columns: 1fr;
      }

      #simPanel {
        min-height: 50vh;
        order: 1;
      }

      #controlsPanel {
        order: 2;
        min-height: auto;
      }
    }

    @media (max-width: 640px) {
      #titleBanner {
        width: calc(100% - 24px);
        margin: 12px auto 0;
        min-height: 52px;
        border-radius: 18px;
        padding: 8px 12px;
      }

      #workspace {
        width: calc(100% - 24px);
      }

      .banner-logo img {
        height: 28px;
      }

      .banner-title {
        font-size: 1.2rem;
      }
    }
  </style>
</head>

<body>
  <div id="app">
    <header id="titleBanner">
      <a href="/" class="banner-logo"><img src="/assets/panphy.png" alt="PanPhy Labs" onerror="this.style.display='none'"></a>
      <h1 class="banner-title gradient-text">States of Matter</h1>
      <div class="banner-actions">
        <button id="theme-button" title="Toggle theme" aria-label="Toggle Light/Dark Theme">☀️</button>
      </div>
    </header>

    <div id="workspace">
      <div id="simPanel" class="panel">
        <canvas id="simCanvas"></canvas>
        <p class="sim-hint">Drag to rotate · Scroll to zoom</p>
      </div>

      <div id="controlsPanel" class="panel">
        <div class="controls-header">
          <h2>Controls</h2>
          <p>Heat to melt and boil.</p>
        </div>

        <div class="status-row">
          <span id="stateChip" class="status-chip status-solid">SOLID</span>
        </div>

        <div class="control-card">
          <div class="control-block">
            <div class="control-header">
              <label for="tempSlider">Temperature</label>
              <span id="tempVal">0 K</span>
            </div>
            <input type="range" id="tempSlider" min="0" max="100" step="1" value="0">
          </div>
        </div>

        <div class="sim-actions">
          <button id="playPauseBtn" class="btn btn-primary">Pause</button>
          <button id="resetBtn" class="btn btn-secondary">Reset</button>
        </div>

        <div>
          <p class="keyboard-hint">
            <kbd>Space</kbd> Play / Pause &nbsp; <kbd>R</kbd> Reset
          </p>
        </div>
      </div>
    </div>
  </div>

  <script type="importmap">
    {
      "imports": {
        "three": "https://cdn.jsdelivr.net/npm/three@0.161.0/build/three.module.js",
        "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.161.0/examples/jsm/"
      }
    }
  </script>

  <script type="module">
    import * as THREE from 'three';
    import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

    // ─── Constants & Physics State ───
    const N_X = 6;
    const N_Y = 6;
    const N_Z = 6;
    const N = N_X * N_Y * N_Z;
    const PARTICLE_RADIUS = 0.4;
    const PARTICLE_DIAM = PARTICLE_RADIUS * 2;
    const BOX_SIZE = 10;
    const HALF_BOX = BOX_SIZE / 2;
    const SPACING = 1.0;

    const MELTING_POINT = 33;
    const BOILING_POINT = 66;

    const IDEAL_POS = new Float32Array(N * 3);
    const POS = new Float32Array(N * 3);
    const VEL = new Float32Array(N * 3);

    const TEMP_STATE = {
        val: 0,
        playing: true
    };

    // Initialize Lattice
    function initParticles() {
      let index = 0;
      for (let x = 0; x < N_X; x++) {
        for (let y = 0; y < N_Y; y++) {
          for (let z = 0; z < N_Z; z++) {
            // Centered in X and Z. Y stacked near bottom.
            const px = (x - (N_X - 1) / 2) * SPACING;
            const pz = (z - (N_Z - 1) / 2) * SPACING;
            const py = (y * SPACING) - HALF_BOX + PARTICLE_RADIUS + 0.1;

            IDEAL_POS[index * 3] = px;
            IDEAL_POS[index * 3 + 1] = py;
            IDEAL_POS[index * 3 + 2] = pz;

            POS[index * 3] = px;
            POS[index * 3 + 1] = py;
            POS[index * 3 + 2] = pz;

            VEL[index * 3] = 0;
            VEL[index * 3 + 1] = 0;
            VEL[index * 3 + 2] = 0;

            index++;
          }
        }
      }
    }

    initParticles();

    // ─── DOM Elements ───
    const tempSlider = document.getElementById('tempSlider');
    const tempVal = document.getElementById('tempVal');
    const stateChip = document.getElementById('stateChip');
    const playPauseBtn = document.getElementById('playPauseBtn');
    const resetBtn = document.getElementById('resetBtn');
    const themeBtn = document.getElementById('theme-button');

    function updateUIState() {
      tempVal.textContent = TEMP_STATE.val + ' K';
      let T = TEMP_STATE.val;

      if (T < MELTING_POINT) {
        stateChip.textContent = 'SOLID';
        stateChip.className = 'status-chip status-solid';
      } else if (T < BOILING_POINT) {
        stateChip.textContent = 'LIQUID';
        stateChip.className = 'status-chip status-liquid';
      } else {
        stateChip.textContent = 'GAS';
        stateChip.className = 'status-chip status-gas';
      }
    }

    tempSlider.addEventListener('input', () => {
      TEMP_STATE.val = parseInt(tempSlider.value);
      updateUIState();
      updateParticleColors();
    });

    func_playPause();
    function func_playPause() {
        if(!TEMP_STATE.playing) {
            TEMP_STATE.playing = true;
            playPauseBtn.textContent = 'Pause';
            playPauseBtn.className = 'btn btn-primary';
        } else {
            // we init playing to true so this runs on flip
        }
    }
    
    function togglePlay() {
        TEMP_STATE.playing = !TEMP_STATE.playing;
        playPauseBtn.textContent = TEMP_STATE.playing ? 'Pause' : 'Play';
        if (TEMP_STATE.playing) {
            playPauseBtn.className = 'btn btn-primary';
        } else {
            playPauseBtn.className = 'btn btn-secondary';
        }
    }

    playPauseBtn.addEventListener('click', togglePlay);

    resetBtn.addEventListener('click', () => {
      initParticles();
      TEMP_STATE.val = 0;
      tempSlider.value = 0;
      updateUIState();
      updateParticleColors();
      if (!TEMP_STATE.playing) togglePlay();
    });

    document.addEventListener('keydown', (e) => {
      if (e.target.tagName === 'INPUT') return;
      if (e.code === 'Space') {
        e.preventDefault();
        togglePlay();
      } else if (e.code === 'KeyR') {
        resetBtn.click();
      }
    });

    // Theme Toggle
    function toggleTheme() {
        const html = document.documentElement;
        const current = html.getAttribute('data-theme');
        const next = current === 'dark' ? 'light' : 'dark';
        html.setAttribute('data-theme', next);
        
        if (next === 'dark') {
            localStorage.setItem('panphy-dark', '1');
        } else {
            localStorage.removeItem('panphy-dark');
        }
        
        updateThreeTheme();
    }
    themeBtn.addEventListener('click', toggleTheme);


    // ─── Three.js Setup ───
    const canvas = document.getElementById('simCanvas');
    const scene = new THREE.Scene();
    
    const colors = {
        light: { bg: 0xe8edf3, boxEdge: 0xa0aec0 },
        dark: { bg: 0x0a0c14, boxEdge: 0x4a5568 }
    };

    const phaseColors = {
        cold: new THREE.Color(0x00cec9),
        mid:  new THREE.Color(0xa29bfe),
        hot:  new THREE.Color(0xff7675)
    };

    function isDark() {
        return document.documentElement.getAttribute('data-theme') === 'dark';
    }

    const camera = new THREE.PerspectiveCamera(45, 1, 0.1, 100);
    camera.position.set(0, 8, 20);

    const renderer = new THREE.WebGLRenderer({ canvas, antialias: true, alpha: true });
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));

    const controls = new OrbitControls(camera, canvas);
    controls.enableDamping = true;
    controls.dampingFactor = 0.08;
    controls.target.set(0, 0, 0);
    controls.minDistance = 5;
    controls.maxDistance = 40;

    // Lighting
    const ambientLight = new THREE.AmbientLight(0xffffff, 0.6);
    scene.add(ambientLight);

    const dirLight = new THREE.DirectionalLight(0xffffff, 1.2);
    dirLight.position.set(10, 20, 10);
    scene.add(dirLight);

    const dirLight2 = new THREE.DirectionalLight(0xffffff, 0.5);
    dirLight2.position.set(-10, 10, -10);
    scene.add(dirLight2);

    // Box Container
    const boxGeo = new THREE.BoxGeometry(BOX_SIZE, BOX_SIZE, BOX_SIZE);
    const boxEdges = new THREE.EdgesGeometry(boxGeo);
    const boxMaterial = new THREE.LineBasicMaterial({ color: colors.light.boxEdge, transparent: true, opacity: 0.5 });
    const boxLines = new THREE.LineSegments(boxEdges, boxMaterial);
    scene.add(boxLines);

    // Floor
    const floorGeo = new THREE.PlaneGeometry(BOX_SIZE, BOX_SIZE);
    const floorMat = new THREE.MeshBasicMaterial({ color: 0x000000, transparent: true, opacity: 0.05, depthWrite: false });
    const floor = new THREE.Mesh(floorGeo, floorMat);
    floor.rotation.x = -Math.PI / 2;
    floor.position.y = -HALF_BOX;
    scene.add(floor);

    // Particles (InstancedMesh)
    const particleGeo = new THREE.SphereGeometry(PARTICLE_RADIUS, 16, 16);
    const particleMat = new THREE.MeshPhysicalMaterial({
        color: phaseColors.cold,
        roughness: 0.2,
        metalness: 0.1,
        clearcoat: 0.8
    });
    
    const instancedMesh = new THREE.InstancedMesh(particleGeo, particleMat, N);
    instancedMesh.instanceMatrix.setUsage(THREE.DynamicDrawUsage);
    scene.add(instancedMesh);

    const dummy = new THREE.Object3D();

    function updateThreeTheme() {
        const theme = isDark() ? colors.dark : colors.light;
        scene.background = new THREE.Color(theme.bg);
        boxMaterial.color.setHex(theme.boxEdge);
        floorMat.opacity = isDark() ? 0.2 : 0.05;
        floorMat.color.setHex(isDark() ? 0xffffff : 0x000000);
    }
    
    function updateParticleColors() {
        const T = TEMP_STATE.val;
        const norm = T / 100;
        let c = new THREE.Color();
        if (norm < 0.5) {
            c.lerpColors(phaseColors.cold, phaseColors.mid, norm * 2);
        } else {
            c.lerpColors(phaseColors.mid, phaseColors.hot, (norm - 0.5) * 2);
        }
        particleMat.color.copy(c);
    }

    updateThreeTheme();
    updateParticleColors();

    function resize() {
      const container = document.getElementById('simPanel');
      if (!container) return;
      
      const width = container.clientWidth;
      const height = container.clientHeight;
      
      camera.aspect = width / height;
      camera.updateProjectionMatrix();
      
      // Crucial: false prevents inline styles from growing infinitely
      renderer.setSize(width, height, false);
    }
    
    window.addEventListener('resize', resize);
    
    // Initial resize trigger after layout is done
    setTimeout(resize, 0);


    // ─── Physics Engine ───
    const MAX_SPEED = 40.0;
    
    function stepPhysics(dt) {
        const T = TEMP_STATE.val;
        const normT = T / 100;
        const isSolid = T < MELTING_POINT;
        const isGas = T > BOILING_POINT;

        // 1. Apply Forces
        for (let i = 0; i < N; i++) {
            let px = POS[i*3], py = POS[i*3+1], pz = POS[i*3+2];
            let vx = VEL[i*3], vy = VEL[i*3+1], vz = VEL[i*3+2];
            
            let fx = 0, fy = 0, fz = 0;

            if (isSolid) {
                // Harmonic restoring force to ideal positions
                let idx = IDEAL_POS[i*3], idy = IDEAL_POS[i*3+1], idz = IDEAL_POS[i*3+2];
                let dx = idx - px, dy = idy - py, dz = idz - pz;
                
                // Limit the maximum pull to avoid explosions if they reform from gas
                let dist = Math.sqrt(dx*dx + dy*dy + dz*dz);
                if (dist > 1.0) {
                    dx /= dist; dy /= dist; dz /= dist;
                }
                
                const springStrength = 200.0;
                fx += dx * springStrength;
                fy += dy * springStrength;
                fz += dz * springStrength;

                // Thermal Jiggle
                let jx = (Math.random() - 0.5);
                let jy = (Math.random() - 0.5);
                let jz = (Math.random() - 0.5);
                
                // Scale jiggle by temperature
                let jiggleFactor = T * 15.0;
                fx += jx * jiggleFactor;
                fy += jy * jiggleFactor;
                fz += jz * jiggleFactor;

                vx += fx * dt;
                vy += fy * dt;
                vz += fz * dt;

                // Strong damping for solid
                vx *= 0.85;
                vy *= 0.85;
                vz *= 0.85;
            } else {
                // Liquid or Gas
                if (!isGas) {
                    // Gravity applies strongly for liquid
                    fy -= 30.0;
                } else {
                    // Slight gravity for gas to make it slowly settle if very cold gas
                    fy -= 5.0;
                }

                // Thermal Jiggle - base agitation
                let baseAgit = isGas ? 400.0 : 80.0;
                let agit = baseAgit * Math.max(0.1, normT);
                
                let jx = (Math.random() - 0.5);
                let jy = (Math.random() - 0.5);
                let jz = (Math.random() - 0.5);
                
                fx += jx * agit;
                fy += jy * agit;
                fz += jz * agit;

                vx += fx * dt;
                vy += fy * dt;
                vz += fz * dt;

                // Damping
                let drag = isGas ? 0.99 : 0.94;
                vx *= drag;
                vy *= drag;
                vz *= drag;
            }

            // Speed Limit
            let speedSq = vx*vx + vy*vy + vz*vz;
            if (speedSq > MAX_SPEED * MAX_SPEED) {
                let speed = Math.sqrt(speedSq);
                vx = (vx / speed) * MAX_SPEED;
                vy = (vy / speed) * MAX_SPEED;
                vz = (vz / speed) * MAX_SPEED;
            }

            // Update Positions
            px += vx * dt;
            py += vy * dt;
            pz += vz * dt;

            // Box Bounds Collisions
            if (px < -HALF_BOX + PARTICLE_RADIUS) { px = -HALF_BOX + PARTICLE_RADIUS; vx *= -0.8; }
            if (px >  HALF_BOX - PARTICLE_RADIUS) { px =  HALF_BOX - PARTICLE_RADIUS; vx *= -0.8; }
            
            if (py < -HALF_BOX + PARTICLE_RADIUS) { py = -HALF_BOX + PARTICLE_RADIUS; vy *= -0.8; }
            if (py >  HALF_BOX - PARTICLE_RADIUS) { py =  HALF_BOX - PARTICLE_RADIUS; vy *= -0.8; }
            
            if (pz < -HALF_BOX + PARTICLE_RADIUS) { pz = -HALF_BOX + PARTICLE_RADIUS; vz *= -0.8; }
            if (pz >  HALF_BOX - PARTICLE_RADIUS) { pz =  HALF_BOX - PARTICLE_RADIUS; vz *= -0.8; }

            VEL[i*3] = vx; VEL[i*3+1] = vy; VEL[i*3+2] = vz;
            POS[i*3] = px; POS[i*3+1] = py; POS[i*3+2] = pz;
        }

        // 2. Inter-Particle Collisions (Sphere-Sphere)
        // Optimization check - Solids barely overlap if physics holds, so skip strictly? 
        // We will run it anyway to handle transitions smoothly.
        const diamSq = PARTICLE_DIAM * PARTICLE_DIAM;
        for (let i = 0; i < N; i++) {
            for (let j = i + 1; j < N; j++) {
                let dx = POS[j*3] - POS[i*3];
                // Quick AABB test
                if (dx > PARTICLE_DIAM || dx < -PARTICLE_DIAM) continue;
                
                let dy = POS[j*3+1] - POS[i*3+1];
                if (dy > PARTICLE_DIAM || dy < -PARTICLE_DIAM) continue;
                
                let dz = POS[j*3+2] - POS[i*3+2];
                if (dz > PARTICLE_DIAM || dz < -PARTICLE_DIAM) continue;

                let distSq = dx*dx + dy*dy + dz*dz;
                
                if (distSq < diamSq && distSq > 0.0001) {
                    let dist = Math.sqrt(distSq);
                    let overlap = PARTICLE_DIAM - dist;
                    
                    let nx = dx / dist;
                    let ny = dy / dist;
                    let nz = dz / dist;
                    
                    // Push apart positionally (resolve overlap to prevent clumping)
                    let push = overlap * 0.5;
                    POS[j*3]   += nx * push;
                    POS[j*3+1] += ny * push;
                    POS[j*3+2] += nz * push;
                    
                    POS[i*3]   -= nx * push;
                    POS[i*3+1] -= ny * push;
                    POS[i*3+2] -= nz * push;
                    
                    // Velocity impulse (bounce)
                    let dvx = VEL[j*3] - VEL[i*3];
                    let dvy = VEL[j*3+1] - VEL[i*3+1];
                    let dvz = VEL[j*3+2] - VEL[i*3+2];
                    
                    let dot = dvx*nx + dvy*ny + dvz*nz;
                    
                    if (dot < 0) {
                        // Moving towards each other
                        let restitution = isGas ? 0.9 : 0.4;
                        let impulse = -(1 + restitution) * dot / 2; // Assuming mass = 1
                        
                        VEL[j*3]   += nx * impulse;
                        VEL[j*3+1] += ny * impulse;
                        VEL[j*3+2] += nz * impulse;
                        
                        VEL[i*3]   -= nx * impulse;
                        VEL[i*3+1] -= ny * impulse;
                        VEL[i*3+2] -= nz * impulse;
                    }
                }
            }
        }
    }

    // ─── Render Loop ───
    let lastTime = 0;
    
    function animate(timestamp) {
        requestAnimationFrame(animate);
        
        if (lastTime === 0) lastTime = timestamp;
        let dt = (timestamp - lastTime) / 1000;
        lastTime = timestamp;
        
        // Cap dt to prevent explosions on lag
        if (dt > 0.05) dt = 0.05;

        if (TEMP_STATE.playing) {
            // Step physics multiple times per frame for stability if needed
            // For N=216, a single step is fine visually if dt is small.
            // Let's do 2 sub-steps.
            stepPhysics(dt / 2);
            stepPhysics(dt / 2);

            // Update InstancedMesh matrices
            for (let i = 0; i < N; i++) {
                dummy.position.set(POS[i*3], POS[i*3+1], POS[i*3+2]);
                dummy.updateMatrix();
                instancedMesh.setMatrixAt(i, dummy.matrix);
            }
            instancedMesh.instanceMatrix.needsUpdate = true;
        }

        controls.update();
        renderer.render(scene, camera);
    }
    
    // Start loop
    requestAnimationFrame(animate);

  </script>
</body>
