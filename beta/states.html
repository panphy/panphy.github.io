<!DOCTYPE html>
<html lang="en" data-theme="light">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#f8f9fa">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <script>
    (function () {
      if (localStorage.getItem('panphy-dark')) {
        document.documentElement.setAttribute('data-theme', 'dark');
        var tc = document.querySelector('meta[name="theme-color"]');
        var sb = document.querySelector('meta[name="apple-mobile-web-app-status-bar-style"]');
        if (tc) tc.setAttribute('content', '#0f1014');
        if (sb) sb.setAttribute('content', 'black-translucent');
      }
    })();
  </script>
  <title>States of Matter | PanPhy Labs</title>
  <link rel="icon" type="image/png" href="/assets/favicon.png">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;600&family=Poppins:wght@600;700;800&display=swap');

    :root {
      --font-sans: 'Inter', sans-serif;
      --font-display: 'Poppins', 'Inter', sans-serif;
      --font-mono: 'JetBrains Mono', monospace;

      --bg-color: #f8f9fa;
      --bg-pattern: #e9ecef;
      --text-main: #2d3436;
      --text-secondary: #636e72;

      --brand-primary: #6c5ce7;
      --brand-accent: #00cec9;

      --surface: #ffffff;
      --surface-alt: #f1f5f9;
      --border: #e2e8f0;
      --shadow: 0 16px 40px rgba(0, 0, 0, 0.08);

      --btn-primary: #6c5ce7;
      --btn-primary-hover: #5b4cdb;
      --btn-text: #ffffff;

      --nav-bg: rgba(255, 255, 255, 0.85);
      --nav-border: rgba(255, 255, 255, 0.5);

      --slider-track: #e2e8f0;
      --slider-thumb: #6c5ce7;
      --toggle-hover: rgba(108, 92, 231, 0.15);

      --scene-bg: #e8edf3;
    }

    [data-theme="dark"] {
      --bg-color: #0f1014;
      --bg-pattern: #181a20;
      --text-main: #dfe6e9;
      --text-secondary: #b2bec3;

      --brand-primary: #a29bfe;
      --brand-accent: #81ecec;

      --surface: #1e2129;
      --surface-alt: #17191f;
      --border: #2d3436;
      --shadow: 0 20px 45px rgba(0, 0, 0, 0.35);

      --btn-primary: #6c5ce7;
      --btn-primary-hover: #5849d6;
      --btn-text: #ffffff;

      --nav-bg: rgba(22, 24, 29, 0.85);
      --nav-border: rgba(255, 255, 255, 0.08);

      --slider-track: #4a5568;
      --slider-thumb: #a29bfe;
      --toggle-hover: rgba(162, 155, 254, 0.2);

      --scene-bg: #0a0c14;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      height: 100%;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: var(--font-sans);
      color: var(--text-main);
      background-color: var(--bg-color);
      background-image: radial-gradient(var(--bg-pattern) 1px, transparent 1px);
      background-size: 30px 30px;
      overflow: hidden;
    }

    a {
      color: var(--brand-primary);
      text-decoration: none;
    }

    a:hover {
      text-decoration: underline;
    }

    #app {
      height: 100%;
      display: flex;
      flex-direction: column;
      gap: 0.8rem;
      padding: 0;
    }

    /* Title Banner */
    #titleBanner {
      display: grid;
      grid-template-columns: auto 1fr auto;
      align-items: center;
      gap: 16px;
      width: calc(100% - 40px);
      max-width: 1360px;
      margin: 16px auto 0;
      background: var(--nav-bg);
      border: 1px solid var(--nav-border);
      border-radius: 20px;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      min-height: 58px;
      padding: 8px 20px;
      z-index: 10;
    }

    .banner-logo img {
      width: auto;
      height: 36px;
      display: block;
      filter: drop-shadow(0 4px 6px rgba(0, 0, 0, 0.1));
    }

    .banner-title {
      margin: 0;
      text-align: center;
      font-family: var(--font-display);
      font-size: 1.6rem;
      font-weight: 800;
      letter-spacing: -0.5px;
      color: var(--brand-primary);
    }

    .banner-title.gradient-text {
      background: linear-gradient(135deg, var(--brand-primary), var(--brand-accent));
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .banner-actions {
      display: flex;
      align-items: center;
      justify-content: flex-end;
      gap: 12px;
    }

    #theme-button {
      background: transparent;
      border: none;
      color: var(--text-main);
      border-radius: 50%;
      font-size: 1.25rem;
      line-height: 1;
      min-height: 42px;
      min-width: 42px;
      padding: 0.5rem;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      transition: transform 0.2s ease, background-color 0.2s ease;
    }

    #theme-button:hover {
      background-color: var(--toggle-hover);
      transform: rotate(15deg);
    }

    #theme-button:focus-visible {
      outline: 2px solid var(--brand-primary);
      outline-offset: 2px;
    }

    /* Workspace */
    #workspace {
      min-height: 0;
      flex: 1;
      display: grid;
      grid-template-columns: minmax(0, 2fr) minmax(300px, 1fr);
      gap: 0.9rem;
      width: calc(100% - 40px);
      max-width: 1360px;
      margin: 0 auto;
      padding-bottom: 0.75rem;
      z-index: 1;
    }

    .panel {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 18px;
      box-shadow: var(--shadow);
    }

    /* Sim Panel */
    #simPanel {
      display: flex;
      flex-direction: column;
      min-height: 0;
      overflow: hidden;
      position: relative;
    }

    #simCanvas {
      display: block;
      width: 100%;
      height: 0;
      flex: 1;
      min-height: 0;
      border-radius: 18px;
      cursor: grab;
    }

    #simCanvas:active {
      cursor: grabbing;
    }

    .sim-hint {
      position: absolute;
      bottom: 10px;
      left: 50%;
      transform: translateX(-50%);
      margin: 0;
      font-size: 0.72rem;
      color: var(--text-secondary);
      font-family: var(--font-mono);
      background: var(--nav-bg);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      padding: 4px 12px;
      border-radius: 999px;
      border: 1px solid var(--nav-border);
      pointer-events: none;
      opacity: 0.85;
      white-space: nowrap;
    }

    /* Controls Panel */
    #controlsPanel {
      display: flex;
      flex-direction: column;
      gap: 1rem;
      padding: 1.2rem;
      overflow-y: auto;
      min-height: 0;
    }

    .controls-header h2 {
      margin: 0;
      font-family: var(--font-display);
      font-size: 1.2rem;
      letter-spacing: -0.01em;
    }

    .controls-header p {
      margin: 0.2rem 0 0;
      color: var(--text-secondary);
      font-size: 0.85rem;
    }

    .status-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 0.5rem;
    }

    .status-chip {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 28px;
      padding: 0 0.8rem;
      border-radius: 999px;
      font-size: 0.75rem;
      font-weight: 700;
      letter-spacing: 0.05em;
      border: 1px solid transparent;
      user-select: none;
      transition: all 0.3s ease;
    }

    .status-solid {
      background: rgba(0, 206, 201, 0.15);
      color: #008f8c;
      border-color: rgba(0, 206, 201, 0.3);
    }

    [data-theme="dark"] .status-solid {
      color: #56d4d0;
    }

    .status-liquid {
      background: rgba(108, 92, 231, 0.15);
      color: #5849d6;
      border-color: rgba(108, 92, 231, 0.3);
    }

    [data-theme="dark"] .status-liquid {
      color: #b4acfe;
    }

    .status-gas {
      background: rgba(255, 118, 117, 0.15);
      color: #d63031;
      border-color: rgba(255, 118, 117, 0.3);
    }

    [data-theme="dark"] .status-gas {
      color: #ff8c8c;
    }

    /* Control Blocks */
    .control-card {
      background: var(--surface-alt);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 1rem;
      display: flex;
      flex-direction: column;
      gap: 1rem;
    }

    .control-block {
      display: flex;
      flex-direction: column;
      gap: 0.4rem;
    }

    .control-header {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      gap: 0.4rem;
    }

    .control-header label {
      font-size: 0.8rem;
      font-weight: 700;
      color: var(--text-secondary);
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .control-header span {
      font-family: var(--font-mono);
      font-size: 0.85rem;
      color: var(--text-main);
      font-weight: 600;
    }

    input[type="range"] {
      width: 100%;
      height: 28px;
      background: transparent;
      cursor: pointer;
      margin: 0;
      -webkit-appearance: none;
      appearance: none;
    }

    input[type="range"]:focus-visible {
      outline: none;
    }

    input[type="range"]::-webkit-slider-runnable-track {
      height: 6px;
      border-radius: 5px;
      background: var(--slider-track);
    }

    input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none;
      appearance: none;
      width: 20px;
      height: 20px;
      margin-top: -7px;
      border-radius: 50%;
      border: none;
      background: var(--slider-thumb);
      box-shadow: 0 2px 6px rgba(0, 0, 0, 0.2);
    }

    input[type="range"]::-moz-range-track {
      height: 6px;
      border-radius: 5px;
      background: var(--slider-track);
    }

    input[type="range"]::-moz-range-thumb {
      width: 20px;
      height: 20px;
      border-radius: 50%;
      border: none;
      background: var(--slider-thumb);
      box-shadow: 0 2px 6px rgba(0, 0, 0, 0.2);
    }

    /* Temp Slider Gradient overlay */
    #tempSlider::-webkit-slider-runnable-track {
      background: linear-gradient(to right, #00cec9, #6c5ce7, #ff7675);
    }

    #tempSlider::-moz-range-track {
      background: linear-gradient(to right, #00cec9, #6c5ce7, #ff7675);
    }

    /* Buttons */
    .btn {
      border: 1px solid transparent;
      border-radius: 12px;
      min-height: 44px;
      padding: 0.5rem 0.9rem;
      font-size: 0.9rem;
      font-weight: 700;
      font-family: var(--font-sans);
      letter-spacing: 0.02em;
      cursor: pointer;
      transition: transform 0.16s ease, filter 0.16s ease, border-color 0.16s ease;
      white-space: nowrap;
      text-align: center;
    }

    .btn:focus-visible {
      outline: 2px solid var(--brand-primary);
      outline-offset: 2px;
    }

    .btn:hover {
      transform: translateY(-1px);
      filter: brightness(1.02);
    }

    .btn-primary {
      background: var(--btn-primary);
      color: var(--btn-text);
    }

    .btn-primary:hover {
      background: var(--btn-primary-hover);
    }

    .btn-secondary {
      background: var(--surface-alt);
      color: var(--text-main);
      border-color: var(--border);
    }

    .sim-actions {
      display: flex;
      gap: 0.5rem;
    }

    .sim-actions .btn {
      flex: 1;
    }

    .keyboard-hint {
      margin: 0;
      font-size: 0.7rem;
      color: var(--text-secondary);
      font-family: var(--font-mono);
      line-height: 1.5;
    }

    kbd {
      display: inline-block;
      padding: 1px 5px;
      font-family: var(--font-mono);
      font-size: 0.68rem;
      font-weight: 600;
      background: var(--surface-alt);
      border: 1px solid var(--border);
      border-radius: 4px;
      box-shadow: 0 1px 0 var(--border);
    }

    /* Responsive */
    @media (max-width: 900px) {
      body {
        overflow: auto;
      }

      #app {
        height: auto;
        min-height: 100%;
      }

      #workspace {
        grid-template-columns: 1fr;
      }

      #simPanel {
        min-height: 50vh;
        order: 1;
      }

      #controlsPanel {
        order: 2;
        min-height: auto;
      }
    }

    @media (max-width: 640px) {
      #titleBanner {
        width: calc(100% - 24px);
        margin: 12px auto 0;
        min-height: 52px;
        border-radius: 18px;
        padding: 8px 12px;
      }

      #workspace {
        width: calc(100% - 24px);
      }

      .banner-logo img {
        height: 28px;
      }

      .banner-title {
        font-size: 1.2rem;
      }
    }
  </style>
</head>

<body>
  <div id="app">
    <header id="titleBanner">
      <a href="/" class="banner-logo"><img src="/assets/panphy.png" alt="PanPhy Labs"
          onerror="this.style.display='none'"></a>
      <h1 class="banner-title gradient-text">States of Matter</h1>
      <div class="banner-actions">
        <button id="theme-button" title="Toggle theme" aria-label="Toggle Light/Dark Theme">☀️</button>
      </div>
    </header>

    <div id="workspace">
      <div id="simPanel" class="panel">
        <canvas id="simCanvas"></canvas>
        <p class="sim-hint">Drag to rotate · Scroll to zoom</p>
      </div>

      <div id="controlsPanel" class="panel">
        <div class="controls-header">
          <h2>Controls</h2>
        </div>

        <div class="status-row">
          <span id="stateChip" class="status-chip status-solid">Solid</span>
          <span id="tempVal" style="font-family:var(--font-mono);font-size:0.85rem;font-weight:600;">40 K</span>
        </div>

        <div class="control-card">
          <div class="control-block">
            <div class="control-header">
              <label for="tempSlider">Target Temperature</label>
              <span id="heatVal">40 K</span>
            </div>
            <input type="range" id="tempSlider" min="0" max="100" step="1" value="0">
          </div>
        </div>

        <div class="sim-actions">
          <button id="playPauseBtn" class="btn btn-primary">Pause</button>
          <button id="resetBtn" class="btn btn-secondary">Reset</button>
        </div>

        <div>
          <p class="keyboard-hint">
            <kbd>Space</kbd> Play / Pause &nbsp; <kbd>R</kbd> Reset
          </p>
        </div>
      </div>
    </div>
  </div>

  <script type="importmap">
    {
      "imports": {
        "three": "https://cdn.jsdelivr.net/npm/three@0.161.0/build/three.module.js",
        "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.161.0/examples/jsm/"
      }
    }
  </script>

  <script type="module">
    import * as THREE from 'three';
    import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

    function clamp(value, min, max) {
      return Math.max(min, Math.min(max, value));
    }

    function lerp(start, end, amount) {
      return start + (end - start) * amount;
    }

    function sliderToTargetTemperature(sliderValue) {
      const normalized = clamp(sliderValue / 100, 0, 1);
      return TARGET_T_MIN + Math.pow(normalized, 1.15) * (TARGET_T_MAX - TARGET_T_MIN);
    }

    function mapReducedToDisplayKelvin(reducedTemperature) {
      // The simulation runs in Lennard-Jones reduced units internally.
      // For pre-university teaching, we display an illustrative Kelvin scale
      // for a fictional sample substance whose melting point is around 150 K
      // and boiling point is around 1200 K. This is a presentation mapping,
      // not a calibration to any specific real material.
      const t = clamp(reducedTemperature, TARGET_T_MIN, TARGET_T_MAX);
      if (t <= DISPLAY_MELT_REDUCED_T) {
        const amount = (t - TARGET_T_MIN) / (DISPLAY_MELT_REDUCED_T - TARGET_T_MIN);
        return lerp(DISPLAY_MIN_K, DISPLAY_MELT_K, clamp(amount, 0, 1));
      }
      if (t <= DISPLAY_BOIL_REDUCED_T) {
        const amount = (t - DISPLAY_MELT_REDUCED_T) / (DISPLAY_BOIL_REDUCED_T - DISPLAY_MELT_REDUCED_T);
        return lerp(DISPLAY_MELT_K, DISPLAY_BOIL_K, clamp(amount, 0, 1));
      }
      const amount = (t - DISPLAY_BOIL_REDUCED_T) / (TARGET_T_MAX - DISPLAY_BOIL_REDUCED_T);
      return lerp(DISPLAY_BOIL_K, DISPLAY_MAX_K, clamp(amount, 0, 1));
    }

    function formatDisplayTemperature(reducedTemperature) {
      return Math.round(mapReducedToDisplayKelvin(reducedTemperature)) + ' K';
    }

    const LJ_SIGMA = 1.0;
    const LJ_EPSILON = 1.0;
    const LJ_SIGMA6 = Math.pow(LJ_SIGMA, 6);
    const LJ_EQ_DISTANCE = Math.pow(2, 1 / 6) * LJ_SIGMA;
    const LATTICE_CONST = Math.sqrt(2) * LJ_EQ_DISTANCE;
    const LJ_CUTOFF = 2.5 * LJ_SIGMA;
    const LJ_CUTOFF_SQ = LJ_CUTOFF * LJ_CUTOFF;
    const LJ_AT_CUTOFF = 4.0 * LJ_EPSILON * (Math.pow(LJ_SIGMA / LJ_CUTOFF, 12) - Math.pow(LJ_SIGMA / LJ_CUTOFF, 6));
    const MIN_R2 = 0.25;

    const N_X = 4;
    const N_Y = 4;
    const N_Z = 4;
    const N = N_X * N_Y * N_Z * 4;
    const PARTICLE_RADIUS = 0.4;
    const BOX_SIZE = 13;
    const HALF_BOX = BOX_SIZE / 2;
    const BOND_CUTOFF = 1.35 * LJ_SIGMA;
    const BOND_CUTOFF_SQ = BOND_CUTOFF * BOND_CUTOFF;
    const TARGET_T_MIN = 0.05;
    const TARGET_T_MAX = 2.1;
    const DISPLAY_MIN_K = 40;
    const DISPLAY_MELT_K = 150;
    const DISPLAY_BOIL_K = 1200;
    const DISPLAY_MAX_K = 1600;
    const DISPLAY_MELT_REDUCED_T = 0.68;
    const DISPLAY_BOIL_REDUCED_T = 1.88;
    const THERMOSTAT_TAU = 0.18;
    const STRUCTURE_GRID = 6;
    const STRUCTURE_CELL_COUNT = STRUCTURE_GRID * STRUCTURE_GRID * STRUCTURE_GRID;
    const EMERGENCY_SPEED_LIMIT = 12.0;
    const EMERGENCY_SPEED_LIMIT_SQ = EMERGENCY_SPEED_LIMIT * EMERGENCY_SPEED_LIMIT;
    const SUB_STEPS = 6;

    const POS = new Float32Array(N * 3);
    const VEL = new Float32Array(N * 3);
    const FORCE = new Float32Array(N * 3);
    const COORDINATION = new Uint16Array(N);
    const OCCUPANCY = new Uint8Array(STRUCTURE_CELL_COUNT);

    const SIM_STATE = {
      slider: 0,
      playing: true,
      targetReducedT: TARGET_T_MIN,
      measuredReducedT: TARGET_T_MIN,
      referenceBondCount: 1,
      phaseInfo: { label: 'Solid', cls: 'status-solid' },
      metrics: {
        bondFraction: 1,
        meanCoordination: 0,
        fillFraction: 0,
        rmsRadius: 0
      },
      _smoothReducedT: undefined,
      _smoothBondFraction: undefined,
      _smoothMeanCoordination: undefined,
      _smoothFillFraction: undefined,
      _smoothRmsRadius: undefined
    };

    function removeCenterOfMassDrift() {
      let meanVX = 0;
      let meanVY = 0;
      let meanVZ = 0;

      for (let i = 0; i < N; i++) {
        meanVX += VEL[i * 3];
        meanVY += VEL[i * 3 + 1];
        meanVZ += VEL[i * 3 + 2];
      }

      meanVX /= N;
      meanVY /= N;
      meanVZ /= N;

      for (let i = 0; i < N; i++) {
        VEL[i * 3] -= meanVX;
        VEL[i * 3 + 1] -= meanVY;
        VEL[i * 3 + 2] -= meanVZ;
      }
    }

    function computeThermalKineticEnergy() {
      let kineticEnergy = 0;
      for (let i = 0; i < N; i++) {
        const vx = VEL[i * 3];
        const vy = VEL[i * 3 + 1];
        const vz = VEL[i * 3 + 2];
        kineticEnergy += 0.5 * (vx * vx + vy * vy + vz * vz);
      }
      return kineticEnergy;
    }

    function reducedTemperatureFromKE(kineticEnergy) {
      const dof = Math.max(1, 3 * N - 3);
      return (2 * kineticEnergy) / dof;
    }

    function updateMeasuredTemperature(reducedTemperature, reset) {
      if (reset || typeof SIM_STATE._smoothReducedT === 'undefined') {
        SIM_STATE._smoothReducedT = reducedTemperature;
      } else {
        SIM_STATE._smoothReducedT = lerp(SIM_STATE._smoothReducedT, reducedTemperature, 0.12);
      }
      SIM_STATE.measuredReducedT = SIM_STATE._smoothReducedT;
    }

    function measureCurrentTemperature(reset) {
      removeCenterOfMassDrift();
      const kineticEnergy = computeThermalKineticEnergy();
      updateMeasuredTemperature(reducedTemperatureFromKE(kineticEnergy), reset);
    }

    function rescaleVelocitiesToTemperature(targetReducedT) {
      removeCenterOfMassDrift();
      const kineticEnergy = computeThermalKineticEnergy();
      if (kineticEnergy <= 1e-8) return;

      const currentReducedT = reducedTemperatureFromKE(kineticEnergy);
      const scale = Math.sqrt(targetReducedT / Math.max(currentReducedT, 1e-8));
      for (let i = 0; i < N; i++) {
        VEL[i * 3] *= scale;
        VEL[i * 3 + 1] *= scale;
        VEL[i * 3 + 2] *= scale;
      }
    }

    function initParticles() {
      let index = 0;
      const a = LATTICE_CONST;
      const originX = -((N_X - 1) * a) / 2 - a / 4;
      const originY = -((N_Y - 1) * a) / 2 - a / 4;
      const originZ = -((N_Z - 1) * a) / 2 - a / 4;
      const basis = [
        [0, 0, 0],
        [a / 2, a / 2, 0],
        [a / 2, 0, a / 2],
        [0, a / 2, a / 2]
      ];

      for (let x = 0; x < N_X; x++) {
        for (let y = 0; y < N_Y; y++) {
          for (let z = 0; z < N_Z; z++) {
            const cellX = originX + x * a;
            const cellY = originY + y * a;
            const cellZ = originZ + z * a;

            for (const point of basis) {
              const jitter = (Math.random() - 0.5) * 0.015;
              POS[index * 3] = cellX + point[0] + jitter;
              POS[index * 3 + 1] = cellY + point[1] + jitter;
              POS[index * 3 + 2] = cellZ + point[2] + jitter;

              VEL[index * 3] = Math.random() - 0.5;
              VEL[index * 3 + 1] = Math.random() - 0.5;
              VEL[index * 3 + 2] = Math.random() - 0.5;
              index++;
            }
          }
        }
      }

      removeCenterOfMassDrift();
      rescaleVelocitiesToTemperature(TARGET_T_MIN);
      SIM_STATE._smoothReducedT = undefined;
      SIM_STATE._smoothBondFraction = undefined;
      SIM_STATE._smoothMeanCoordination = undefined;
      SIM_STATE._smoothFillFraction = undefined;
      SIM_STATE._smoothRmsRadius = undefined;
    }

    function computeForcesAndPotential() {
      // 12-6 Lennard-Jones interactions give a compact condensed phase at
      // low temperature and a dispersed gas at high temperature. The potential
      // is truncated at 2.5 sigma and shifted so it approaches zero smoothly at
      // the cutoff, which keeps the model stable for a lightweight browser sim.
      FORCE.fill(0);
      let potentialEnergy = 0;

      for (let i = 0; i < N; i++) {
        for (let j = i + 1; j < N; j++) {
          const dx = POS[j * 3] - POS[i * 3];
          if (dx > LJ_CUTOFF || dx < -LJ_CUTOFF) continue;

          const dy = POS[j * 3 + 1] - POS[i * 3 + 1];
          if (dy > LJ_CUTOFF || dy < -LJ_CUTOFF) continue;

          const dz = POS[j * 3 + 2] - POS[i * 3 + 2];
          if (dz > LJ_CUTOFF || dz < -LJ_CUTOFF) continue;

          let r2 = dx * dx + dy * dy + dz * dz;
          if (r2 > LJ_CUTOFF_SQ) continue;
          if (r2 < MIN_R2) r2 = MIN_R2;

          const r2inv = 1.0 / r2;
          const r6inv = r2inv * r2inv * r2inv;
          const s6r6 = LJ_SIGMA6 * r6inv;
          const s12r12 = s6r6 * s6r6;
          potentialEnergy += 4.0 * LJ_EPSILON * (s12r12 - s6r6) - LJ_AT_CUTOFF;

          const fOverR = 24.0 * LJ_EPSILON * r2inv * (2.0 * s12r12 - s6r6);
          const fx = fOverR * dx;
          const fy = fOverR * dy;
          const fz = fOverR * dz;

          FORCE[j * 3] += fx;
          FORCE[j * 3 + 1] += fy;
          FORCE[j * 3 + 2] += fz;
          FORCE[i * 3] -= fx;
          FORCE[i * 3 + 1] -= fy;
          FORCE[i * 3 + 2] -= fz;
        }
      }

      return potentialEnergy;
    }

    function reflectParticle(baseIndex) {
      const lo = -HALF_BOX + PARTICLE_RADIUS;
      const hi = HALF_BOX - PARTICLE_RADIUS;

      for (let axis = 0; axis < 3; axis++) {
        const idx = baseIndex + axis;
        if (POS[idx] < lo) {
          POS[idx] = lo + (lo - POS[idx]);
          VEL[idx] = Math.abs(VEL[idx]);
        } else if (POS[idx] > hi) {
          POS[idx] = hi - (POS[idx] - hi);
          VEL[idx] = -Math.abs(VEL[idx]);
        }
      }
    }

    function capExtremeVelocities() {
      for (let i = 0; i < N; i++) {
        const base = i * 3;
        let speedSq = VEL[base] * VEL[base] + VEL[base + 1] * VEL[base + 1] + VEL[base + 2] * VEL[base + 2];
        if (speedSq > EMERGENCY_SPEED_LIMIT_SQ) {
          const scale = EMERGENCY_SPEED_LIMIT / Math.sqrt(speedSq);
          VEL[base] *= scale;
          VEL[base + 1] *= scale;
          VEL[base + 2] *= scale;
        }
      }
    }

    function applyThermostat(dt, currentReducedT) {
      // A weak Berendsen-style thermostat nudges the system toward the target
      // temperature without hard-coding the phase. The observed phase still
      // comes from particle structure and how much volume the sample occupies.
      if (!isFinite(currentReducedT) || currentReducedT <= 1e-8) return;

      const coupling = clamp(dt / THERMOSTAT_TAU, 0, 1);
      const lambdaSq = Math.max(0.05, 1 + coupling * (SIM_STATE.targetReducedT / currentReducedT - 1));
      const scale = Math.sqrt(lambdaSq);

      for (let i = 0; i < N; i++) {
        VEL[i * 3] *= scale;
        VEL[i * 3 + 1] *= scale;
        VEL[i * 3 + 2] *= scale;
      }
    }

    function stepPhysics(dt) {
      for (let i = 0; i < N; i++) {
        VEL[i * 3] += 0.5 * FORCE[i * 3] * dt;
        VEL[i * 3 + 1] += 0.5 * FORCE[i * 3 + 1] * dt;
        VEL[i * 3 + 2] += 0.5 * FORCE[i * 3 + 2] * dt;

        POS[i * 3] += VEL[i * 3] * dt;
        POS[i * 3 + 1] += VEL[i * 3 + 1] * dt;
        POS[i * 3 + 2] += VEL[i * 3 + 2] * dt;
        reflectParticle(i * 3);
      }

      computeForcesAndPotential();

      for (let i = 0; i < N; i++) {
        VEL[i * 3] += 0.5 * FORCE[i * 3] * dt;
        VEL[i * 3 + 1] += 0.5 * FORCE[i * 3 + 1] * dt;
        VEL[i * 3 + 2] += 0.5 * FORCE[i * 3 + 2] * dt;
      }

      capExtremeVelocities();
      removeCenterOfMassDrift();

      let kineticEnergy = computeThermalKineticEnergy();
      let reducedTemperature = reducedTemperatureFromKE(kineticEnergy);
      applyThermostat(dt, reducedTemperature);
      removeCenterOfMassDrift();

      kineticEnergy = computeThermalKineticEnergy();
      reducedTemperature = reducedTemperatureFromKE(kineticEnergy);
      updateMeasuredTemperature(reducedTemperature, false);
    }

    function countBondsOnly() {
      let bondCount = 0;
      for (let i = 0; i < N; i++) {
        for (let j = i + 1; j < N; j++) {
          const dx = POS[j * 3] - POS[i * 3];
          if (dx > BOND_CUTOFF || dx < -BOND_CUTOFF) continue;

          const dy = POS[j * 3 + 1] - POS[i * 3 + 1];
          if (dy > BOND_CUTOFF || dy < -BOND_CUTOFF) continue;

          const dz = POS[j * 3 + 2] - POS[i * 3 + 2];
          if (dz > BOND_CUTOFF || dz < -BOND_CUTOFF) continue;

          const r2 = dx * dx + dy * dy + dz * dz;
          if (r2 < BOND_CUTOFF_SQ) bondCount++;
        }
      }
      return bondCount;
    }

    function smoothMetric(key, value, alpha) {
      const stateKey = '_smooth' + key;
      if (typeof SIM_STATE[stateKey] === 'undefined') {
        SIM_STATE[stateKey] = value;
      } else {
        SIM_STATE[stateKey] = lerp(SIM_STATE[stateKey], value, alpha);
      }
      return SIM_STATE[stateKey];
    }

    function getPhaseInfo(metrics) {
      // The UI reports a simple school-level state label, but it is still
      // measured from the particle configuration rather than tied directly to
      // the slider. Strong bonding and high coordination indicate a solid,
      // diffuse occupancy with few bonds indicates a gas, and the broad middle
      // regime is shown as liquid.
      if (metrics.bondFraction >= 0.82 && metrics.meanCoordination >= 8.0 && metrics.reducedT < 0.6) {
        return { label: 'Solid', cls: 'status-solid' };
      }

      if (
        metrics.bondFraction <= 0.30 &&
        metrics.meanCoordination <= 2.8 &&
        metrics.fillFraction >= 0.68 &&
        metrics.rmsRadius >= 0.72 &&
        metrics.reducedT >= DISPLAY_BOIL_REDUCED_T - 0.05
      ) {
        return { label: 'Gas', cls: 'status-gas' };
      }

      return { label: 'Liquid', cls: 'status-liquid' };
    }

    function refreshDiagnostics() {
      COORDINATION.fill(0);
      OCCUPANCY.fill(0);

      let centerX = 0;
      let centerY = 0;
      let centerZ = 0;

      for (let i = 0; i < N; i++) {
        const x = POS[i * 3];
        const y = POS[i * 3 + 1];
        const z = POS[i * 3 + 2];

        centerX += x;
        centerY += y;
        centerZ += z;

        const ix = clamp(Math.floor(((x + HALF_BOX) / BOX_SIZE) * STRUCTURE_GRID), 0, STRUCTURE_GRID - 1);
        const iy = clamp(Math.floor(((y + HALF_BOX) / BOX_SIZE) * STRUCTURE_GRID), 0, STRUCTURE_GRID - 1);
        const iz = clamp(Math.floor(((z + HALF_BOX) / BOX_SIZE) * STRUCTURE_GRID), 0, STRUCTURE_GRID - 1);
        OCCUPANCY[ix + iy * STRUCTURE_GRID + iz * STRUCTURE_GRID * STRUCTURE_GRID] = 1;
      }

      centerX /= N;
      centerY /= N;
      centerZ /= N;

      let sumR2 = 0;
      for (let i = 0; i < N; i++) {
        const dx = POS[i * 3] - centerX;
        const dy = POS[i * 3 + 1] - centerY;
        const dz = POS[i * 3 + 2] - centerZ;
        sumR2 += dx * dx + dy * dy + dz * dz;
      }

      let bondCount = 0;
      let visibleBondCount = 0;

      for (let i = 0; i < N; i++) {
        for (let j = i + 1; j < N; j++) {
          const dx = POS[j * 3] - POS[i * 3];
          if (dx > BOND_CUTOFF || dx < -BOND_CUTOFF) continue;

          const dy = POS[j * 3 + 1] - POS[i * 3 + 1];
          if (dy > BOND_CUTOFF || dy < -BOND_CUTOFF) continue;

          const dz = POS[j * 3 + 2] - POS[i * 3 + 2];
          if (dz > BOND_CUTOFF || dz < -BOND_CUTOFF) continue;

          const r2 = dx * dx + dy * dy + dz * dz;
          if (r2 >= BOND_CUTOFF_SQ) continue;

          bondCount++;
          COORDINATION[i]++;
          COORDINATION[j]++;

          if (visibleBondCount < MAX_BONDS) {
            const offset = visibleBondCount * 6;
            bondPositions[offset] = POS[i * 3];
            bondPositions[offset + 1] = POS[i * 3 + 1];
            bondPositions[offset + 2] = POS[i * 3 + 2];
            bondPositions[offset + 3] = POS[j * 3];
            bondPositions[offset + 4] = POS[j * 3 + 1];
            bondPositions[offset + 5] = POS[j * 3 + 2];
            visibleBondCount++;
          }
        }
      }

      bondPosAttr.needsUpdate = true;
      bondGeo.setDrawRange(0, visibleBondCount * 2);

      let occupiedCells = 0;
      for (let i = 0; i < STRUCTURE_CELL_COUNT; i++) {
        occupiedCells += OCCUPANCY[i];
      }

      const rawBondFraction = clamp(bondCount / Math.max(1, SIM_STATE.referenceBondCount), 0, 1.25);
      const rawMeanCoordination = (2 * bondCount) / N;
      const rawFillFraction = occupiedCells / STRUCTURE_CELL_COUNT;
      const rawRmsRadius = Math.sqrt(sumR2 / N) / HALF_BOX;

      SIM_STATE.metrics.bondFraction = smoothMetric('BondFraction', rawBondFraction, 0.18);
      SIM_STATE.metrics.meanCoordination = smoothMetric('MeanCoordination', rawMeanCoordination, 0.18);
      SIM_STATE.metrics.fillFraction = smoothMetric('FillFraction', rawFillFraction, 0.18);
      SIM_STATE.metrics.rmsRadius = smoothMetric('RmsRadius', rawRmsRadius, 0.18);
      SIM_STATE.phaseInfo = getPhaseInfo({
        bondFraction: SIM_STATE.metrics.bondFraction,
        meanCoordination: SIM_STATE.metrics.meanCoordination,
        fillFraction: SIM_STATE.metrics.fillFraction,
        rmsRadius: SIM_STATE.metrics.rmsRadius,
        reducedT: SIM_STATE.measuredReducedT
      });

      bondMat.opacity = 0.04 + 0.34 * clamp(SIM_STATE.metrics.bondFraction, 0, 1);
    }

    const tempSlider = document.getElementById('tempSlider');
    const heatVal = document.getElementById('heatVal');
    const tempVal = document.getElementById('tempVal');
    const stateChip = document.getElementById('stateChip');
    const playPauseBtn = document.getElementById('playPauseBtn');
    const resetBtn = document.getElementById('resetBtn');
    const themeBtn = document.getElementById('theme-button');

    function updateUIState() {
      heatVal.textContent = formatDisplayTemperature(SIM_STATE.targetReducedT);
      tempVal.textContent = formatDisplayTemperature(SIM_STATE.measuredReducedT);
      stateChip.textContent = SIM_STATE.phaseInfo.label;
      stateChip.className = 'status-chip ' + SIM_STATE.phaseInfo.cls;
    }

    function togglePlay() {
      SIM_STATE.playing = !SIM_STATE.playing;
      playPauseBtn.textContent = SIM_STATE.playing ? 'Pause' : 'Play';
      playPauseBtn.className = SIM_STATE.playing ? 'btn btn-primary' : 'btn btn-secondary';
    }

    tempSlider.addEventListener('input', () => {
      SIM_STATE.slider = parseInt(tempSlider.value, 10);
      SIM_STATE.targetReducedT = sliderToTargetTemperature(SIM_STATE.slider);
      updateUIState();
    });

    playPauseBtn.addEventListener('click', togglePlay);

    document.addEventListener('keydown', (e) => {
      if (e.target.tagName === 'INPUT') return;
      if (e.code === 'Space') {
        e.preventDefault();
        togglePlay();
      } else if (e.code === 'KeyR') {
        resetBtn.click();
      }
    });

    function setThemeMeta(nextTheme) {
      const themeColorMeta = document.querySelector('meta[name="theme-color"]');
      const appleMeta = document.querySelector('meta[name="apple-mobile-web-app-status-bar-style"]');
      if (themeColorMeta) {
        themeColorMeta.setAttribute('content', nextTheme === 'dark' ? '#0f1014' : '#f8f9fa');
      }
      if (appleMeta) {
        appleMeta.setAttribute('content', nextTheme === 'dark' ? 'black-translucent' : 'default');
      }
    }

    function toggleTheme() {
      const html = document.documentElement;
      const current = html.getAttribute('data-theme');
      const next = current === 'dark' ? 'light' : 'dark';
      html.setAttribute('data-theme', next);

      if (next === 'dark') {
        localStorage.setItem('panphy-dark', '1');
      } else {
        localStorage.removeItem('panphy-dark');
      }

      setThemeMeta(next);
      updateThreeTheme();
    }

    themeBtn.addEventListener('click', toggleTheme);

    const canvas = document.getElementById('simCanvas');
    const scene = new THREE.Scene();

    const colors = {
      light: { bg: 0xe8edf3, boxEdge: 0xa0aec0 },
      dark: { bg: 0x0a0c14, boxEdge: 0x4a5568 }
    };

    const phaseColors = {
      cold: new THREE.Color(0x00cec9),
      mid: new THREE.Color(0xa29bfe),
      hot: new THREE.Color(0xff7675)
    };

    function isDark() {
      return document.documentElement.getAttribute('data-theme') === 'dark';
    }

    const camera = new THREE.PerspectiveCamera(45, 1, 0.1, 100);
    camera.position.set(0, 8, 20);

    const renderer = new THREE.WebGLRenderer({ canvas, antialias: true, alpha: true });
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));

    const controls = new OrbitControls(camera, canvas);
    controls.enableDamping = true;
    controls.dampingFactor = 0.08;
    controls.target.set(0, 0, 0);
    controls.minDistance = 5;
    controls.maxDistance = 40;

    const ambientLight = new THREE.AmbientLight(0xffffff, 0.6);
    scene.add(ambientLight);

    const dirLight = new THREE.DirectionalLight(0xffffff, 1.2);
    dirLight.position.set(10, 20, 10);
    scene.add(dirLight);

    const dirLight2 = new THREE.DirectionalLight(0xffffff, 0.5);
    dirLight2.position.set(-10, 10, -10);
    scene.add(dirLight2);

    const boxGeo = new THREE.BoxGeometry(BOX_SIZE, BOX_SIZE, BOX_SIZE);
    const boxEdges = new THREE.EdgesGeometry(boxGeo);
    const boxMaterial = new THREE.LineBasicMaterial({ color: colors.light.boxEdge, transparent: true, opacity: 0.5 });
    const boxLines = new THREE.LineSegments(boxEdges, boxMaterial);
    scene.add(boxLines);

    const floorGeo = new THREE.PlaneGeometry(BOX_SIZE, BOX_SIZE);
    const floorMat = new THREE.MeshBasicMaterial({ color: 0x000000, transparent: true, opacity: 0.05, depthWrite: false });
    const floor = new THREE.Mesh(floorGeo, floorMat);
    floor.rotation.x = -Math.PI / 2;
    floor.position.y = -HALF_BOX;
    scene.add(floor);

    const particleGeo = new THREE.SphereGeometry(PARTICLE_RADIUS, 16, 16);
    const particleMat = new THREE.MeshPhysicalMaterial({
      color: phaseColors.cold,
      roughness: 0.2,
      metalness: 0.1,
      clearcoat: 0.8
    });

    const instancedMesh = new THREE.InstancedMesh(particleGeo, particleMat, N);
    instancedMesh.instanceMatrix.setUsage(THREE.DynamicDrawUsage);
    scene.add(instancedMesh);

    const dummy = new THREE.Object3D();
    const MAX_BONDS = 2000;
    const bondPositions = new Float32Array(MAX_BONDS * 2 * 3);
    const bondGeo = new THREE.BufferGeometry();
    const bondPosAttr = new THREE.BufferAttribute(bondPositions, 3);
    bondPosAttr.setUsage(THREE.DynamicDrawUsage);
    bondGeo.setAttribute('position', bondPosAttr);
    bondGeo.setDrawRange(0, 0);
    const bondMat = new THREE.LineBasicMaterial({
      color: 0xffffff,
      transparent: true,
      opacity: 0.35,
      depthWrite: false
    });
    const bondLines = new THREE.LineSegments(bondGeo, bondMat);
    scene.add(bondLines);

    function updateThreeTheme() {
      const theme = isDark() ? colors.dark : colors.light;
      scene.background = new THREE.Color(theme.bg);
      boxMaterial.color.setHex(theme.boxEdge);
      floorMat.opacity = isDark() ? 0.2 : 0.05;
      floorMat.color.setHex(isDark() ? 0xffffff : 0x000000);
    }

    function updateParticleColors() {
      const norm = clamp((SIM_STATE.measuredReducedT - TARGET_T_MIN) / (TARGET_T_MAX - TARGET_T_MIN), 0, 1);
      const color = new THREE.Color();
      if (norm < 0.5) {
        color.lerpColors(phaseColors.cold, phaseColors.mid, norm * 2);
      } else {
        color.lerpColors(phaseColors.mid, phaseColors.hot, (norm - 0.5) * 2);
      }
      particleMat.color.copy(color);
    }

    function syncParticlesToScene() {
      for (let i = 0; i < N; i++) {
        dummy.position.set(POS[i * 3], POS[i * 3 + 1], POS[i * 3 + 2]);
        dummy.updateMatrix();
        instancedMesh.setMatrixAt(i, dummy.matrix);
      }
      instancedMesh.instanceMatrix.needsUpdate = true;
    }

    function refreshVisualState() {
      refreshDiagnostics();
      updateParticleColors();
      updateUIState();
      syncParticlesToScene();
    }

    function resize() {
      const container = document.getElementById('simPanel');
      if (!container) return;

      const width = container.clientWidth;
      const height = container.clientHeight;
      camera.aspect = width / height;
      camera.updateProjectionMatrix();
      renderer.setSize(width, height, false);
    }

    window.addEventListener('resize', resize);
    setTimeout(resize, 0);

    resetBtn.addEventListener('click', () => {
      SIM_STATE.slider = 0;
      SIM_STATE.targetReducedT = TARGET_T_MIN;
      tempSlider.value = '0';
      initParticles();
      computeForcesAndPotential();
      SIM_STATE.referenceBondCount = Math.max(1, countBondsOnly());
      measureCurrentTemperature(true);
      refreshVisualState();
      if (!SIM_STATE.playing) togglePlay();
    });

    initParticles();
    computeForcesAndPotential();
    SIM_STATE.referenceBondCount = Math.max(1, countBondsOnly());
    measureCurrentTemperature(true);
    updateThreeTheme();
    refreshVisualState();

    let lastTime = 0;

    function animate(timestamp) {
      requestAnimationFrame(animate);

      if (lastTime === 0) lastTime = timestamp;
      let dt = (timestamp - lastTime) / 1000;
      lastTime = timestamp;
      if (dt > 0.04) dt = 0.04;

      if (SIM_STATE.playing) {
        const subDt = dt / SUB_STEPS;
        for (let step = 0; step < SUB_STEPS; step++) {
          stepPhysics(subDt);
        }
        refreshVisualState();
      }

      controls.update();
      renderer.render(scene, camera);
    }

    requestAnimationFrame(animate);

  </script>
</body>
