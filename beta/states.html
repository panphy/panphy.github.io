<!DOCTYPE html>
<html lang="en" data-theme="light">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#f8f9fa">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <script>
    (function () {
      if (localStorage.getItem('panphy-dark')) {
        document.documentElement.setAttribute('data-theme', 'dark');
        var tc = document.querySelector('meta[name="theme-color"]');
        var sb = document.querySelector('meta[name="apple-mobile-web-app-status-bar-style"]');
        if (tc) tc.setAttribute('content', '#0f1014');
        if (sb) sb.setAttribute('content', 'black-translucent');
      }
    })();
  </script>
  <title>States of Matter | PanPhy Labs</title>
  <link rel="icon" type="image/png" href="/assets/favicon.png">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;600&family=Poppins:wght@600;700;800&display=swap');

    :root {
      --font-sans: 'Inter', sans-serif;
      --font-display: 'Poppins', 'Inter', sans-serif;
      --font-mono: 'JetBrains Mono', monospace;

      --bg-color: #f8f9fa;
      --bg-pattern: #e9ecef;
      --text-main: #2d3436;
      --text-secondary: #636e72;

      --brand-primary: #6c5ce7;
      --brand-accent: #00cec9;

      --surface: #ffffff;
      --surface-alt: #f1f5f9;
      --border: #e2e8f0;
      --shadow: 0 16px 40px rgba(0, 0, 0, 0.08);

      --btn-primary: #6c5ce7;
      --btn-primary-hover: #5b4cdb;
      --btn-text: #ffffff;

      --nav-bg: rgba(255, 255, 255, 0.85);
      --nav-border: rgba(255, 255, 255, 0.5);

      --slider-track: #e2e8f0;
      --slider-thumb: #6c5ce7;
      --toggle-hover: rgba(108, 92, 231, 0.15);

      --scene-bg: #e8edf3;
    }

    [data-theme="dark"] {
      --bg-color: #0f1014;
      --bg-pattern: #181a20;
      --text-main: #dfe6e9;
      --text-secondary: #b2bec3;

      --brand-primary: #a29bfe;
      --brand-accent: #81ecec;

      --surface: #1e2129;
      --surface-alt: #17191f;
      --border: #2d3436;
      --shadow: 0 20px 45px rgba(0, 0, 0, 0.35);

      --btn-primary: #6c5ce7;
      --btn-primary-hover: #5849d6;
      --btn-text: #ffffff;

      --nav-bg: rgba(22, 24, 29, 0.85);
      --nav-border: rgba(255, 255, 255, 0.08);

      --slider-track: #4a5568;
      --slider-thumb: #a29bfe;
      --toggle-hover: rgba(162, 155, 254, 0.2);

      --scene-bg: #0a0c14;
    }

    * {
      box-sizing: border-box;
    }

    html, body {
      height: 100%;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: var(--font-sans);
      color: var(--text-main);
      background-color: var(--bg-color);
      background-image: radial-gradient(var(--bg-pattern) 1px, transparent 1px);
      background-size: 30px 30px;
      overflow: hidden;
    }

    a {
      color: var(--brand-primary);
      text-decoration: none;
    }

    a:hover {
      text-decoration: underline;
    }

    #app {
      height: 100%;
      display: flex;
      flex-direction: column;
      gap: 0.8rem;
      padding: 0;
    }

    /* Title Banner */
    #titleBanner {
      display: grid;
      grid-template-columns: auto 1fr auto;
      align-items: center;
      gap: 16px;
      width: calc(100% - 40px);
      max-width: 1360px;
      margin: 16px auto 0;
      background: var(--nav-bg);
      border: 1px solid var(--nav-border);
      border-radius: 20px;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      min-height: 58px;
      padding: 8px 20px;
      z-index: 10;
    }

    .banner-logo img {
      width: auto;
      height: 36px;
      display: block;
      filter: drop-shadow(0 4px 6px rgba(0, 0, 0, 0.1));
    }

    .banner-title {
      margin: 0;
      text-align: center;
      font-family: var(--font-display);
      font-size: 1.6rem;
      font-weight: 800;
      letter-spacing: -0.5px;
      color: var(--brand-primary);
    }

    .banner-title.gradient-text {
      background: linear-gradient(135deg, var(--brand-primary), var(--brand-accent));
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .banner-actions {
      display: flex;
      align-items: center;
      justify-content: flex-end;
      gap: 12px;
    }

    #theme-button {
      background: transparent;
      border: none;
      color: var(--text-main);
      border-radius: 50%;
      font-size: 1.25rem;
      line-height: 1;
      min-height: 42px;
      min-width: 42px;
      padding: 0.5rem;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      transition: transform 0.2s ease, background-color 0.2s ease;
    }

    #theme-button:hover {
      background-color: var(--toggle-hover);
      transform: rotate(15deg);
    }

    #theme-button:focus-visible {
      outline: 2px solid var(--brand-primary);
      outline-offset: 2px;
    }

    /* Workspace */
    #workspace {
      min-height: 0;
      flex: 1;
      display: grid;
      grid-template-columns: minmax(0, 2fr) minmax(300px, 1fr);
      gap: 0.9rem;
      width: calc(100% - 40px);
      max-width: 1360px;
      margin: 0 auto;
      padding-bottom: 0.75rem;
      z-index: 1;
    }

    .panel {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 18px;
      box-shadow: var(--shadow);
    }

    /* Sim Panel */
    #simPanel {
      display: flex;
      flex-direction: column;
      min-height: 0;
      overflow: hidden;
      position: relative;
    }

    #simCanvas {
      display: block;
      width: 100%;
      height: 0;
      flex: 1;
      min-height: 0;
      border-radius: 18px;
      cursor: grab;
    }

    #simCanvas:active {
      cursor: grabbing;
    }

    .sim-hint {
      position: absolute;
      bottom: 10px;
      left: 50%;
      transform: translateX(-50%);
      margin: 0;
      font-size: 0.72rem;
      color: var(--text-secondary);
      font-family: var(--font-mono);
      background: var(--nav-bg);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      padding: 4px 12px;
      border-radius: 999px;
      border: 1px solid var(--nav-border);
      pointer-events: none;
      opacity: 0.85;
      white-space: nowrap;
    }

    /* Controls Panel */
    #controlsPanel {
      display: flex;
      flex-direction: column;
      gap: 1rem;
      padding: 1.2rem;
      overflow-y: auto;
      min-height: 0;
    }

    .controls-header h2 {
      margin: 0;
      font-family: var(--font-display);
      font-size: 1.2rem;
      letter-spacing: -0.01em;
    }

    .controls-header p {
      margin: 0.2rem 0 0;
      color: var(--text-secondary);
      font-size: 0.85rem;
    }

    .status-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 0.5rem;
    }

    .status-chip {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 28px;
      padding: 0 0.8rem;
      border-radius: 999px;
      font-size: 0.75rem;
      font-weight: 700;
      letter-spacing: 0.05em;
      border: 1px solid transparent;
      user-select: none;
      transition: all 0.3s ease;
    }

    .status-solid { background: rgba(0, 206, 201, 0.15); color: #008f8c; border-color: rgba(0, 206, 201, 0.3); }
    [data-theme="dark"] .status-solid { color: #56d4d0; }

    .status-liquid { background: rgba(108, 92, 231, 0.15); color: #5849d6; border-color: rgba(108, 92, 231, 0.3); }
    [data-theme="dark"] .status-liquid { color: #b4acfe; }

    .status-gas { background: rgba(255, 118, 117, 0.15); color: #d63031; border-color: rgba(255, 118, 117, 0.3); }
    [data-theme="dark"] .status-gas { color: #ff8c8c; }

    /* Control Blocks */
    .control-card {
      background: var(--surface-alt);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 1rem;
      display: flex;
      flex-direction: column;
      gap: 1rem;
    }

    .control-block {
      display: flex;
      flex-direction: column;
      gap: 0.4rem;
    }

    .control-header {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      gap: 0.4rem;
    }

    .control-header label {
      font-size: 0.8rem;
      font-weight: 700;
      color: var(--text-secondary);
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .control-header span {
      font-family: var(--font-mono);
      font-size: 0.85rem;
      color: var(--text-main);
      font-weight: 600;
    }

    input[type="range"] {
      width: 100%;
      height: 28px;
      background: transparent;
      cursor: pointer;
      margin: 0;
      -webkit-appearance: none;
      appearance: none;
    }

    input[type="range"]:focus-visible {
      outline: none;
    }

    input[type="range"]::-webkit-slider-runnable-track {
      height: 6px;
      border-radius: 5px;
      background: var(--slider-track);
    }

    input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none;
      appearance: none;
      width: 20px;
      height: 20px;
      margin-top: -7px;
      border-radius: 50%;
      border: none;
      background: var(--slider-thumb);
      box-shadow: 0 2px 6px rgba(0, 0, 0, 0.2);
    }

    input[type="range"]::-moz-range-track {
      height: 6px;
      border-radius: 5px;
      background: var(--slider-track);
    }

    input[type="range"]::-moz-range-thumb {
      width: 20px;
      height: 20px;
      border-radius: 50%;
      border: none;
      background: var(--slider-thumb);
      box-shadow: 0 2px 6px rgba(0, 0, 0, 0.2);
    }

    /* Temp Slider Gradient overlay */
    #tempSlider::-webkit-slider-runnable-track {
      background: linear-gradient(to right, #00cec9, #6c5ce7, #ff7675);
    }
    #tempSlider::-moz-range-track {
      background: linear-gradient(to right, #00cec9, #6c5ce7, #ff7675);
    }

    /* Buttons */
    .btn {
      border: 1px solid transparent;
      border-radius: 12px;
      min-height: 44px;
      padding: 0.5rem 0.9rem;
      font-size: 0.9rem;
      font-weight: 700;
      font-family: var(--font-sans);
      letter-spacing: 0.02em;
      cursor: pointer;
      transition: transform 0.16s ease, filter 0.16s ease, border-color 0.16s ease;
      white-space: nowrap;
      text-align: center;
    }

    .btn:focus-visible {
      outline: 2px solid var(--brand-primary);
      outline-offset: 2px;
    }

    .btn:hover {
      transform: translateY(-1px);
      filter: brightness(1.02);
    }

    .btn-primary {
      background: var(--btn-primary);
      color: var(--btn-text);
    }

    .btn-primary:hover {
      background: var(--btn-primary-hover);
    }

    .btn-secondary {
      background: var(--surface-alt);
      color: var(--text-main);
      border-color: var(--border);
    }

    .sim-actions {
      display: flex;
      gap: 0.5rem;
    }

    .sim-actions .btn {
      flex: 1;
    }

    .keyboard-hint {
      margin: 0;
      font-size: 0.7rem;
      color: var(--text-secondary);
      font-family: var(--font-mono);
      line-height: 1.5;
    }

    kbd {
      display: inline-block;
      padding: 1px 5px;
      font-family: var(--font-mono);
      font-size: 0.68rem;
      font-weight: 600;
      background: var(--surface-alt);
      border: 1px solid var(--border);
      border-radius: 4px;
      box-shadow: 0 1px 0 var(--border);
    }

    /* Responsive */
    @media (max-width: 900px) {
      body {
        overflow: auto;
      }

      #app {
        height: auto;
        min-height: 100%;
      }

      #workspace {
        grid-template-columns: 1fr;
      }

      #simPanel {
        min-height: 50vh;
        order: 1;
      }

      #controlsPanel {
        order: 2;
        min-height: auto;
      }
    }

    @media (max-width: 640px) {
      #titleBanner {
        width: calc(100% - 24px);
        margin: 12px auto 0;
        min-height: 52px;
        border-radius: 18px;
        padding: 8px 12px;
      }

      #workspace {
        width: calc(100% - 24px);
      }

      .banner-logo img {
        height: 28px;
      }

      .banner-title {
        font-size: 1.2rem;
      }
    }
  </style>
</head>

<body>
  <div id="app">
    <header id="titleBanner">
      <a href="/" class="banner-logo"><img src="/assets/panphy.png" alt="PanPhy Labs" onerror="this.style.display='none'"></a>
      <h1 class="banner-title gradient-text">States of Matter</h1>
      <div class="banner-actions">
        <button id="theme-button" title="Toggle theme" aria-label="Toggle Light/Dark Theme">☀️</button>
      </div>
    </header>

    <div id="workspace">
      <div id="simPanel" class="panel">
        <canvas id="simCanvas"></canvas>
        <p class="sim-hint">Drag to rotate · Scroll to zoom</p>
      </div>

      <div id="controlsPanel" class="panel">
        <div class="controls-header">
          <h2>Controls</h2>
          <p>Add heat energy to observe phase transitions.</p>
        </div>

        <div class="status-row">
          <span id="stateChip" class="status-chip status-solid">SOLID</span>
          <span id="tempVal" style="font-family:var(--font-mono);font-size:0.85rem;font-weight:600;">0 K</span>
        </div>

        <div class="control-card">
          <div class="control-block">
            <div class="control-header">
              <label for="tempSlider">Heat Energy</label>
              <span id="heatVal">0%</span>
            </div>
            <input type="range" id="tempSlider" min="0" max="100" step="1" value="0">
          </div>
        </div>

        <div class="sim-actions">
          <button id="playPauseBtn" class="btn btn-primary">Pause</button>
          <button id="resetBtn" class="btn btn-secondary">Reset</button>
        </div>

        <div>
          <p class="keyboard-hint">
            <kbd>Space</kbd> Play / Pause &nbsp; <kbd>R</kbd> Reset
          </p>
        </div>
      </div>
    </div>
  </div>

  <script type="importmap">
    {
      "imports": {
        "three": "https://cdn.jsdelivr.net/npm/three@0.161.0/build/three.module.js",
        "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.161.0/examples/jsm/"
      }
    }
  </script>

  <script type="module">
    import * as THREE from 'three';
    import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

    // ─── Constants & Physics State ───
    const N_X = 6;
    const N_Y = 6;
    const N_Z = 6;
    const N = N_X * N_Y * N_Z;
    const PARTICLE_RADIUS = 0.4;
    const PARTICLE_DIAM = PARTICLE_RADIUS * 2;
    const BOX_SIZE = 10;
    const HALF_BOX = BOX_SIZE / 2;
    const SPACING = 1.0;

    const POS = new Float32Array(N * 3);
    const VEL = new Float32Array(N * 3);

    const SIM_STATE = {
        slider: 0,       // heat energy input (0-100)
        playing: true,
        measuredT: 0     // temperature measured from avg KE (display units)
    };

    // ─── Heating Curve ───
    // Maps slider (total heat energy added) to target reduced temperature.
    // Plateaus at phase transitions represent latent heat:
    //   energy goes into breaking bonds, not increasing KE.
    //
    //   Slider 0–25  → solid heating      T_red 0.05 → 0.40
    //   Slider 25–45 → melting plateau    T_red 0.40  (latent heat of fusion)
    //   Slider 45–65 → liquid heating     T_red 0.40 → 1.20
    //   Slider 65–80 → boiling plateau    T_red 1.20  (latent heat of vaporisation)
    //   Slider 80–100→ gas heating        T_red 1.20 → 4.00
    function heatingCurve(s) {
        if (s <= 25) return 0.05 + (s / 25) * 0.35;
        if (s <= 45) return 0.40;
        if (s <= 65) return 0.40 + ((s - 45) / 20) * 0.80;
        if (s <= 80) return 1.20;
        return 1.20 + ((s - 80) / 20) * 2.80;
    }

    // Phase label from slider position
    function getPhaseInfo(s) {
        if (s <= 22) return { label: 'SOLID', cls: 'status-solid' };
        if (s <= 48) return { label: 'MELTING', cls: 'status-solid' };
        if (s <= 62) return { label: 'LIQUID', cls: 'status-liquid' };
        if (s <= 83) return { label: 'BOILING', cls: 'status-liquid' };
        return { label: 'GAS', cls: 'status-gas' };
    }

    // Convert reduced temperature to display Kelvin (arbitrary but intuitive scale)
    const T_DISPLAY_SCALE = 500;
    function toDisplayK(tRed) {
        return Math.round(tRed * T_DISPLAY_SCALE);
    }

    // Initialize Lattice
    function initParticles() {
      let index = 0;
      for (let x = 0; x < N_X; x++) {
        for (let y = 0; y < N_Y; y++) {
          for (let z = 0; z < N_Z; z++) {
            const px = (x - (N_X - 1) / 2) * SPACING;
            const pz = (z - (N_Z - 1) / 2) * SPACING;
            const py = (y * SPACING) - HALF_BOX + PARTICLE_RADIUS + 0.1;

            POS[index * 3] = px;
            POS[index * 3 + 1] = py;
            POS[index * 3 + 2] = pz;

            VEL[index * 3] = 0;
            VEL[index * 3 + 1] = 0;
            VEL[index * 3 + 2] = 0;

            index++;
          }
        }
      }
    }

    initParticles();

    // ─── DOM Elements ───
    const tempSlider = document.getElementById('tempSlider');
    const heatVal = document.getElementById('heatVal');
    const tempVal = document.getElementById('tempVal');
    const stateChip = document.getElementById('stateChip');
    const playPauseBtn = document.getElementById('playPauseBtn');
    const resetBtn = document.getElementById('resetBtn');
    const themeBtn = document.getElementById('theme-button');

    function updateUIState() {
      const s = SIM_STATE.slider;
      heatVal.textContent = s + '%';
      tempVal.textContent = SIM_STATE.measuredT + ' K';

      const phase = getPhaseInfo(s);
      stateChip.textContent = phase.label;
      stateChip.className = 'status-chip ' + phase.cls;
    }

    tempSlider.addEventListener('input', () => {
      SIM_STATE.slider = parseInt(tempSlider.value);
      updateUIState();
      updateParticleColors();
    });

    function togglePlay() {
        SIM_STATE.playing = !SIM_STATE.playing;
        playPauseBtn.textContent = SIM_STATE.playing ? 'Pause' : 'Play';
        playPauseBtn.className = SIM_STATE.playing ? 'btn btn-primary' : 'btn btn-secondary';
    }

    playPauseBtn.addEventListener('click', togglePlay);

    resetBtn.addEventListener('click', () => {
      initParticles();
      SIM_STATE.slider = 0;
      SIM_STATE.measuredT = 0;
      tempSlider.value = 0;
      updateUIState();
      updateParticleColors();
      if (!SIM_STATE.playing) togglePlay();
    });

    document.addEventListener('keydown', (e) => {
      if (e.target.tagName === 'INPUT') return;
      if (e.code === 'Space') {
        e.preventDefault();
        togglePlay();
      } else if (e.code === 'KeyR') {
        resetBtn.click();
      }
    });

    // Theme Toggle
    function toggleTheme() {
        const html = document.documentElement;
        const current = html.getAttribute('data-theme');
        const next = current === 'dark' ? 'light' : 'dark';
        html.setAttribute('data-theme', next);
        
        if (next === 'dark') {
            localStorage.setItem('panphy-dark', '1');
        } else {
            localStorage.removeItem('panphy-dark');
        }
        
        updateThreeTheme();
    }
    themeBtn.addEventListener('click', toggleTheme);


    // ─── Three.js Setup ───
    const canvas = document.getElementById('simCanvas');
    const scene = new THREE.Scene();
    
    const colors = {
        light: { bg: 0xe8edf3, boxEdge: 0xa0aec0 },
        dark: { bg: 0x0a0c14, boxEdge: 0x4a5568 }
    };

    const phaseColors = {
        cold: new THREE.Color(0x00cec9),
        mid:  new THREE.Color(0xa29bfe),
        hot:  new THREE.Color(0xff7675)
    };

    function isDark() {
        return document.documentElement.getAttribute('data-theme') === 'dark';
    }

    const camera = new THREE.PerspectiveCamera(45, 1, 0.1, 100);
    camera.position.set(0, 8, 20);

    const renderer = new THREE.WebGLRenderer({ canvas, antialias: true, alpha: true });
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));

    const controls = new OrbitControls(camera, canvas);
    controls.enableDamping = true;
    controls.dampingFactor = 0.08;
    controls.target.set(0, 0, 0);
    controls.minDistance = 5;
    controls.maxDistance = 40;

    // Lighting
    const ambientLight = new THREE.AmbientLight(0xffffff, 0.6);
    scene.add(ambientLight);

    const dirLight = new THREE.DirectionalLight(0xffffff, 1.2);
    dirLight.position.set(10, 20, 10);
    scene.add(dirLight);

    const dirLight2 = new THREE.DirectionalLight(0xffffff, 0.5);
    dirLight2.position.set(-10, 10, -10);
    scene.add(dirLight2);

    // Box Container
    const boxGeo = new THREE.BoxGeometry(BOX_SIZE, BOX_SIZE, BOX_SIZE);
    const boxEdges = new THREE.EdgesGeometry(boxGeo);
    const boxMaterial = new THREE.LineBasicMaterial({ color: colors.light.boxEdge, transparent: true, opacity: 0.5 });
    const boxLines = new THREE.LineSegments(boxEdges, boxMaterial);
    scene.add(boxLines);

    // Floor
    const floorGeo = new THREE.PlaneGeometry(BOX_SIZE, BOX_SIZE);
    const floorMat = new THREE.MeshBasicMaterial({ color: 0x000000, transparent: true, opacity: 0.05, depthWrite: false });
    const floor = new THREE.Mesh(floorGeo, floorMat);
    floor.rotation.x = -Math.PI / 2;
    floor.position.y = -HALF_BOX;
    scene.add(floor);

    // Particles (InstancedMesh)
    const particleGeo = new THREE.SphereGeometry(PARTICLE_RADIUS, 16, 16);
    const particleMat = new THREE.MeshPhysicalMaterial({
        color: phaseColors.cold,
        roughness: 0.2,
        metalness: 0.1,
        clearcoat: 0.8
    });
    
    const instancedMesh = new THREE.InstancedMesh(particleGeo, particleMat, N);
    instancedMesh.instanceMatrix.setUsage(THREE.DynamicDrawUsage);
    scene.add(instancedMesh);

    const dummy = new THREE.Object3D();

    // Bond visualization — lines drawn between particles within bonding distance
    const MAX_BONDS = 2000;
    const bondPositions = new Float32Array(MAX_BONDS * 2 * 3);
    const bondGeo = new THREE.BufferGeometry();
    const bondPosAttr = new THREE.BufferAttribute(bondPositions, 3);
    bondPosAttr.setUsage(THREE.DynamicDrawUsage);
    bondGeo.setAttribute('position', bondPosAttr);
    bondGeo.setDrawRange(0, 0);
    const bondMat = new THREE.LineBasicMaterial({
        color: 0xffffff,
        transparent: true,
        opacity: 0.35,
        depthWrite: false
    });
    const bondLines = new THREE.LineSegments(bondGeo, bondMat);
    scene.add(bondLines);

    function updateThreeTheme() {
        const theme = isDark() ? colors.dark : colors.light;
        scene.background = new THREE.Color(theme.bg);
        boxMaterial.color.setHex(theme.boxEdge);
        floorMat.opacity = isDark() ? 0.2 : 0.05;
        floorMat.color.setHex(isDark() ? 0xffffff : 0x000000);
    }
    
    function updateParticleColors() {
        const norm = SIM_STATE.slider / 100;
        let c = new THREE.Color();
        if (norm < 0.5) {
            c.lerpColors(phaseColors.cold, phaseColors.mid, norm * 2);
        } else {
            c.lerpColors(phaseColors.mid, phaseColors.hot, (norm - 0.5) * 2);
        }
        particleMat.color.copy(c);
    }

    updateThreeTheme();
    updateParticleColors();

    function resize() {
      const container = document.getElementById('simPanel');
      if (!container) return;
      
      const width = container.clientWidth;
      const height = container.clientHeight;
      
      camera.aspect = width / height;
      camera.updateProjectionMatrix();
      
      // Crucial: false prevents inline styles from growing infinitely
      renderer.setSize(width, height, false);
    }
    
    window.addEventListener('resize', resize);
    
    // Initial resize trigger after layout is done
    setTimeout(resize, 0);


    // ─── Physics Engine (Lennard-Jones Molecular Dynamics) ───
    //
    // Particles interact via a truncated 12-6 Lennard-Jones potential:
    //   V(r) = 4ε [(σ/r)¹² − (σ/r)⁶]
    //
    // This single potential naturally produces:
    //   • Solid: particles trapped in potential wells, vibrating in place
    //   • Liquid: particles have enough KE to move past neighbours but
    //             are still attracted (cohesion → constant volume)
    //   • Gas:   particles escape attraction entirely, fill the box
    //
    // A Berendsen thermostat couples the system to a heat bath whose
    // target temperature follows a "heating curve" with latent-heat
    // plateaus at the melting and boiling points.
    // Temperature is measured from the average kinetic energy.

    const LJ_SIGMA   = 0.88;                          // zero-crossing distance
    const LJ_EPSILON  = 2.5;                           // well depth
    const LJ_CUTOFF   = 2.5 * LJ_SIGMA;               // interaction range
    const LJ_CUTOFF_SQ = LJ_CUTOFF * LJ_CUTOFF;
    const LJ_SIGMA6   = Math.pow(LJ_SIGMA, 6);
    const LJ_SIGMA12  = LJ_SIGMA6 * LJ_SIGMA6;
    const MIN_R2       = 0.16;                          // floor r² to soften potential
    const GRAVITY      = 12.0;
    const MAX_SPEED    = 30.0;
    const THERMOSTAT_TAU = 0.08;                        // coupling strength (smaller = tighter)
    const BOND_CUTOFF  = 1.35 * LJ_SIGMA;              // draw bonds below this distance
    const BOND_CUTOFF_SQ = BOND_CUTOFF * BOND_CUTOFF;

    const FORCE = new Float32Array(N * 3);

    // Measure kinetic temperature: T = (2 / 3N) × total KE  (kB = 1, m = 1)
    function measureTemp() {
        let ke2 = 0;
        for (let i = 0; i < N; i++) {
            ke2 += VEL[i*3]*VEL[i*3] + VEL[i*3+1]*VEL[i*3+1] + VEL[i*3+2]*VEL[i*3+2];
        }
        return ke2 / (3 * N);   // = (2 * 0.5 * Σmv²) / (3N)
    }

    // Berendsen velocity-rescaling thermostat
    function applyThermostat(targetT, dt) {
        const currentT = measureTemp();
        if (currentT < 1e-6) {
            // System is frozen — inject small random velocities
            const v0 = Math.sqrt(targetT) * 0.5;
            for (let i = 0; i < N; i++) {
                VEL[i*3]   = (Math.random() - 0.5) * v0;
                VEL[i*3+1] = (Math.random() - 0.5) * v0;
                VEL[i*3+2] = (Math.random() - 0.5) * v0;
            }
            return;
        }
        const ratio = targetT / currentT;
        const lambda = Math.sqrt(1 + (dt / THERMOSTAT_TAU) * (ratio - 1));
        // Clamp to prevent explosions or instant freezing
        const clamped = Math.max(0.95, Math.min(1.05, lambda));
        for (let i = 0; i < N; i++) {
            VEL[i*3]   *= clamped;
            VEL[i*3+1] *= clamped;
            VEL[i*3+2] *= clamped;
        }
    }

    function stepPhysics(dt) {
        // 1. Compute forces: LJ pairwise + gravity
        FORCE.fill(0);
        for (let i = 0; i < N; i++) {
            FORCE[i*3+1] -= GRAVITY;  // gravity always acts downward
        }

        for (let i = 0; i < N; i++) {
            for (let j = i + 1; j < N; j++) {
                let dx = POS[j*3]   - POS[i*3];
                if (dx > LJ_CUTOFF || dx < -LJ_CUTOFF) continue;
                let dy = POS[j*3+1] - POS[i*3+1];
                if (dy > LJ_CUTOFF || dy < -LJ_CUTOFF) continue;
                let dz = POS[j*3+2] - POS[i*3+2];
                if (dz > LJ_CUTOFF || dz < -LJ_CUTOFF) continue;

                let r2 = dx*dx + dy*dy + dz*dz;
                if (r2 > LJ_CUTOFF_SQ) continue;
                // Soften potential at very close range to prevent singularity
                if (r2 < MIN_R2) r2 = MIN_R2;

                const r2inv = 1.0 / r2;
                const r6inv = r2inv * r2inv * r2inv;
                const s6r6  = LJ_SIGMA6 * r6inv;
                const s12r12 = s6r6 * s6r6;

                // F/r = 24ε * (1/r²) * [2(σ/r)¹² − (σ/r)⁶]
                const fOverR = 24.0 * LJ_EPSILON * r2inv * (2.0 * s12r12 - s6r6);

                const fx = fOverR * dx;
                const fy = fOverR * dy;
                const fz = fOverR * dz;

                FORCE[j*3]   += fx;  FORCE[j*3+1] += fy;  FORCE[j*3+2] += fz;
                FORCE[i*3]   -= fx;  FORCE[i*3+1] -= fy;  FORCE[i*3+2] -= fz;
            }
        }

        // 2. Velocity Verlet integration (symplectic, energy-conserving)
        for (let i = 0; i < N; i++) {
            // Update velocities
            VEL[i*3]   += FORCE[i*3]   * dt;
            VEL[i*3+1] += FORCE[i*3+1] * dt;
            VEL[i*3+2] += FORCE[i*3+2] * dt;

            // Speed cap
            let spd2 = VEL[i*3]*VEL[i*3] + VEL[i*3+1]*VEL[i*3+1] + VEL[i*3+2]*VEL[i*3+2];
            if (spd2 > MAX_SPEED * MAX_SPEED) {
                const s = MAX_SPEED / Math.sqrt(spd2);
                VEL[i*3] *= s; VEL[i*3+1] *= s; VEL[i*3+2] *= s;
            }

            // Update positions
            POS[i*3]   += VEL[i*3]   * dt;
            POS[i*3+1] += VEL[i*3+1] * dt;
            POS[i*3+2] += VEL[i*3+2] * dt;

            // Wall collisions (elastic-ish bounce)
            for (let k = 0; k < 3; k++) {
                const lo = -HALF_BOX + PARTICLE_RADIUS;
                const hi =  HALF_BOX - PARTICLE_RADIUS;
                if (POS[i*3+k] < lo) { POS[i*3+k] = lo; VEL[i*3+k] = Math.abs(VEL[i*3+k]) * 0.8; }
                if (POS[i*3+k] > hi) { POS[i*3+k] = hi; VEL[i*3+k] = -Math.abs(VEL[i*3+k]) * 0.8; }
            }
        }

        // 3. Thermostat — couple to target temperature from heating curve
        const targetT = heatingCurve(SIM_STATE.slider);
        applyThermostat(targetT, dt);

        // 4. Measure and store temperature for display
        SIM_STATE.measuredT = toDisplayK(measureTemp());
    }

    // ─── Bond Visualization ───
    // Find pairs within bonding distance and fill the LineSegments buffer.
    // Bonds are most visible in solid (stable network) and flicker in liquid.
    function updateBonds() {
        let count = 0;
        for (let i = 0; i < N && count < MAX_BONDS; i++) {
            for (let j = i + 1; j < N && count < MAX_BONDS; j++) {
                let dx = POS[j*3] - POS[i*3];
                if (dx > BOND_CUTOFF || dx < -BOND_CUTOFF) continue;
                let dy = POS[j*3+1] - POS[i*3+1];
                if (dy > BOND_CUTOFF || dy < -BOND_CUTOFF) continue;
                let dz = POS[j*3+2] - POS[i*3+2];
                if (dz > BOND_CUTOFF || dz < -BOND_CUTOFF) continue;

                let r2 = dx*dx + dy*dy + dz*dz;
                if (r2 < BOND_CUTOFF_SQ) {
                    const idx = count * 6;
                    bondPositions[idx]   = POS[i*3];
                    bondPositions[idx+1] = POS[i*3+1];
                    bondPositions[idx+2] = POS[i*3+2];
                    bondPositions[idx+3] = POS[j*3];
                    bondPositions[idx+4] = POS[j*3+1];
                    bondPositions[idx+5] = POS[j*3+2];
                    count++;
                }
            }
        }
        bondPosAttr.needsUpdate = true;
        bondGeo.setDrawRange(0, count * 2);

        // Fade bonds as temperature rises (less visible approaching gas)
        const tRed = heatingCurve(SIM_STATE.slider);
        bondMat.opacity = Math.max(0, 0.35 * (1 - tRed / 2.0));
    }

    // ─── Render Loop ───
    let lastTime = 0;
    const SUB_STEPS = 4;   // more substeps = more stable LJ integration

    function animate(timestamp) {
        requestAnimationFrame(animate);

        if (lastTime === 0) lastTime = timestamp;
        let dt = (timestamp - lastTime) / 1000;
        lastTime = timestamp;

        // Cap dt to prevent explosions on lag
        if (dt > 0.04) dt = 0.04;

        if (SIM_STATE.playing) {
            const subDt = dt / SUB_STEPS;
            for (let s = 0; s < SUB_STEPS; s++) {
                stepPhysics(subDt);
            }

            // Update InstancedMesh matrices
            for (let i = 0; i < N; i++) {
                dummy.position.set(POS[i*3], POS[i*3+1], POS[i*3+2]);
                dummy.updateMatrix();
                instancedMesh.setMatrixAt(i, dummy.matrix);
            }
            instancedMesh.instanceMatrix.needsUpdate = true;

            // Update bond lines
            updateBonds();

            // Update temperature display
            updateUIState();
        }

        controls.update();
        renderer.render(scene, camera);
    }

    // Start loop
    requestAnimationFrame(animate);

  </script>
</body>
</html>
