<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Scoreboard</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow+Condensed:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --bg: #07090f;
            --border: rgba(255, 255, 255, 0.08);
            --text: #e8eeff;
            --text-dim: #4e5d7a;
            --accent: #ffb800;
        }

        html, body {
            height: 100%;
            overflow: hidden;
            touch-action: manipulation;
            -webkit-tap-highlight-color: transparent;
            -webkit-touch-callout: none;
            user-select: none;
            -webkit-user-select: none;
        }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'Barlow Condensed', 'Trebuchet MS', system-ui, sans-serif;
            display: flex;
            flex-direction: column;
        }

        /* ── Main Layout ── */
        .board {
            flex: 1;
            min-height: 0;
            display: grid;
            grid-template-columns: 1fr auto 1fr;
        }

        /* ── Score Panels ── */
        .score-panel {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        .team-label {
            position: absolute;
            top: clamp(8px, 2vh, 18px);
            font-family: 'Barlow Condensed', sans-serif;
            font-size: clamp(12px, 1.8vw, 18px);
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.3em;
            color: var(--text-dim);
            pointer-events: none;
            z-index: 1;
        }

        .score-touch-zone {
            flex: 1;
            width: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            position: relative;
        }

        .score-touch-zone.up   { align-items: flex-end; }
        .score-touch-zone.down { align-items: flex-start; }

        .score-value {
            font-family: 'Bebas Neue', 'Impact', 'Arial Narrow', sans-serif;
            font-weight: 400;
            line-height: 0.92;
            font-variant-numeric: tabular-nums;
            pointer-events: none;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            white-space: nowrap;
        }

        .score-hint {
            font-family: 'Barlow Condensed', sans-serif;
            font-size: clamp(10px, 1.4vw, 13px);
            font-weight: 600;
            color: var(--text-dim);
            opacity: 0;
            transition: opacity 0.25s;
            pointer-events: none;
            position: absolute;
            letter-spacing: 0.05em;
        }
        .score-touch-zone.up   .score-hint { top: clamp(38px, 7vh, 54px); }
        .score-touch-zone.down .score-hint { bottom: clamp(10px, 2.5vh, 22px); }
        .score-touch-zone:hover .score-hint,
        .score-touch-zone:active .score-hint { opacity: 0.45; }

        .score-touch-zone::after {
            content: '';
            position: absolute;
            inset: 0;
            background: currentColor;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.12s;
        }
        .score-touch-zone.flash::after { opacity: 0.05; }

        /* ── Center Panel ── */
        .center-panel {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: clamp(10px, 1.8vh, 20px);
            padding: clamp(10px, 2vw, 20px) clamp(14px, 2.5vw, 26px);
            min-width: clamp(185px, 27vw, 340px);
            border-left:  1px solid var(--border);
            border-right: 1px solid var(--border);
        }

        .section-divider {
            width: 100%;
            height: 1px;
            background: var(--border);
            flex-shrink: 0;
        }

        /* ── Timer ── */
        .timer-section {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: clamp(6px, 1.2vh, 12px);
            width: 100%;
        }

        .timer-display {
            font-family: 'Bebas Neue', 'Impact', monospace;
            font-size: clamp(52px, 10.5vw, 140px);
            line-height: 1;
            color: var(--accent);
            letter-spacing: 0.04em;
            font-variant-numeric: tabular-nums;
            text-shadow: 0 0 28px rgba(255, 184, 0, 0.18);
        }

        .timer-display.danger {
            color: #ff3b3b;
            text-shadow: 0 0 28px rgba(255, 59, 59, 0.2);
        }

        .timer-controls {
            display: flex;
            gap: 6px;
            width: 100%;
            justify-content: center;
        }

        .timer-btn {
            flex: 1;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--border);
            color: var(--text);
            border-radius: 7px;
            padding: 8px;
            font-family: 'Barlow Condensed', sans-serif;
            font-size: clamp(12px, 1.5vw, 15px);
            font-weight: 700;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            cursor: pointer;
            transition: background 0.15s;
            min-height: 40px;
            max-width: clamp(70px, 9vw, 100px);
        }
        .timer-btn:hover { background: rgba(255, 255, 255, 0.09); }

        .timer-btn.primary {
            background: var(--accent);
            color: #0a0b0e;
            border-color: var(--accent);
        }
        .timer-btn.primary:hover { filter: brightness(1.08); }

        .gear-btn {
            background: none;
            border: none;
            color: var(--text-dim);
            font-size: clamp(15px, 1.8vw, 20px);
            cursor: pointer;
            padding: 8px;
            border-radius: 7px;
            transition: color 0.15s, background 0.15s;
            min-width: 40px;
            min-height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .gear-btn:hover { color: var(--text); background: rgba(255, 255, 255, 0.06); }

        /* ── Period ── */
        .period-section {
            display: flex;
            align-items: center;
            gap: clamp(8px, 1.4vw, 16px);
        }

        .period-inner {
            display: flex;
            flex-direction: column;
            align-items: center;
            min-width: clamp(36px, 5vw, 56px);
        }

        .period-label {
            font-size: clamp(9px, 1.1vw, 12px);
            color: var(--text-dim);
            text-transform: uppercase;
            letter-spacing: 0.22em;
            font-weight: 700;
        }

        .period-value {
            font-family: 'Bebas Neue', 'Impact', sans-serif;
            font-size: clamp(26px, 4.5vw, 54px);
            line-height: 0.9;
            color: var(--text);
            font-variant-numeric: tabular-nums;
        }

        .period-btn {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--border);
            color: var(--text-dim);
            border-radius: 7px;
            font-size: 18px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background 0.15s, color 0.15s;
            min-width: 40px;
            min-height: 40px;
        }
        .period-btn:hover { background: rgba(255, 255, 255, 0.09); color: var(--text); }

        /* ── Possession Arrow ── */
        .possession-section {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 7px;
            width: 100%;
        }

        .poss-label {
            font-size: clamp(8px, 1vw, 11px);
            color: var(--text-dim);
            text-transform: uppercase;
            letter-spacing: 0.22em;
            font-weight: 700;
        }

        .poss-display {
            display: flex;
            align-items: center;
            gap: clamp(14px, 2.2vw, 28px);
            justify-content: center;
        }

        /* Pure SVG triangle arrows — no button look */
        .poss-arrow {
            width: clamp(36px, 5vw, 64px);
            height: auto;
            cursor: pointer;
            fill: rgba(255, 255, 255, 0.07);
            transition: fill 0.2s ease, filter 0.2s ease;
            flex-shrink: 0;
            display: block;
        }
        .poss-arrow:hover { fill: rgba(255, 255, 255, 0.2); }
        .poss-arrow.active {
            fill: var(--accent);
            filter: drop-shadow(0 0 8px rgba(255, 184, 0, 0.5));
        }

        /* ── Fouls ── */
        .fouls-row {
            display: flex;
            gap: clamp(10px, 2.2vw, 26px);
            align-items: flex-start;
            justify-content: center;
            width: 100%;
        }

        .foul-block {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 2px;
        }

        .foul-label {
            font-size: clamp(8px, 1.1vw, 11px);
            color: var(--text-dim);
            text-transform: uppercase;
            letter-spacing: 0.2em;
            font-weight: 700;
        }

        .foul-touch-zone {
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 3px 8px;
            border-radius: 5px;
            transition: background 0.15s;
            min-width: 44px;
            min-height: 34px;
        }
        .foul-touch-zone:hover  { background: rgba(255, 255, 255, 0.04); }
        .foul-touch-zone:active { background: rgba(255, 255, 255, 0.08); }

        .foul-value {
            font-family: 'Bebas Neue', 'Impact', sans-serif;
            font-size: clamp(26px, 4.2vw, 48px);
            line-height: 1;
            font-variant-numeric: tabular-nums;
            pointer-events: none;
        }

        .foul-dec {
            font-size: clamp(9px, 1.1vw, 12px);
            color: var(--text-dim);
            font-weight: 700;
            pointer-events: none;
            letter-spacing: 0.05em;
        }

        /* ── Bottom Bar ── */
        .bottom-bar {
            display: flex;
            justify-content: center;
            padding: 5px 12px;
            gap: 8px;
            border-top: 1px solid var(--border);
            background: rgba(5, 7, 12, 0.98);
        }

        .bottom-btn {
            background: none;
            border: 1px solid var(--border);
            color: var(--text-dim);
            border-radius: 5px;
            padding: 5px 14px;
            font-family: 'Barlow Condensed', sans-serif;
            font-size: clamp(10px, 1.2vw, 12px);
            font-weight: 700;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            cursor: pointer;
            transition: background 0.15s, color 0.15s;
            min-height: 32px;
        }
        .bottom-btn:hover { background: rgba(255, 255, 255, 0.06); color: var(--text); }

        .sound-toggle { font-size: clamp(13px, 1.6vw, 16px); }

        /* ── Blink Overlay ── */
        .blink-overlay {
            position: fixed;
            inset: 0;
            background: #ff0000;
            z-index: 100;
            display: none;
            cursor: pointer;
        }
        .blink-overlay.active {
            display: block;
            animation: blink 0.5s ease-in-out infinite;
        }
        @keyframes blink {
            0%, 100% { opacity: 0.7; }
            50%       { opacity: 0; }
        }
        .blink-text {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-family: 'Bebas Neue', 'Impact', sans-serif;
            font-size: clamp(32px, 7vw, 80px);
            color: white;
            letter-spacing: 0.12em;
            pointer-events: none;
        }

        /* ── Modal ── */
        .modal-backdrop {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.72);
            z-index: 200;
            display: none;
            align-items: center;
            justify-content: center;
            padding: 20px;
            backdrop-filter: blur(4px);
        }
        .modal-backdrop.active { display: flex; }

        .modal {
            background: #0d1220;
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 14px;
            padding: clamp(20px, 4vw, 32px);
            max-width: 360px;
            width: 100%;
        }

        .modal h2 {
            font-family: 'Barlow Condensed', sans-serif;
            font-size: 20px;
            font-weight: 700;
            letter-spacing: 0.12em;
            text-transform: uppercase;
            margin-bottom: 20px;
            text-align: center;
        }

        .modal-row {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 12px;
        }

        .modal-row label {
            font-family: 'Barlow Condensed', sans-serif;
            font-size: 13px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            color: var(--text-dim);
            width: 90px;
            flex-shrink: 0;
        }

        .modal-row input {
            flex: 1;
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid var(--border);
            color: var(--text);
            border-radius: 8px;
            padding: 10px 12px;
            font-family: 'Barlow Condensed', sans-serif;
            font-size: 16px;
            font-weight: 600;
            text-align: center;
            font-variant-numeric: tabular-nums;
            min-height: 44px;
        }
        .modal-row input:focus { outline: none; border-color: var(--accent); }

        .modal-row input[type="color"] {
            padding: 4px;
            height: 44px;
            cursor: pointer;
        }

        .modal-section-label {
            font-family: 'Barlow Condensed', sans-serif;
            font-size: 11px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.15em;
            color: var(--text-dim);
            margin-bottom: 10px;
        }

        .modal-divider {
            height: 1px;
            background: var(--border);
            margin: 14px 0;
        }

        .modal-actions {
            display: flex;
            gap: 10px;
            margin-top: 20px;
        }

        .modal-actions button {
            flex: 1;
            padding: 12px;
            border-radius: 8px;
            font-family: 'Barlow Condensed', sans-serif;
            font-size: 15px;
            font-weight: 700;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            cursor: pointer;
            border: 1px solid var(--border);
            min-height: 44px;
        }

        .modal-actions .cancel-btn {
            background: rgba(255, 255, 255, 0.04);
            color: var(--text);
        }
        .modal-actions .cancel-btn:hover { background: rgba(255, 255, 255, 0.08); }

        .modal-actions .save-btn {
            background: var(--accent);
            color: #0a0b0e;
            border-color: var(--accent);
        }
        .modal-actions .save-btn:hover { filter: brightness(1.08); }

        .confirm-content { text-align: center; }
        .confirm-content p {
            color: var(--text-dim);
            font-size: 14px;
            margin-bottom: 8px;
        }

        /* ── Responsive ── */
        @media (max-height: 500px) {
            .center-panel { gap: 6px; }
            .period-section { display: none; }
        }

        @media (orientation: portrait) and (max-width: 600px) {
            .center-panel { min-width: 95px; padding: 6px 8px; }
        }
    </style>
</head>
<body>
    <div class="board">
        <!-- Home Score -->
        <div class="score-panel home">
            <span class="team-label" id="homeLabel">HOME</span>
            <div class="score-touch-zone up" data-team="home" data-dir="up">
                <span class="score-hint">+1</span>
            </div>
            <span class="score-value" id="homeScore">0</span>
            <div class="score-touch-zone down" data-team="home" data-dir="down">
                <span class="score-hint">&minus;1</span>
            </div>
        </div>

        <!-- Center Panel -->
        <div class="center-panel">
            <div class="timer-section">
                <div class="timer-display" id="timerDisplay">10:00</div>
                <div class="timer-controls">
                    <button class="timer-btn primary" id="startStopBtn">Start</button>
                    <button class="gear-btn" id="gearBtn" title="Settings">&#9881;</button>
                    <button class="timer-btn" id="resetBtn">Reset</button>
                </div>
            </div>

            <div class="section-divider"></div>

            <div class="period-section">
                <button class="period-btn" id="periodDown">&#8722;</button>
                <div class="period-inner">
                    <div class="period-label">Period</div>
                    <div class="period-value" id="periodValue">1</div>
                </div>
                <button class="period-btn" id="periodUp">&#43;</button>
            </div>

            <div class="section-divider"></div>

            <!-- Possession: pure SVG triangles, not buttons -->
            <div class="possession-section">
                <div class="poss-label">Possession</div>
                <div class="poss-display">
                    <svg id="homeArrowBtn" class="poss-arrow" viewBox="0 0 60 40"
                         xmlns="http://www.w3.org/2000/svg"
                         aria-label="Home possession" title="Set possession to home">
                        <polygon points="0,20 26,0 26,13 60,13 60,27 26,27 26,40"/>
                    </svg>
                    <svg id="awayArrowBtn" class="poss-arrow" viewBox="0 0 60 40"
                         xmlns="http://www.w3.org/2000/svg"
                         aria-label="Away possession" title="Set possession to away">
                        <polygon points="60,20 34,0 34,13 0,13 0,27 34,27 34,40"/>
                    </svg>
                </div>
            </div>

            <div class="section-divider"></div>

            <div class="fouls-row">
                <div class="foul-block home">
                    <div class="foul-label">Fouls</div>
                    <div class="foul-touch-zone" data-team="home" data-dir="up">
                        <span class="foul-value" id="homeFouls">0</span>
                    </div>
                    <div class="foul-touch-zone" data-team="home" data-dir="down">
                        <span class="foul-dec">&minus;1</span>
                    </div>
                </div>
                <div class="foul-block away">
                    <div class="foul-label">Fouls</div>
                    <div class="foul-touch-zone" data-team="away" data-dir="up">
                        <span class="foul-value" id="awayFouls">0</span>
                    </div>
                    <div class="foul-touch-zone" data-team="away" data-dir="down">
                        <span class="foul-dec">&minus;1</span>
                    </div>
                </div>
            </div>
        </div>

        <!-- Away Score -->
        <div class="score-panel away">
            <span class="team-label" id="awayLabel">AWAY</span>
            <div class="score-touch-zone up" data-team="away" data-dir="up">
                <span class="score-hint">+1</span>
            </div>
            <span class="score-value" id="awayScore">0</span>
            <div class="score-touch-zone down" data-team="away" data-dir="down">
                <span class="score-hint">&minus;1</span>
            </div>
        </div>
    </div>

    <div class="bottom-bar">
        <button class="bottom-btn" id="undoBtn" title="Undo last action">Undo</button>
        <button class="bottom-btn sound-toggle" id="soundBtn" title="Toggle buzzer">&#128264;</button>
        <button class="bottom-btn" id="swapBtn" title="Swap sides">Swap</button>
        <button class="bottom-btn" id="fullscreenBtn" title="Full screen">&#x26F6;</button>
        <button class="bottom-btn" id="resetAllBtn" title="Reset everything">New Game</button>
    </div>

    <!-- Blink Overlay -->
    <div class="blink-overlay" id="blinkOverlay">
        <span class="blink-text">TIME</span>
    </div>

    <!-- Settings Modal -->
    <div class="modal-backdrop" id="timerModal">
        <div class="modal">
            <h2>Settings</h2>
            <div class="modal-section-label">Timer</div>
            <div class="modal-row">
                <label>Minutes</label>
                <input type="number" id="setMinutes" min="0" max="99" value="10">
            </div>
            <div class="modal-row">
                <label>Seconds</label>
                <input type="number" id="setSeconds" min="0" max="59" value="0">
            </div>
            <div class="modal-divider"></div>
            <div class="modal-section-label">Teams</div>
            <div class="modal-row">
                <label>Home name</label>
                <input type="text" id="setHomeName" maxlength="12" value="HOME">
            </div>
            <div class="modal-row">
                <label>Home color</label>
                <input type="color" id="setHomeColor" value="#4a90d9">
            </div>
            <div class="modal-row">
                <label>Away name</label>
                <input type="text" id="setAwayName" maxlength="12" value="AWAY">
            </div>
            <div class="modal-row">
                <label>Away color</label>
                <input type="color" id="setAwayColor" value="#d94a4a">
            </div>
            <div class="modal-actions">
                <button class="cancel-btn" id="modalCancel">Cancel</button>
                <button class="save-btn" id="modalSave">Save</button>
            </div>
        </div>
    </div>

    <!-- Confirm Reset Modal -->
    <div class="modal-backdrop" id="confirmModal">
        <div class="modal">
            <div class="confirm-content">
                <h2>New Game?</h2>
                <p>This will reset scores, fouls, timer, and period.</p>
            </div>
            <div class="modal-actions">
                <button class="cancel-btn" id="confirmCancel">Cancel</button>
                <button class="save-btn" id="confirmOk">Reset</button>
            </div>
        </div>
    </div>

<script>
(() => {
    // ── State ──
    const state = {
        home: { score: 0, fouls: 0, name: 'HOME', color: '#4a90d9' },
        away: { score: 0, fouls: 0, name: 'AWAY', color: '#d94a4a' },
        period: 1,
        timerDuration: 600,   // default 10 min in seconds
        timerRemaining: 600,
        timerRunning: false,
        soundOn: true,
        possession: 'home',
    };

    const history = [];  // undo stack
    let timerInterval = null;
    let blinkActive = false;

    // ── DOM refs ──
    const $ = id => document.getElementById(id);
    const homeScoreEl   = $('homeScore');
    const awayScoreEl   = $('awayScore');
    const homeFoulsEl   = $('homeFouls');
    const awayFoulsEl   = $('awayFouls');
    const homeLabel     = $('homeLabel');
    const awayLabel     = $('awayLabel');
    const timerDisplay  = $('timerDisplay');
    const periodValue   = $('periodValue');
    const startStopBtn  = $('startStopBtn');
    const blinkOverlay  = $('blinkOverlay');
    const timerModal    = $('timerModal');
    const confirmModal  = $('confirmModal');
    const soundBtn      = $('soundBtn');
    const homeArrowBtn  = $('homeArrowBtn');
    const awayArrowBtn  = $('awayArrowBtn');

    // ── Audio Context for Buzzer ──
    let audioCtx = null;
    function ensureAudioCtx() {
        if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        if (audioCtx.state === 'suspended') audioCtx.resume();
    }

    function playBuzzer() {
        if (!state.soundOn) return;
        try {
            ensureAudioCtx();
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.type = 'square';
            osc.frequency.value = 440;
            gain.gain.setValueAtTime(0.3, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 1.5);
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.start();
            osc.stop(audioCtx.currentTime + 1.5);
        } catch(e) { /* silent fail */ }
    }

    // ── Dynamic Score Sizing ──
    function fitScoreFont(el) {
        const panel = el.closest('.score-panel');
        const panelW = panel.clientWidth;
        const panelH = panel.clientHeight;
        // Reserve space for team label at top and hints
        const availW = panelW * 0.9;
        const availH = panelH * 0.65;
        const digits = el.textContent.length || 1;
        // Scale based on available width per digit and height
        const byWidth = availW / (digits * 0.65);
        const byHeight = availH;
        const size = Math.floor(Math.min(byWidth, byHeight));
        el.style.fontSize = size + 'px';
    }

    function fitAllScores() {
        fitScoreFont(homeScoreEl);
        fitScoreFont(awayScoreEl);
    }

    // ── Render ──
    function render() {
        homeScoreEl.textContent = state.home.score;
        awayScoreEl.textContent = state.away.score;
        homeFoulsEl.textContent = state.home.fouls;
        awayFoulsEl.textContent = state.away.fouls;
        homeLabel.textContent = state.home.name;
        awayLabel.textContent = state.away.name;
        periodValue.textContent = state.period;
        // Apply custom colors
        homeScoreEl.style.color = state.home.color;
        awayScoreEl.style.color = state.away.color;
        homeFoulsEl.style.color = state.home.color;
        awayFoulsEl.style.color = state.away.color;
        renderTimer();
        soundBtn.innerHTML = state.soundOn ? '&#128264;' : '&#128263;';
        homeArrowBtn.classList.toggle('active', state.possession === 'home');
        awayArrowBtn.classList.toggle('active', state.possession === 'away');
        fitAllScores();
    }

    function renderTimer() {
        const t = Math.max(0, state.timerRemaining);
        const m = Math.floor(t / 60);
        const s = t % 60;
        timerDisplay.textContent = String(m).padStart(2, '0') + ':' + String(s).padStart(2, '0');
        timerDisplay.classList.toggle('danger', t <= 30 && t > 0);
        startStopBtn.textContent = state.timerRunning ? 'Stop' : 'Start';
    }

    // ── Undo ──
    function pushUndo(action) {
        history.push(action);
        if (history.length > 100) history.shift();
    }

    function undo() {
        const action = history.pop();
        if (!action) return;
        if (action.type === 'score') {
            state[action.team].score -= action.delta;
            if (state[action.team].score < 0) state[action.team].score = 0;
        } else if (action.type === 'foul') {
            state[action.team].fouls -= action.delta;
            if (state[action.team].fouls < 0) state[action.team].fouls = 0;
        } else if (action.type === 'period') {
            state.period -= action.delta;
            if (state.period < 1) state.period = 1;
        }
        render();
    }

    // ── Score Touch ──
    document.querySelectorAll('.score-touch-zone').forEach(zone => {
        zone.addEventListener('click', (e) => {
            dismissBlink();
            const team = zone.dataset.team;
            const delta = zone.dataset.dir === 'up' ? 1 : -1;
            state[team].score = Math.max(0, state[team].score + delta);
            pushUndo({ type: 'score', team, delta });
            flash(zone);
            render();
        });
    });

    // ── Foul Touch ──
    document.querySelectorAll('.foul-touch-zone').forEach(zone => {
        zone.addEventListener('click', (e) => {
            dismissBlink();
            const team = zone.dataset.team;
            const delta = zone.dataset.dir === 'up' ? 1 : -1;
            state[team].fouls = Math.max(0, state[team].fouls + delta);
            pushUndo({ type: 'foul', team, delta });
            render();
        });
    });

    // ── Flash effect ──
    function flash(el) {
        el.classList.add('flash');
        setTimeout(() => el.classList.remove('flash'), 150);
    }

    // ── Timer ──
    startStopBtn.addEventListener('click', () => {
        dismissBlink();
        ensureAudioCtx(); // unlock audio on user gesture
        if (state.timerRunning) {
            stopTimer();
        } else {
            startTimer();
        }
    });

    $('resetBtn').addEventListener('click', () => {
        dismissBlink();
        stopTimer();
        state.timerRemaining = state.timerDuration;
        render();
    });

    function startTimer() {
        if (state.timerRemaining <= 0) return;
        state.timerRunning = true;
        renderTimer();
        timerInterval = setInterval(() => {
            state.timerRemaining--;
            if (state.timerRemaining <= 0) {
                state.timerRemaining = 0;
                stopTimer();
                triggerBlink();
                playBuzzer();
            }
            renderTimer();
        }, 1000);
    }

    function stopTimer() {
        state.timerRunning = false;
        clearInterval(timerInterval);
        timerInterval = null;
        renderTimer();
    }

    // ── Blink ──
    function triggerBlink() {
        blinkActive = true;
        blinkOverlay.classList.add('active');
    }

    function dismissBlink() {
        if (!blinkActive) return;
        blinkActive = false;
        blinkOverlay.classList.remove('active');
    }

    blinkOverlay.addEventListener('click', dismissBlink);

    // ── Gear / Timer Settings ──
    $('gearBtn').addEventListener('click', () => {
        const m = Math.floor(state.timerDuration / 60);
        const s = state.timerDuration % 60;
        $('setMinutes').value = m;
        $('setSeconds').value = s;
        $('setHomeName').value = state.home.name;
        $('setAwayName').value = state.away.name;
        $('setHomeColor').value = state.home.color;
        $('setAwayColor').value = state.away.color;
        timerModal.classList.add('active');
    });

    $('modalCancel').addEventListener('click', () => timerModal.classList.remove('active'));

    $('modalSave').addEventListener('click', () => {
        const m = Math.max(0, parseInt($('setMinutes').value) || 0);
        const s = Math.max(0, Math.min(59, parseInt($('setSeconds').value) || 0));
        state.timerDuration = m * 60 + s;
        state.timerRemaining = state.timerDuration;
        stopTimer();
        // Team names
        state.home.name = ($('setHomeName').value.trim() || 'HOME').toUpperCase();
        state.away.name = ($('setAwayName').value.trim() || 'AWAY').toUpperCase();
        // Team colors
        state.home.color = $('setHomeColor').value;
        state.away.color = $('setAwayColor').value;
        timerModal.classList.remove('active');
        render();
    });

    timerModal.addEventListener('click', (e) => {
        if (e.target === timerModal) timerModal.classList.remove('active');
    });

    // ── Period ──
    $('periodUp').addEventListener('click', () => {
        state.period++;
        pushUndo({ type: 'period', delta: 1 });
        render();
    });

    $('periodDown').addEventListener('click', () => {
        if (state.period > 1) {
            state.period--;
            pushUndo({ type: 'period', delta: -1 });
            render();
        }
    });

    // ── Swap Sides ──
    $('swapBtn').addEventListener('click', () => {
        const tmp = { ...state.home };
        state.home = { ...state.away };
        state.away = { ...tmp };
        state.possession = state.possession === 'home' ? 'away' : 'home';
        render();
    });

    // ── Possession Arrow ──
    homeArrowBtn.addEventListener('click', () => {
        state.possession = 'home';
        render();
    });

    awayArrowBtn.addEventListener('click', () => {
        state.possession = 'away';
        render();
    });

    // ── Sound Toggle ──
    soundBtn.addEventListener('click', () => {
        state.soundOn = !state.soundOn;
        render();
    });

    // ── Fullscreen ──
    $('fullscreenBtn').addEventListener('click', () => {
        if (!document.fullscreenElement) {
            document.documentElement.requestFullscreen().catch(() => {});
        } else {
            document.exitFullscreen();
        }
    });

    document.addEventListener('fullscreenchange', () => {
        $('fullscreenBtn').innerHTML = document.fullscreenElement ? '&#x2716;' : '&#x26F6;';
        // Refit scores after fullscreen transition
        setTimeout(fitAllScores, 100);
    });

    // ── Undo ──
    $('undoBtn').addEventListener('click', undo);

    // ── New Game ──
    $('resetAllBtn').addEventListener('click', () => {
        confirmModal.classList.add('active');
    });

    $('confirmCancel').addEventListener('click', () => confirmModal.classList.remove('active'));

    $('confirmOk').addEventListener('click', () => {
        confirmModal.classList.remove('active');
        stopTimer();
        dismissBlink();
        state.home.score = 0;
        state.home.fouls = 0;
        state.away.score = 0;
        state.away.fouls = 0;
        state.period = 1;
        state.timerRemaining = state.timerDuration;
        history.length = 0;
        render();
    });

    confirmModal.addEventListener('click', (e) => {
        if (e.target === confirmModal) confirmModal.classList.remove('active');
    });

    // ── Keyboard Shortcuts ──
    document.addEventListener('keydown', (e) => {
        if (e.target.tagName === 'INPUT') return;
        dismissBlink();
        switch (e.key) {
            case ' ':
                e.preventDefault();
                startStopBtn.click();
                break;
            case 'z':
                if (e.ctrlKey || e.metaKey) { e.preventDefault(); undo(); }
                break;
            case 'p':
            case 'P':
                state.possession = state.possession === 'home' ? 'away' : 'home';
                render();
                break;
        }
    });

    // ── Prevent zoom on double-tap (iOS) ──
    let lastTouchEnd = 0;
    document.addEventListener('touchend', (e) => {
        const now = Date.now();
        if (now - lastTouchEnd <= 300) e.preventDefault();
        lastTouchEnd = now;
    }, { passive: false });

    // ── Init ──
    render();
    window.addEventListener('resize', fitAllScores);
})();
</script>
</body>
</html>
